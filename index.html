function renderActionBar(s, data) {
  const bar = document.getElementById('actionBar');
  let html = '';
  const sid = s.id;

  switch (s.status) {
    case 'Pendiente aprobación Compras':
      if (canApprove()) {
        html += `<button class="btn-green" onclick="approveCompras('${sid}')">Aprobar solicitud</button>`;
        html += `<button class="btn-gold" onclick="requestInfo('${sid}')">Solicitar info</button>`;
        html += `<button class="btn-red" onclick="rejectSolicitud('${sid}')">Rechazar</button>`;
      }
      break;
    case 'Info solicitada':
      if (isMarcas() && s.created_by === currentUser.id) {
        html += `<button class="btn-gold" onclick="resendInfo('${sid}')">Reenviar con info adicional</button>`;
      }
      if (canApprove() || isCompras()) {
        html += `<button class="btn-green" onclick="approveCompras('${sid}')">Aprobar sin esperar info</button>`;
        html += `<button class="btn-red" onclick="rejectSolicitud('${sid}')">Rechazar</button>`;
      }
      break;
    case 'Propuesta de proveedores':
      if (isCompras() || canApprove()) {
        html += `<div class="field" style="margin:8px 0;"><label style="font-size:12px;">Proveedores propuestos</label>
          <div id="proveedoresList"></div>
          <div style="display:flex;gap:6px;margin-top:4px;">
            <input type="text" id="newProveedorInput" placeholder="Nombre del proveedor" style="flex:1;">
            <button class="btn-outline btn-sm" onclick="addProveedorToList()">+ Agregar</button>
          </div>
        </div>`;
        html += `<button class="btn-gold" onclick="propuestaProveedores('${sid}')" style="margin-top:8px;">Proveedores propuestos → Cotización</button>`;
      }
      break;
    case 'Cotización y negociación':
      if (isCompras() || canApprove()) {
        html += `<button class="btn-violet" onclick="cotizacionLista('${sid}')">Cotización cerrada → Pedir muestras</button>`;
      }
      break;
    case 'Pedido de muestras':
      if (isCompras() || canApprove()) {
        html += `<p style="color:var(--txt2);font-size:13px;">Nadia Maggi coordina el envío de muestras. Cargá el tracking del courier.</p>`;
        html += `<div class="field" style="margin:8px 0;"><label style="font-size:12px;">Courier (ej: DHL, FedEx)</label><input type="text" id="muestraCourier" placeholder="DHL" style="max-width:200px;"></div>`;
        html += `<div class="field" style="margin:8px 0;"><label style="font-size:12px;">Tracking number</label><input type="text" id="muestraTracking" placeholder="1234567890" style="max-width:300px;"></div>`;
        html += `<div class="field" style="margin:8px 0;"><label style="font-size:12px;">Fecha de despacho</label><input type="date" id="muestraDespacho" style="max-width:200px;"></div>`;
        html += `<div class="field" style="margin:8px 0;"><label style="font-size:12px;">Fecha estimada arribo muestra</label><input type="date" id="muestraETA" style="max-width:200px;"></div>`;
        html += `<button class="btn-gold" onclick="despacharMuestras('${sid}')">Muestras despachadas → En tránsito</button>`;
      }
      break;
    case 'Muestras en tránsito': {
      // Extract tracking info from notas
      const trackMatch = s.notas?.match(/\[TRACKING MUESTRAS\] Courier: (.+?) \| Tracking: (.+?) \| Despacho: (.+?)(?:\s*\| ETA: (.+?))?$/m);
      if (trackMatch) {
        html += `<div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:12px;">
          <div style="font-weight:700;color:var(--gold);margin-bottom:8px;">📦 Seguimiento de muestras</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:13px;">
            <div><span style="color:var(--txt2);">Courier:</span> <strong>${trackMatch[1]}</strong></div>
            <div><span style="color:var(--txt2);">Tracking:</span> <strong>${trackMatch[2]}</strong></div>
            <div><span style="color:var(--txt2);">Despacho:</span> ${trackMatch[3]}</div>
            ${trackMatch[4] ? `<div><span style="color:var(--txt2);">ETA:</span> <strong style="color:var(--orange);">${trackMatch[4]}</strong></div>` : ''}
          </div>
          ${trackMatch[1]?.toLowerCase().includes('dhl') ? `<a href="https://www.dhl.com/ar-es/home/rastreo.html?tracking-id=${trackMatch[2]}" target="_blank" style="display:inline-block;margin-top:8px;font-size:12px;color:var(--gold);">🔗 Rastrear en DHL</a>` : ''}
          ${trackMatch[1]?.toLowerCase().includes('fedex') ? `<a href="https://www.fedex.com/fedextrack/?trknbr=${trackMatch[2]}" target="_blank" style="display:inline-block;margin-top:8px;font-size:12px;color:var(--gold);">🔗 Rastrear en FedEx</a>` : ''}
        </div>`;
      } else {
        html += `<p style="color:var(--txt2);font-size:13px;">Muestras en camino. Info de tracking no disponible.</p>`;
      }
      if (isCompras() || canApprove()) {
        html += `<button class="btn-green" onclick="muestrasRecibidas('${sid}')">Muestras recibidas → Aprobación Marcas</button>`;
      }
      break;
    }
    case 'Pendiente aprobación estética (Marcas)':
      if ((isMarcas() && canActOnBrand(s.marca)) || canApprove()) {
        html += `<p style="color:var(--txt2);font-size:13px;">Aprobá cada ítem individualmente en la sección de Items, o usá el botón para aprobar todos.</p>`;
        html += `<button class="btn-green" onclick="approveAllAesthetic('${sid}')">Aprobar todos los ítems</button>`;
        html += `<button class="btn-red" onclick="openRechazoMuestraModal('${sid}')">Rechazar muestras (con fotos)</button>`;
      } else if (isMarcas()) {
        html += `<p style="color:var(--txt2);font-size:13px;">Esta solicitud pertenece a la marca <strong>${s.marca}</strong>, que no está asignada a tu usuario.</p>`;
      }
      break;
    case 'Esperando muestras técnicas':
      if (isCompras() || canApprove()) {
        html += `<p style="color:var(--txt2);font-size:13px;">Pedí nuevas muestras para pruebas técnicas. Cargá el tracking del courier.</p>`;
        html += `<div class="field" style="margin:8px 0;"><label style="font-size:12px;">Courier (ej: DHL, FedEx)</label><input type="text" id="muestraTecCourier" placeholder="DHL" style="max-width:200px;"></div>`;
        html += `<div class="field" style="margin:8px 0;"><label style="font-size:12px;">Tracking number</label><input type="text" id="muestraTecTracking" placeholder="1234567890" style="max-width:300px;"></div>`;
        html += `<div class="field" style="margin:8px 0;"><label style="font-size:12px;">Fecha de despacho</label><input type="date" id="muestraTecDespacho" style="max-width:200px;"></div>`;
        html += `<div class="field" style="margin:8px 0;"><label style="font-size:12px;">Fecha estimada arribo</label><input type="date" id="muestraTecETA" style="max-width:200px;"></div>`;
        html += `<button class="btn-gold" onclick="despacharMuestrasTecnicas('${sid}')">Muestras técnicas despachadas</button>`;
      }
      if (isCalidad() || isCompras()) {
        html += `<button class="btn-green" onclick="techSamplesArrived('${sid}')" style="margin-left:8px;">Muestras técnicas recibidas → Calidad</button>`;
      }
      break;
    case 'Pendiente aprobación Calidad':
      if (isCalidad() || canApprove()) {
        html += `<button class="btn-green" onclick="calidadApprove('${sid}')">Calidad: Aprobar</button>`;
        html += `<button class="btn-red" onclick="calidadReject('${sid}')">Calidad: Rechazar</button>`;
      }
      break;
    case 'Aprobada - Lista para OC':
      if (isCompras() || canApprove()) {
        html += `<button class="btn-green" onclick="emitOC('${sid}')">Emitir OC (Mariángeles)</button>`;
      }
      break;
    case 'OC emitida':
      if (isComex() || canApprove()) {
        html += `<button class="btn-blue" onclick="comexTakeOver('${sid}')">Comex: Proforma y pago</button>`;
      }
      break;
    case 'Comex - Proforma y pago':
      if (isComex() || canApprove()) {
        html += `<button class="btn-blue" onclick="comexOrdenProduccion('${sid}')">Dar orden de producción</button>`;
      }
      break;
    case 'Orden de producción':
      if (isCompras() || canApprove()) {
        html += `<button class="btn-gold" onclick="markEnProduccion('${sid}')">Marcar en producción</button>`;
      }
      break;
    case 'En producción':
      if (isCompras() || isCalidad() || canApprove()) {
        html += `<button class="btn-gold" onclick="produccionFinalizada('${sid}')">Producción finalizada → Inspección</button>`;
      }
      break;
    case 'Inspección pre-embarque':
      html += `<p style="color:var(--txt2);font-size:13px;">Cada área aprueba o desaprueba su inspección en la sección de abajo. Si alguna se desaprueba, se indica el motivo y plazo para resolver, y queda disponible para volver a aprobar.</p>`;
      break;
    case 'Booking shipping':
      if (isComex() || canApprove()) {
        html += `<div class="field" style="margin-bottom:8px;">
          <label style="font-size:12px;">Fecha estimada de arribo (ETA)</label>
          <input type="date" id="etaInput" style="max-width:200px;">
        </div>`;
        html += `<button class="btn-blue" onclick="markShipped('${sid}')">Confirmar embarque → En tránsito</button>`;
      }
      break;
    case 'En tránsito':
      if (isComex() || canApprove()) {
        html += `<button class="btn-blue" onclick="markNacionalizacion('${sid}')">Arribo → Nacionalización</button>`;
      }
      break;
    case 'Nacionalización':
      if (isComex() || isCompras() || canApprove()) {
        html += `<button class="btn-green" onclick="markCompleted('${sid}')">Nacionalizado → Completado</button>`;
      }
      break;
  }

  bar.innerHTML = html || '<span style="color:var(--txt2);font-size:13px;">Sin acciones disponibles para tu rol en este estado.</span>';
}

// =============================================
// RETROPLAN VISUAL
// =============================================
function renderRetroplan(pasos) {
  const el = document.getElementById('retroplanTimeline');
  if (!pasos.length) { el.innerHTML = '<p style="color:var(--txt2)">Sin retroplan definido</p>'; return; }

  el.innerHTML = pasos.map(p => {
    const days = daysUntil(p.fecha_objetivo);
    let cls = '';
    if (p.completado) cls = 'completed';
    else if (days !== null && days < 0) cls = 'overdue';
    else if (days !== null && days <= 10) cls = 'active';

    return `<div class="retro-step ${cls}">
      <div class="dot"></div>
      <div class="step-name">${p.completado ? '✓ ' : ''}${p.nombre}</div>
      <div class="step-date">${fmtDate(p.fecha_objetivo)}${p.completado ? ' — Completado ' + fmtDate(p.fecha_completado) : (days !== null && days < 0 ? ` — <span style="color:var(--red)">Vencido hace ${Math.abs(days)}d</span>` : (days !== null ? ` — ${days}d restantes` : ''))}</div>
      <div class="step-responsible">${p.responsable || ''}</div>
      ${!p.completado && (isCompras() || canApprove()) ? `<button class="btn-outline btn-sm" onclick="completePaso('${p.id}')" style="margin-top:4px;">Marcar completado</button>` : ''}
    </div>`;
  }).join('');
}

function renderItems(items, s) {
  const el = document.getElementById('itemsSection');
  if (!items.length) { el.innerHTML = '<p style="color:var(--txt2)">Sin ítems</p>'; return; }

  const showAestheticApproval = s.status === 'Pendiente aprobación estética (Marcas)' && ((isMarcas() && canActOnBrand(s.marca)) || canApprove());

  el.innerHTML = `<table class="items-table">
    <tr>
      <th>Ítem</th><th>Tipo</th><th>Detalle</th><th>Estético</th><th>Técnico</th>
      ${showAestheticApproval ? '<th>Acciones</th>' : ''}
      <th>Compra parcial</th>
    </tr>
    ${items.map(it => `<tr>
      <td>${it.nombre}</td>
      <td>${it.tipo_producto || '-'}</td>
      <td style="font-size:12px;color:var(--txt2);max-width:180px;">${it.notas || (it.tratamiento_especial ? `<span style="color:var(--orange)">${it.tratamiento_especial}</span>` : '-')}</td>
      <td>${pill_item(it.status_estetico)}</td>
      <td>${pill_item(it.status_tecnico)}</td>
      ${showAestheticApproval && it.status_estetico === 'pendiente' ? `<td>
        <button class="btn-green btn-sm" onclick="approveItemAesthetic('${it.id}','${s.id}')">Aprobar</button>
        <button class="btn-red btn-sm" onclick="rejectItemAesthetic('${it.id}','${s.id}')">Rechazar</button>
      </td>` : showAestheticApproval ? '<td>-</td>' : ''}
      <td>
        ${it.compra_parcial ? `<span style="color:var(--green)">Sí</span> — ${it.compra_parcial_detalle || ''}` : '-'}
        ${isCompras() ? `<button class="btn-outline btn-sm" onclick="toggleCompraParcial('${it.id}','${s.id}')" style="margin-left:4px;">Editar</button>` : ''}
      </td>
    </tr>`).join('')}
  </table>
  ${isCompras() ? `<button class="btn-outline btn-sm" onclick="addItemToSolicitud('${s.id}')" style="margin-top:8px;">+ Agregar ítem</button>` : ''}`;
}

function pill_item(status) {
  const cls = status === 'aprobado' ? 'pill-approved' : (status === 'rechazado' || status === 'desaprobado') ? 'pill-rejected' : 'pill-pending';
  return `<span class="pill ${cls}">${status}</span>`;
}

// =============================================
// INSPECCIONES PRE-EMBARQUE
// =============================================
function renderInspecciones(inspecciones, s) {
  const el = document.getElementById('inspeccionesSection');
  const tipos = [
    { key: 'calidad_funcional', label: 'Calidad - Funcionalidad', canApproveRole: () => isCalidad() || canApprove() },
    { key: 'estetica_marcas', label: 'Marcas - Estética', canApproveRole: () => (isMarcas() && canActOnBrand(s.marca)) || canApprove() },
    { key: 'comex_packing', label: 'Comex - Packing List & Shipping Marks', canApproveRole: () => isComex() || canApprove() }
  ];

  const showInsp = s.status === 'Inspección pre-embarque';

  el.innerHTML = tipos.map(t => {
    const insp = inspecciones.find(i => i.tipo === t.key);
    const resultado = insp?.resultado || 'pendiente';
    const notas = insp?.notas || '';

    // Parse rejection details if desaprobado
    let rechazoInfo = '';
    if (resultado === 'desaprobado' && notas) {
      const plazoMatch = notas.match(/\[PLAZO: (.+?)\]/);
      const motivo = notas.replace(/\[PLAZO: .+?\]\s*/, '');
      rechazoInfo = `<div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:6px;padding:8px 10px;margin-top:6px;font-size:12px;">
        <div style="color:var(--red);font-weight:600;">Motivo: ${motivo}</div>
        ${plazoMatch ? `<div style="color:var(--orange);margin-top:4px;">Plazo para resolver: <strong>${plazoMatch[1]}</strong></div>` : ''}
      </div>`;
    }

    return `<div style="padding:10px 0;border-bottom:1px solid var(--border);">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="flex:1;font-size:14px;">${t.label}</div>
        <div>${pill_item(resultado)}</div>
        ${showInsp && (resultado === 'pendiente' || resultado === 'desaprobado') && t.canApproveRole() ? `
          <button class="btn-green btn-sm" onclick="approveInspeccion('${s.id}','${t.key}')">Aprobar</button>
          ${resultado !== 'desaprobado' ? `<button class="btn-red btn-sm" onclick="openDesaprobarInspeccionModal('${s.id}','${t.key}','${t.label}')">Desaprobar</button>` : `<button class="btn-red btn-sm" onclick="openDesaprobarInspeccionModal('${s.id}','${t.key}','${t.label}')">Re-desaprobar</button>`}
        ` : ''}
      </div>
      ${rechazoInfo}
    </div>`;
  }).join('');
}

function renderComments(comments) {

  el.innerHTML = comments.map(c => {
    // Highlight @mentions in text
    const texto = (c.texto || '').replace(/@(\w+(?:\s\w+)?)/g, '<span class="mention">@$1</span>');
    return `<div class="comment">
      <span class="author">${c.profiles?.full_name || 'Usuario'}</span>
      <span class="date">${fmtDate(c.created_at?.split('T')[0])}</span>
      <div class="text">${texto}</div>

function renderHistory(history) {
  const el = document.getElementById('historySection');
  el.innerHTML = history.map(h => {
    let detalleHtml = '';
    if (h.detalle) {
      // Check if detalle contains diff JSON
      if (h.detalle.startsWith('{') && h.detalle.includes('"cambios"')) {
        try {
          const diff = JSON.parse(h.detalle);
          detalleHtml = '<div style="margin-top:4px;">' + (diff.cambios || []).map(c =>
            `<div style="font-size:12px;"><span style="color:var(--txt2);">${c.campo}:</span> <span class="diff-removed">${c.antes || '(vacío)'}</span> → <span class="diff-added">${c.despues || '(vacío)'}</span></div>`
          ).join('') + (diff.nota ? `<div style="font-size:12px;color:var(--txt2);margin-top:2px;">${diff.nota}</div>` : '') + '</div>';
        } catch (e) {
          detalleHtml = `<br><span style="color:var(--txt2);font-size:12px;">${h.detalle}</span>`;
        }
      } else {
        detalleHtml = `<br><span style="color:var(--txt2);font-size:12px;">${h.detalle}</span>`;
      }
    }
    return `<div class="history-entry">
      <span class="time">${fmtDate(h.created_at?.split('T')[0])}</span>
      <strong>${h.profiles?.full_name || 'Sistema'}</strong>: ${h.evento}
      ${detalleHtml}
    </div>`;
  }).join('') || '<p style="color:var(--txt2)">Sin historial</p>';
}

// =============================================
// WORKFLOW ACTIONS
// =============================================
// Safe notas update: silently fails if column doesn't exist
async function safeUpdateNotas(id, notasValue) {
  try {
    await sb.from('solicitudes').update({ notas: notasValue }).eq('id', id);
  } catch(e) { console.warn('notas column update skipped:', e.message); }
}

async function updateStatus(id, newStatus, evento, detalle, emailTo, emailSubject, emailBody) {
  const s = solicitudes.find(x => x.id === id);
  const oldStatus = s?.status;
  const diffJson = JSON.stringify({
    cambios: [{ campo: 'Estado', antes: oldStatus, despues: newStatus }],
    nota: detalle || ''
  });
  const { error } = await sb.from('solicitudes').update({ status: newStatus }).eq('id', id);
  if (error) { toast('Error al cambiar estado: ' + error.message, true); return; }
  await sb.from('historial').insert({ solicitud_id: id, actor_id: currentUser.id, evento, detalle: diffJson });
  if (emailTo && emailSubject) {
    sendEmail(emailTo, emailSubject, emailBody || `<p>${evento}</p>`).catch(e => console.warn('Email error:', e));
  }
  await loadSolicitudes();
  toast(evento);
  await openSolicitud(id);
}

async function approveCompras(id) {
  const s = solicitudes.find(x => x.id === id);
  await completePasoByName(id, 'Aprobación Compras');
  await updateStatus(id, 'Propuesta de proveedores', 'Solicitud aprobada por Compras',
    `Aprobada por ${currentProfile.full_name}`,
    [s.profiles?.email].filter(Boolean),
    `Solicitud #${s.numero} aprobada`,
    `<p>Tu solicitud <strong>${s.nombre}</strong> fue aprobada por Compras. Se inicia la propuesta de proveedores.</p>`);
}

async function requestInfo(id) {
  const motivo = prompt('¿Qué información necesitás?');
  if (!motivo) return;
  const s = solicitudes.find(x => x.id === id);
  await updateStatus(id, 'Info solicitada', 'Info solicitada por Compras', motivo,
    [s.profiles?.email].filter(Boolean),
    `Solicitud #${s.numero}: Se necesita más información`,
    `<p>Compras necesita más información sobre tu solicitud <strong>${s.nombre}</strong>:</p><p>${motivo}</p>`);
}

async function rejectSolicitud(id) {
  const motivo = prompt('Motivo del rechazo:');
  if (!motivo) return;
  const s = solicitudes.find(x => x.id === id);

    [s.profiles?.email].filter(Boolean),
    `Solicitud #${s.numero} rechazada`,
    `<p>Tu solicitud <strong>${s.nombre}</strong> fue rechazada. Motivo: ${motivo}</p>`);
}

async function resendInfo(id) {
  const s = solicitudes.find(x => x.id === id);
  await updateStatus(id, 'Pendiente aprobación Compras', 'Info reenviada por Marcas', null,
    ['nmaggi@cdimex.com.ar','nguarino@cdimex.com.ar','mjaimes@cdimex.com.ar'],
    `Solicitud #${s.numero}: Info actualizada`,
    `<p>${currentProfile.full_name} actualizó la información de la solicitud <strong>${s.nombre}</strong>. Revisá y aprobá.</p>`);

function addProveedorToList() {
  const input = document.getElementById('newProveedorInput');
  const val = input.value.trim();
  if (!val) return;
  const list = document.getElementById('proveedoresList');
  const tag = document.createElement('span');
  tag.className = 'proveedor-tag';
  tag.style.cssText = 'display:inline-flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:16px;padding:4px 10px;margin:2px 4px 2px 0;font-size:12px;';
  tag.innerHTML = `${val} <span onclick="this.parentElement.remove()" style="cursor:pointer;color:var(--red);font-weight:bold;">✕</span>`;
  list.appendChild(tag);
  input.value = '';
  input.focus();
}

async function propuestaProveedores(id) {
  // Collect proveedores from the list
  const tags = document.querySelectorAll('#proveedoresList .proveedor-tag');
  const proveedores = [];
  tags.forEach(t => { const txt = t.textContent.replace('✕','').trim(); if (txt) proveedores.push(txt); });
  if (!proveedores.length) return toast('Agregá al menos un proveedor a la lista', true);

  const s = solicitudes.find(x => x.id === id);

  // Save proveedores in notas and historial
  const notasActuales = s.notas || '';
  await safeUpdateNotas(id, notasActuales + `\n[PROVEEDORES] ${proveedores.join(', ')}`);

  await completePasoByName(id, 'Propuesta de proveedores');
  await updateStatus(id, 'Cotización y negociación', `Proveedores propuestos: ${proveedores.join(', ')}`, null,
    ['nmaggi@cdimex.com.ar','mjaimes@cdimex.com.ar'].filter(Boolean),
    `Solicitud #${s.numero}: Proveedores propuestos`,
    `<p>Se presentó la propuesta de proveedores para <strong>${s.nombre}</strong>:</p><ul>${proveedores.map(p => `<li>${p}</li>`).join('')}</ul><p>Inicia la etapa de cotización y negociación.</p>`);
}

async function cotizacionLista(id) {
  const s = solicitudes.find(x => x.id === id);
  await completePasoByName(id, 'Cotización y negociación');
  await updateStatus(id, 'Pedido de muestras', 'Cotización cerrada, se procede a pedir muestras', null,
    ['nmaggi@cdimex.com.ar'].filter(Boolean),
    `Solicitud #${s.numero}: Cotización cerrada`,
    `<p>La cotización de <strong>${s.nombre}</strong> fue cerrada. Nadia: coordiná el envío de muestras.</p>`);
}

async function despacharMuestras(id) {
  const courier = document.getElementById('muestraCourier')?.value?.trim();
  const tracking = document.getElementById('muestraTracking')?.value?.trim();
  const despacho = document.getElementById('muestraDespacho')?.value;
  const eta = document.getElementById('muestraETA')?.value;

  if (!tracking) { toast('Ingresá el tracking number', true); return; }
  if (!despacho) { toast('Ingresá la fecha de despacho', true); return; }

  const s = solicitudes.find(x => x.id === id);

  // Save tracking data in historial detalle as JSON
  const trackingData = JSON.stringify({ courier: courier || 'DHL', tracking, despacho, eta: eta || null });

  await completePasoByName(id, 'Pedido de muestras');

  // Store tracking info in comex_seguimiento (reusing the table for tracking data)
  await sb.from('historial').insert({
    solicitud_id: id, actor_id: currentUser.id,
    evento: 'Muestras despachadas',
    detalle: `Courier: ${courier || 'DHL'} | Tracking: ${tracking} | Despacho: ${despacho}${eta ? ' | ETA: ' + eta : ''}`
  });

  // Also store in notas for easy retrieval
  const notasActuales = s.notas || '';

async function submitRechazoMuestra(solId) {
  const motivo = document.getElementById('rechazoMotivo').value.trim();
  if (!motivo) return toast('Escribí el motivo del rechazo', true);

  const fotos = [];
  document.querySelectorAll('.rechazo-foto-url').forEach(el => { if (el.value) fotos.push(el.value); });

  try {
    // Update all items as rejected
    const { data: items } = await sb.from('solicitud_items').select('id, status_estetico').eq('solicitud_id', solId);
    const pendientes = items?.filter(i => i.status_estetico !== 'aprobado') || [];
    for (const it of pendientes) {
      await sb.from('solicitud_items').update({ status_estetico: 'rechazado', notas: motivo }).eq('id', it.id);
    }

    const detalleRechazo = motivo + (fotos.length ? '\n\nFotos: ' + fotos.join(', ') : '');

    await sb.from('historial').insert({
      solicitud_id: solId, actor_id: currentUser.id,
      evento: 'Muestras rechazadas estéticamente — Vuelve a Compras',
      detalle: detalleRechazo
    });

    // Save fotos in notas
    if (fotos.length) {
      const s = solicitudes.find(x => x.id === solId);
      const notasAct = s?.notas || '';
      await safeUpdateNotas(solId, notasAct + `\n[RECHAZO FOTOS] ${fotos.join(' | ')}`);
    }

    const s = solicitudes.find(x => x.id === solId);
    closeModal('rechazoModal');

    // Goes BACK to Pedido de muestras (Compras has to re-work with proveedor)
    await updateStatus(solId, 'Pedido de muestras', 'Muestras rechazadas - Vuelve a Compras', motivo,
      ['nmaggi@cdimex.com.ar','mjaimes@cdimex.com.ar','nguarino@cdimex.com.ar'].filter(Boolean),
      `Solicitud #${s?.numero}: Muestras rechazadas`,
      `<p>Las muestras de <strong>${s?.nombre}</strong> fueron rechazadas estéticamente.</p><p><strong>Motivo:</strong> ${motivo}</p>${fotos.length ? '<p>Se adjuntaron ' + fotos.length + ' foto(s) de referencia.</p>' : ''}<p>La solicitud vuelve a Compras para gestionar con el proveedor.</p>`);
  } catch (err) {
    console.error(err);
    toast('Error: ' + err.message, true);
  }
}

async function comexTakeOver(id) {
  // Create comex tracking record
  const { data: existing } = await sb.from('comex_seguimiento').select('id').eq('solicitud_id', id).single();
  if (!existing) {
    await sb.from('comex_seguimiento').insert({ solicitud_id: id });

  await completePasoByName(id, 'Proforma invoice y pago');
  const sComex = solicitudes.find(x => x.id === id);
  await updateStatus(id, 'Comex - Proforma y pago', 'Comex gestionando proforma y pago', null,
    ['nguarino@cdimex.com.ar','mjaimes@cdimex.com.ar', sComex?.profiles?.email].filter(Boolean),
    `Solicitud #${sComex?.numero}: Comex gestiona proforma y pago`,
    `<p>La solicitud <strong>${sComex?.nombre}</strong> pasó a Comex. Se gestiona proforma invoice y pago.</p>`);

  // Sync to Google Sheets
  const s = solicitudes.find(x => x.id === id);
  try {
    await fetch('/api/sheets-sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': 'cdimex-internal-2024' },
      body: JSON.stringify({
        action: 'write', solicitudId: id,
        data: {
          numero: s?.numero, nombre: s?.nombre, marca: s?.marca, tipo: s?.tipo,
          fecha_oc: new Date().toISOString().split('T')[0],
          pago_status: 'pendiente', estado: 'Comex - Proforma y pago'
        }
      })
    });
  } catch (e) { console.warn('Sheets sync error:', e); }
}

// =============================================
// REGENERAR RETROPLAN
// =============================================
async function regenerarRetroplan(solId, tipo, fechaLanzamiento) {
  if (!confirm('¿Regenerar el retroplan con el template actualizado?\n\nEsto eliminará todos los pasos actuales y creará los nuevos. Los pasos ya completados se perderán.')) return;

  // Get cotización responsable for __COTIZ__ placeholder
  const { data: sol } = await sb.from('solicitudes').select('cotizacion_responsable').eq('id', solId).single();
  const cotiz = sol?.cotizacion_responsable || 'compras';

  // Delete existing pasos
  await sb.from('retroplan_pasos').delete().eq('solicitud_id', solId);

  // Generate new pasos from current template
  const template = RETROPLAN_TEMPLATES[tipo] || RETROPLAN_TEMPLATES['Nuevos desarrollos'];
  const launchDate = new Date(fechaLanzamiento + 'T12:00:00');
  const pasos = template.map((t, i) => {
    const fecha = new Date(launchDate);
    fecha.setDate(fecha.getDate() - t.dias);
    let resp = t.responsable;
    if (resp === '__COTIZ__') resp = cotiz;
    return {
      solicitud_id: solId, orden: i + 1, nombre: t.nombre,
      responsable: resp, dias_offset: t.dias,
      fecha_objetivo: fecha.toISOString().split('T')[0]
    };
  });

  await sb.from('retroplan_pasos').insert(pasos);

  // Log
  await sb.from('historial').insert({
    solicitud_id: solId, actor_id: currentUser.id,
    evento: 'Retroplan regenerado', detalle: `Template: ${tipo}, ${template.length} pasos`
  });

  toast('Retroplan regenerado exitosamente');
  await openSolicitud(solId);
}

// =============================================
// CHANGE LAUNCH DATE
// =============================================
async function changeLaunchDate(id, currentDate) {
  const newDate = prompt('Nueva fecha de lanzamiento (YYYY-MM-DD):', currentDate);
  if (!newDate || newDate === currentDate) return;
  // Validate date format
  if (!/^\d{4}-\d{2}-\d{2}$/.test(newDate) || isNaN(new Date(newDate + 'T12:00:00').getTime())) {
    toast('Fecha inválida. Usá el formato YYYY-MM-DD (ej: 2026-06-15)');
    return;
  }

  // Update solicitud
  await sb.from('solicitudes').update({ fecha_lanzamiento: newDate }).eq('id', id);

  // Recalculate all retroplan dates
  const { data: pasos } = await sb.from('retroplan_pasos').select('*').eq('solicitud_id', id).order('orden');
  const launchDate = new Date(newDate + 'T12:00:00');
  for (const p of pasos) {
    const fecha = new Date(launchDate);
    fecha.setDate(fecha.getDate() - p.dias_offset);
    await sb.from('retroplan_pasos').update({ fecha_objetivo: fecha.toISOString().split('T')[0] }).eq('id', p.id);
  }

  // Log and notify
  await sb.from('historial').insert({
    solicitud_id: id, actor_id: currentUser.id,
    evento: 'Fecha de lanzamiento modificada',
    detalle: `De ${currentDate} a ${newDate}. Todo el retroplan fue recalculado.`
  });

  const s = solicitudes.find(x => x.id === id);
  // Notify all involved
  const { data: profileEmails } = await sb.from('profiles').select('email');
  const emails = profileEmails?.map(p => p.email) || [];
  await sendEmail(emails,
    `CAMBIO DE FECHA: Solicitud #${s.numero} — ${s.nombre}`,
    `<p><strong>${currentProfile.full_name}</strong> cambió la fecha de lanzamiento de <strong>${s.nombre}</strong>.</p>
     <p>Fecha anterior: ${fmtDate(currentDate)}</p>
     <p>Nueva fecha: ${fmtDate(newDate)}</p>
     <p><strong>Todo el retroplan fue recalculado.</strong> Revisá las nuevas fechas en la app.</p>`
  );

  toast('Fecha de lanzamiento actualizada y retroplan recalculado');
  await loadSolicitudes();
  await openSolicitud(id);
}

// @mention autocomplete
function handleMentionInput(textarea) {
  const val = textarea.value;
  const cursorPos = textarea.selectionStart;
  const textUpToCursor = val.substring(0, cursorPos);
  const mentionMatch = textUpToCursor.match(/@(\w*)$/);
  const dropdown = document.getElementById('mentionDropdown');

  if (!mentionMatch) { dropdown.style.display = 'none'; return; }

  const query = mentionMatch[1].toLowerCase();
  const matches = allProfiles.filter(p =>
    p.full_name?.toLowerCase().includes(query) ||
    p.email?.split('@')[0].toLowerCase().includes(query)
  ).slice(0, 6);

  if (matches.length === 0) { dropdown.style.display = 'none'; return; }

  dropdown.style.display = 'block';
  dropdown.innerHTML = matches.map(p =>
    `<div class="mention-item" onclick="insertMention('${p.full_name}')">
      ${p.full_name}<span class="mention-role">${p.role}</span>
    </div>`
  ).join('');
}

function insertMention(name) {
  const textarea = document.getElementById('newComment');
  const val = textarea.value;
  const cursorPos = textarea.selectionStart;
  const textBefore = val.substring(0, cursorPos);
  const textAfter = val.substring(cursorPos);
  const newBefore = textBefore.replace(/@(\w*)$/, `@${name} `);
  textarea.value = newBefore + textAfter;
  textarea.focus();
  textarea.selectionStart = textarea.selectionEnd = newBefore.length;
  document.getElementById('mentionDropdown').style.display = 'none';
}

async function sendEmail(to, subject, html) {
  try {
    const resp = await fetch('/api/send-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': 'cdimex-internal-2024' },
      body: JSON.stringify({ to: Array.isArray(to) ? to : [to], subject: `[CDimex] ${subject}`, html: wrapEmail(html) })
    });
    if (!resp.ok) console.warn('Email send failed:', await resp.text());
  } catch (e) {
    console.warn('Email send error:', e);
    // Fallback: open mailto
    const emails = Array.isArray(to) ? to.join(',') : to;
    window.open(`mailto:${emails}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(subject)}`);
  }
}

async function syncSemaforoToSheets(semaforo) {
  const rows = [];
  const today = new Date().toISOString().split('T')[0];

  [...semaforo.amarillo, ...semaforo.rojo].forEach(x => {
    rows.push([
      today,
      x.sol.numero || '',
      x.sol.nombre || '',
      x.sol.marca || '',
      x.sol.tipo || '',
      x.sol.status || '',
      x.paso || '',
      x.responsable || '',
      x.dias ?? '',
      x.dias !== null && x.dias <= 0 ? 'ROJO' : 'AMARILLO'
    ]);
  });

  if (!rows.length) return;

  try {
    await fetch('/api/semaforo-sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': 'cdimex-internal-2024' },
      body: JSON.stringify({ rows })
    });
  } catch (e) { console.warn('Semáforo sync error:', e); }
}

    if (!currentUser) return;

      if (!session) {
        clearInterval(_dataRefreshInterval);
        _dataRefreshInterval = null;
        currentUser = null; currentProfile = null;
        document.getElementById('appMain').classList.add('hidden');

    } catch (e) {

// =============================================
let _realtimeChannel = null;
function startRealtimeSubscription() {
  if (_realtimeChannel) _realtimeChannel.unsubscribe();
  _realtimeChannel = sb.channel('solicitudes-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'solicitudes' }, async (payload) => {
      const oldData = solicitudes.find(s => s.id === payload.old?.id);
      await loadSolicitudes();
      // Show notification
      if (payload.eventType === 'UPDATE' && payload.new.status !== oldData?.status) {
        showRealtimeNotif(payload.new, oldData?.status, payload.new.status);
      }
      // Refresh current tab view
      const c = document.getElementById('tabContent');
      if (c && currentTab === 'dashboard') renderDashboard(c);
      else if (c && currentTab === 'solicitudes') renderSolicitudes(c);
      else if (c && currentTab === 'kanban') renderKanban(c);
      else if (c && currentTab === 'aprobaciones') renderAprobaciones(c);
    })
    .subscribe();
}

function showRealtimeNotif(sol, fromStatus, toStatus) {
  // Don't notify about own actions
  if (sol.updated_by === currentUser?.id) return;
  const existing = document.querySelector('.notif-toast');
  if (existing) existing.remove();
  const n = document.createElement('div');
  n.className = 'notif-toast';
  n.innerHTML = `<div class="notif-title"><span class="realtime-dot"></span>Actualización en tiempo real</div>
    <div>#${sol.numero || '?'} ${sol.nombre || ''} → ${toStatus}</div>`;
  n.onclick = () => { n.remove(); if (sol.id) openSolicitud(sol.id); };
  document.body.appendChild(n);
  setTimeout(() => n.remove(), 6000);
}

// =============================================
// 2. PROGRESS BAR (calculates step progress)
// =============================================
function getProgressPercent(status) {
  const idx = STATUS_LIST.indexOf(status);
  if (idx < 0) return 100;
  // Exclude terminal states (Completado=100, Rechazada/Eliminada=0)
  if (status === 'Completado') return 100;
  if (status === 'Rechazada' || status === 'Eliminada') return 0;
  // Non-terminal states map from ~5% to ~95%
  const totalSteps = STATUS_LIST.length - 3; // exclude terminal states
  return Math.round(((idx + 1) / totalSteps) * 95);
}

function progressBarHtml(status) {
  const pct = getProgressPercent(status);
  const color = pct >= 90 ? 'var(--green)' : pct >= 50 ? 'var(--gold)' : 'var(--blue)';
  return `<div class="progress-bar"><div class="fill" style="width:${pct}%;background:${color};"></div></div>`;
}

function filterSolicitudesAdv() {
  const q = (document.getElementById('searchSol')?.value || '').toLowerCase();
  const st = document.getElementById('filterStatus')?.value || '';
  const mk = document.getElementById('filterMarca')?.value || '';
  const tp = document.getElementById('filterTipo')?.value || '';
  const df = document.getElementById('filterDateFrom')?.value || '';
  const dt = document.getElementById('filterDateTo')?.value || '';
  let filtered = solicitudes;
  if (q) filtered = filtered.filter(s => s.nombre.toLowerCase().includes(q) || String(s.numero).includes(q) || (s.marca||'').toLowerCase().includes(q));
  if (st) filtered = filtered.filter(s => s.status === st);
  else filtered = filtered.filter(s => s.status !== 'Eliminada');
  if (mk) filtered = filtered.filter(s => s.marca === mk);
  if (tp) filtered = filtered.filter(s => s.tipo === tp);
  if (df) filtered = filtered.filter(s => (s.created_at || '') >= df);
  if (dt) filtered = filtered.filter(s => (s.created_at || '').substring(0,10) <= dt);
  document.getElementById('solList').innerHTML = filtered.map(s => solicitudCardEnhanced(s, true)).join('') || '<p style="color:var(--txt2)">Sin resultados</p>';
  updateSolCount(filtered.length);
}

function clearFilters() {
  ['searchSol','filterStatus','filterMarca','filterTipo','filterDateFrom','filterDateTo'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  filterSolicitudesAdv();
}

function updateSolCount(n) {
  const el = document.getElementById('solCount');
  if (el) el.textContent = `Mostrando ${n !== undefined ? n : solicitudes.filter(s=>s.status!=='Eliminada').length} solicitudes`;
}

function updateBulkToolbar() {
  const checked = document.querySelectorAll('.sol-check:checked');
  const bar = document.getElementById('bulkToolbar');
  const cnt = document.getElementById('bulkCount');
  if (!bar) return;
  if (checked.length > 0) {
    bar.classList.remove('hidden');
    if (cnt) cnt.textContent = checked.length;
  } else {
    bar.classList.add('hidden');
  }
}

function deselectAll() {
  document.querySelectorAll('.sol-check').forEach(c => c.checked = false);
  updateBulkToolbar();
}

// =============================================
// 4. DASHBOARD PERSONALIZADO POR ROL
// =============================================
function renderDashboardRole() {
  const activas = solicitudes.filter(s => !['Completado','Rechazada','Eliminada'].includes(s.status));

  if (isMarcas()) {
    const mySols = activas.filter(s => canActOnBrand(s.marca));
    const waitingMe = mySols.filter(s => s.status.includes('Marcas'));
    const waitingOthers = mySols.filter(s => !s.status.includes('Marcas'));
    const overdue = mySols.filter(s => {
      const pasos = allPendingPasos.filter(p => p.solicitud_id === s.id);
      return pasos.some(p => daysUntil(p.fecha_objetivo) !== null && daysUntil(p.fecha_objetivo) < 0);
    });
    return `<div class="role-kpi-grid">
      <div class="role-kpi-card" onclick="showDashboardList('myPending')">
        <div class="rkpi-num" style="color:var(--violet);">${waitingMe.length}</div>
        <div class="rkpi-label">Esperan tu aprobación</div>
      </div>
      <div class="role-kpi-card">
        <div class="rkpi-num" style="color:var(--blue);">${waitingOthers.length}</div>
        <div class="rkpi-label">En proceso (otros equipos)</div>
      </div>
      <div class="role-kpi-card">
        <div class="rkpi-num" style="color:var(--red);">${overdue.length}</div>
        <div class="rkpi-label">Con retraso</div>
      </div>
      <div class="role-kpi-card">
        <div class="rkpi-num" style="color:var(--gold);">${mySols.length}</div>
        <div class="rkpi-label">Mis solicitudes activas</div>
      </div>
    </div>`;
  }

  if (isCompras() || canApprove()) {
    const pendApproval = activas.filter(s => s.status === 'Pendiente aprobación Compras' || s.status === 'Info solicitada');
    const inNegotiation = activas.filter(s => ['Propuesta de proveedores','Cotización y negociación'].includes(s.status));
    const inSamples = activas.filter(s => ['Pedido de muestras','Muestras en tránsito','Esperando muestras técnicas'].includes(s.status));
    const readyOC = activas.filter(s => s.status === 'Aprobada - Lista para OC');
    const inProd = activas.filter(s => ['OC emitida','Comex - Proforma y pago','Orden de producción','En producción'].includes(s.status));
    return `<div class="role-kpi-grid">
      <div class="role-kpi-card" onclick="showDashboardList('pending')">
        <div class="rkpi-num" style="color:var(--orange);">${pendApproval.length}</div>
        <div class="rkpi-label">Pendientes aprobación</div>
      </div>
      <div class="role-kpi-card">
        <div class="rkpi-num" style="color:var(--violet);">${inNegotiation.length}</div>
        <div class="rkpi-label">En cotización</div>
      </div>
      <div class="role-kpi-card">
        <div class="rkpi-num" style="color:var(--blue);">${inSamples.length}</div>
        <div class="rkpi-label">En muestras</div>
      </div>
      <div class="role-kpi-card">
        <div class="rkpi-num" style="color:var(--green);">${readyOC.length}</div>
        <div class="rkpi-label">Listas para OC</div>
        <div class="rkpi-sub">Acción inmediata</div>
      </div>
      <div class="role-kpi-card">
        <div class="rkpi-num" style="color:var(--gold);">${inProd.length}</div>
        <div class="rkpi-label">En producción/Comex</div>
      </div>
    </div>`;
  }

  if (isComex()) {
    const myStates = activas.filter(s => ['OC emitida','Comex - Proforma y pago','Orden de producción','Booking shipping','En tránsito','Nacionalización'].includes(s.status));
    const waitingPayment = activas.filter(s => s.status === 'Comex - Proforma y pago');
    const inTransit = activas.filter(s => s.status === 'En tránsito');
    return `<div class="role-kpi-grid">
      <div class="role-kpi-card">
        <div class="rkpi-num" style="color:var(--blue);">${myStates.length}</div>
        <div class="rkpi-label">Total en Comex</div>
      </div>
      <div class="role-kpi-card">
        <div class="rkpi-num" style="color:var(--orange);">${waitingPayment.length}</div>
        <div class="rkpi-label">Proforma y pago</div>
      </div>
      <div class="role-kpi-card">
        <div class="rkpi-num" style="color:var(--gold);">${inTransit.length}</div>
        <div class="rkpi-label">En tránsito</div>
      </div>
    </div>`;
  }

  return '';
}

// =============================================
// 5. KANBAN VIEW
// =============================================
const KANBAN_COLUMNS = [
  { status: 'Pendiente aprobación Compras', short: 'Pend. Compras', color: 'var(--orange)' },
  { status: 'Info solicitada', short: 'Info Solic.', color: 'var(--gold)' },
  { status: 'Propuesta de proveedores', short: 'Proveedores', color: 'var(--violet)' },
  { status: 'Cotización y negociación', short: 'Cotización', color: 'var(--violet)' },
  { status: 'Pedido de muestras', short: 'Muestras', color: 'var(--blue)' },
  { status: 'Muestras en tránsito', short: 'Muestras trán.', color: 'var(--blue)' },
  { status: 'Pendiente aprobación estética (Marcas)', short: 'Aprob. Marcas', color: 'var(--violet)' },
  { status: 'Esperando muestras técnicas', short: 'M. Técnicas', color: 'var(--blue)' },
  { status: 'Pendiente aprobación Calidad', short: 'Calidad', color: 'var(--orange)' },
  { status: 'Aprobada - Lista para OC', short: 'Lista OC', color: 'var(--green)' },
  { status: 'OC emitida', short: 'OC Emitida', color: 'var(--green)' },
  { status: 'Comex - Proforma y pago', short: 'Comex Pago', color: '#06b6d4' },
  { status: 'Orden de producción', short: 'Producción', color: '#06b6d4' },
  { status: 'En producción', short: 'En Prod.', color: '#06b6d4' },
  { status: 'Inspección pre-embarque', short: 'Inspección', color: 'var(--orange)' },
  { status: 'Booking shipping', short: 'Booking', color: '#06b6d4' },
  { status: 'En tránsito', short: 'En Tránsito', color: '#06b6d4' },
  { status: 'Nacionalización', short: 'Nacional.', color: '#06b6d4' }
];

function renderKanban(c) {
  const container = c.closest('.container');
  if (container) { container.style.maxWidth = '100%'; container.style.padding = '12px'; }

  const active = solicitudes.filter(s => !['Completado','Rechazada','Eliminada'].includes(s.status));

  c.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <h3 style="color:var(--gold);">Vista Kanban — ${active.length} solicitudes activas</h3>
      <select id="kanbanFilterMarca" onchange="renderKanbanCards()" style="max-width:180px;font-size:12px;">
        <option value="">Todas las marcas</option>
        ${MARCAS.map(m => `<option value="${m}">${m}</option>`).join('')}
      </select>
    </div>
    <div class="kanban-board" id="kanbanBoard">
      ${KANBAN_COLUMNS.map(col => {
        const cards = active.filter(s => s.status === col.status);
        return `<div class="kanban-col" data-status="${col.status}">
          <div class="kanban-col-header">
            <span style="color:${col.color};">${col.short}</span>
            <span class="count">${cards.length}</span>
          </div>
          <div class="kanban-col-body" data-status="${col.status}"
            ondragover="kanbanDragOver(event)" ondragleave="kanbanDragLeave(event)" ondrop="kanbanDrop(event)">
            ${cards.map(s => kanbanCard(s)).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function kanbanCard(s) {
  return `<div class="kanban-card" draggable="true" data-id="${s.id}" data-status="${s.status}"
    ondragstart="kanbanDragStart(event)" onclick="openSolicitud('${s.id}')">
    <div class="kc-title">#${s.numero} ${s.nombre}</div>
    <div class="kc-meta">${s.marca} · ${s.profiles?.full_name || ''}</div>
    ${s.fecha_lanzamiento ? `<div class="kc-meta" style="color:var(--gold);">Lanz: ${fmtDate(s.fecha_lanzamiento)}</div>` : ''}
  </div>`;
}

function renderKanbanCards() {
  const marca = document.getElementById('kanbanFilterMarca')?.value || '';
  let active = solicitudes.filter(s => !['Completado','Rechazada','Eliminada'].includes(s.status));
  if (marca) active = active.filter(s => s.marca === marca);

  KANBAN_COLUMNS.forEach(col => {
    const body = document.querySelector(`.kanban-col-body[data-status="${col.status}"]`);
    if (!body) return;
    const cards = active.filter(s => s.status === col.status);
    body.innerHTML = cards.map(s => kanbanCard(s)).join('');
    // Update count
    const header = body.closest('.kanban-col')?.querySelector('.count');
    if (header) header.textContent = cards.length;
  });
}

let _draggedSolId = null;
function kanbanDragStart(e) {
  _draggedSolId = e.target.dataset.id;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function kanbanDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('drag-over');
}

function kanbanDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

async function kanbanDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const targetStatus = e.currentTarget.dataset.status;
  if (!_draggedSolId || !targetStatus) return;

  const sol = solicitudes.find(s => s.id === _draggedSolId);
  if (!sol || sol.status === targetStatus) { _draggedSolId = null; return; }

  // Validate: only admin/compras with approve can drag
  if (!canApprove()) {
    toast('Solo usuarios con permiso de aprobación pueden mover solicitudes via drag & drop', true);
    _draggedSolId = null;
    return;
  }

  // Validate: target must be the NEXT logical status or adjacent
  const fromIdx = STATUS_LIST.indexOf(sol.status);
  const toIdx = STATUS_LIST.indexOf(targetStatus);
  if (toIdx < 0 || fromIdx < 0) { _draggedSolId = null; return; }

  // Allow forward movement only (max 2 steps) or backward (max 1 step)
  if (toIdx > fromIdx + 2 || toIdx < fromIdx - 1) {
    toast('Solo podés mover al estado siguiente o anterior. Usá la vista detalle para saltos mayores.', true);
    _draggedSolId = null;
    return;
  }

  if (!confirm(`¿Mover #${sol.numero} "${sol.nombre}" de "${sol.status}" a "${targetStatus}"?`)) {
    _draggedSolId = null;
    return;
  }

  await updateStatus(_draggedSolId, targetStatus, `Estado cambiado via Kanban`, `${sol.status} → ${targetStatus}`);
  _draggedSolId = null;
  renderKanban(document.getElementById('tabContent'));
}

// =============================================
// 6. BULK ACTIONS
// =============================================
function getSelectedIds() {
  return Array.from(document.querySelectorAll('.sol-check:checked')).map(c => c.value);
}

async function bulkApprove() {
  const ids = getSelectedIds();
  if (!ids.length) return toast('Seleccioná al menos una solicitud', true);
  const pendientes = ids.filter(id => {
    const s = solicitudes.find(x => x.id === id);
    return s?.status === 'Pendiente aprobación Compras';
  });
  if (!pendientes.length) return toast('Ninguna de las seleccionadas está pendiente de aprobación', true);
  if (!confirm(`¿Aprobar ${pendientes.length} solicitudes en lote?`)) return;

  let ok = 0;
  for (const id of pendientes) {
    try {
      await completePasoByName(id, 'Aprobación Compras');
      const { error } = await sb.from('solicitudes').update({ status: 'Propuesta de proveedores' }).eq('id', id);
      if (!error) {
        await sb.from('historial').insert({ solicitud_id: id, actor_id: currentUser.id, evento: 'Aprobada (lote)', detalle: 'Aprobación masiva por ' + currentProfile.full_name });
        ok++;
      }
    } catch(e) { console.warn('Bulk approve error:', e); }
  }
  await loadSolicitudes();
  toast(`${ok} solicitudes aprobadas`);
  renderSolicitudesEnhanced(document.getElementById('tabContent'));
}

async function bulkMoveNext() {
  const ids = getSelectedIds();
  if (!ids.length) return toast('Seleccioná al menos una solicitud', true);
  // Group by current status
  const groups = {};
  ids.forEach(id => {
    const s = solicitudes.find(x => x.id === id);
    if (s && !['Completado','Rechazada','Eliminada'].includes(s.status)) {
      if (!groups[s.status]) groups[s.status] = [];
      groups[s.status].push(s);
    }
  });
  const statusKeys = Object.keys(groups);
  if (statusKeys.length > 1) return toast('Para avanzar en lote, todas deben estar en el mismo estado', true);
  if (!statusKeys.length) return toast('No hay solicitudes válidas seleccionadas', true);

  const currentStatus = statusKeys[0];
  const idx = STATUS_LIST.indexOf(currentStatus);
  const nextStatus = STATUS_LIST[idx + 1];
  if (!nextStatus || ['Completado','Rechazada','Eliminada'].includes(nextStatus)) return toast('No se puede avanzar desde este estado en lote', true);

  if (!confirm(`¿Mover ${groups[currentStatus].length} solicitudes de "${currentStatus}" a "${nextStatus}"?`)) return;

  let ok = 0;
  for (const s of groups[currentStatus]) {
    try {
      const { error } = await sb.from('solicitudes').update({ status: nextStatus }).eq('id', s.id);
      if (!error) {
        await sb.from('historial').insert({ solicitud_id: s.id, actor_id: currentUser.id, evento: `Avanzado a ${nextStatus} (lote)` });
        ok++;
      }
    } catch(e) { console.warn('Bulk move error:', e); }
  }
  await loadSolicitudes();
  toast(`${ok} solicitudes movidas a "${nextStatus}"`);
  renderSolicitudesEnhanced(document.getElementById('tabContent'));
}

main();
</script>
