<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CDimex — Marcas & Compras</title>
<style>
:root{
  --bg:#0f0f1a;--bg2:#1a1a2e;--bg3:#252540;--card:#1e1e35;
  --gold:#f0c040;--violet:#a855f7;--green:#22c55e;--red:#ef4444;--orange:#f97316;--blue:#3b82f6;
  --txt:#e2e2e2;--txt2:#999;--border:#333355;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;}
a{color:var(--gold);text-decoration:none;}
button{cursor:pointer;border:none;border-radius:6px;padding:8px 16px;font-size:14px;font-weight:600;transition:all .2s;}
input,select,textarea{background:var(--bg3);color:var(--txt);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:14px;width:100%;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);}
.btn-gold{background:var(--gold);color:#000;} .btn-gold:hover{background:#daa520;}
.btn-green{background:var(--green);color:#fff;} .btn-green:hover{opacity:.85;}
.btn-red{background:var(--red);color:#fff;} .btn-red:hover{opacity:.85;}
.btn-violet{background:var(--violet);color:#fff;} .btn-violet:hover{opacity:.85;}
.btn-blue{background:var(--blue);color:#fff;} .btn-blue:hover{opacity:.85;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--txt);} .btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.btn-sm{padding:5px 10px;font-size:12px;}

/* Layout */
.app-bar{background:var(--bg2);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.app-bar h1{font-size:18px;color:var(--gold);}
.app-bar .user-info{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--txt2);}
.app-bar .user-info .role-badge{background:var(--violet);color:#fff;padding:2px 8px;border-radius:12px;font-size:11px;text-transform:uppercase;}
.container{max-width:1200px;margin:0 auto;padding:20px;}
.grid{display:grid;gap:16px;}
.grid-2{grid-template-columns:repeat(auto-fit,minmax(300px,1fr));}
.grid-3{grid-template-columns:repeat(auto-fit,minmax(250px,1fr));}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:border-color .2s;}
.card:hover{border-color:var(--gold);}
.card h3{color:var(--gold);margin-bottom:8px;font-size:16px;}
.card .meta{color:var(--txt2);font-size:12px;margin-bottom:4px;}

/* Status pills */
.pill{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;text-transform:uppercase;}
.pill-pending{background:#f0c04022;color:var(--gold);}
.pill-active{background:#3b82f622;color:var(--blue);}
.pill-marcas{background:#a855f722;color:var(--violet);}
.pill-calidad{background:#f9731622;color:var(--orange);}
.pill-approved{background:#22c55e22;color:var(--green);}
.pill-rejected{background:#ef444422;color:var(--red);}
.pill-comex{background:#06b6d422;color:#06b6d4;}

/* Auth screen */
.auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.auth-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:40px;width:100%;max-width:420px;}
.auth-box h2{color:var(--gold);text-align:center;margin-bottom:8px;}
.auth-box p{color:var(--txt2);text-align:center;margin-bottom:24px;font-size:14px;}
.auth-box .field{margin-bottom:16px;}
.auth-box label{display:block;font-size:13px;color:var(--txt2);margin-bottom:4px;}
.auth-box .error{color:var(--red);font-size:13px;margin-top:8px;display:none;}
.auth-box .switch{text-align:center;margin-top:16px;font-size:13px;color:var(--txt2);}

/* Dashboard KPI */
.kpi-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;flex:1;min-width:140px;text-align:center;}
.kpi .num{font-size:28px;font-weight:800;color:var(--gold);}
.kpi .label{font-size:12px;color:var(--txt2);margin-top:2px;}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:0;}
.tab{padding:8px 16px;font-size:14px;color:var(--txt2);border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.tab:hover{color:var(--txt);}

/* Retroplan visual */
.retroplan-timeline{position:relative;padding-left:30px;}
.retro-step{position:relative;padding:12px 16px;margin-bottom:8px;border-left:3px solid var(--border);transition:all .3s;}
.retro-step.completed{border-left-color:var(--green);background:rgba(34,197,94,.05);}
.retro-step.active{border-left-color:var(--gold);background:rgba(240,192,64,.05);}
.retro-step.overdue{border-left-color:var(--red);background:rgba(239,68,68,.05);}
.retro-step .dot{position:absolute;left:-9px;top:16px;width:14px;height:14px;border-radius:50%;border:2px solid var(--border);background:var(--bg);}
.retro-step.completed .dot{border-color:var(--green);background:var(--green);}
.retro-step.active .dot{border-color:var(--gold);background:var(--gold);}
.retro-step.overdue .dot{border-color:var(--red);background:var(--red);}
.retro-step .step-name{font-weight:600;font-size:14px;}
.retro-step .step-date{font-size:12px;color:var(--txt2);margin-top:2px;}
.retro-step .step-responsible{font-size:11px;color:var(--violet);margin-top:2px;}

/* Detail sections */
.section{margin-bottom:24px;}
.section h3{color:var(--gold);font-size:15px;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.action-bar{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0;}

/* Type buttons grid */
.tipo-btns{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:20px;}
.tipo-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:18px 16px;cursor:pointer;transition:all .25s;text-align:left;}
.tipo-btn:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 4px 16px rgba(240,192,64,.12);}
.tipo-btn .tipo-icon{font-size:24px;margin-bottom:6px;}
.tipo-btn .tipo-title{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:2px;}
.tipo-btn .tipo-desc{font-size:12px;color:var(--txt2);line-height:1.4;}

/* KPI clickable */
.kpi.clickable{cursor:pointer;transition:all .2s;} .kpi.clickable:hover{border-color:var(--gold);transform:translateY(-2px);}

/* Semáforo */
.semaforo-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:24px;}
.semaforo-col{border-radius:var(--radius);padding:14px;min-height:80px;}
.semaforo-col.verde{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);}
.semaforo-col.amarillo{background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.25);}
.semaforo-col.rojo{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);}
.semaforo-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.semaforo-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
.semaforo-col.verde .semaforo-dot{background:var(--green);}
.semaforo-col.amarillo .semaforo-dot{background:var(--orange);}
.semaforo-col.rojo .semaforo-dot{background:var(--red);}
.semaforo-title{font-size:13px;font-weight:700;}
.semaforo-col.verde .semaforo-title{color:var(--green);}
.semaforo-col.amarillo .semaforo-title{color:var(--orange);}
.semaforo-col.rojo .semaforo-title{color:var(--red);}
.semaforo-count{font-size:22px;font-weight:800;margin-left:auto;}
.semaforo-col.verde .semaforo-count{color:var(--green);}
.semaforo-col.amarillo .semaforo-count{color:var(--orange);}
.semaforo-col.rojo .semaforo-count{color:var(--red);}
.semaforo-item{font-size:12px;padding:6px 8px;margin-bottom:4px;border-radius:6px;background:rgba(255,255,255,.03);cursor:pointer;transition:background .2s;}
.semaforo-item:hover{background:rgba(255,255,255,.08);}
.semaforo-item .sol-name{font-weight:600;color:var(--txt);}
.semaforo-item .sol-paso{color:var(--txt2);margin-top:2px;}

/* Items table */
.items-table{width:100%;border-collapse:collapse;}
.items-table th{background:var(--bg3);color:var(--txt2);padding:8px;font-size:12px;text-align:left;}
.items-table td{padding:8px;border-bottom:1px solid var(--border);font-size:13px;}

/* Comments */
.comment{background:var(--bg3);border-radius:8px;padding:10px 14px;margin-bottom:8px;}
.comment .author{font-weight:600;font-size:13px;color:var(--gold);}
.comment .date{font-size:11px;color:var(--txt2);margin-left:8px;}
.comment .text{font-size:14px;margin-top:4px;}

/* History */
.history-entry{padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}
.history-entry .time{color:var(--txt2);font-size:11px;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;}
.modal h2{color:var(--gold);margin-bottom:16px;}
.modal .field{margin-bottom:14px;}
.modal label{display:block;font-size:13px;color:var(--txt2);margin-bottom:4px;}
.modal .row{display:flex;gap:12px;}
.modal .row>*{flex:1;}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:300;animation:slideIn .3s ease;}
.toast.error{background:var(--red);}
@keyframes slideIn{from{transform:translateX(100px);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes spin{to{transform:rotate(360deg);}}

/* Mentions */
.mention{background:rgba(240,192,64,.15);color:var(--gold);font-weight:600;border-radius:3px;padding:0 2px;}
.mention-dropdown{position:absolute;background:var(--bg2);border:1px solid var(--border);border-radius:8px;max-height:180px;overflow-y:auto;z-index:500;box-shadow:0 4px 12px rgba(0,0,0,.3);}
.mention-dropdown .mention-item{padding:8px 12px;cursor:pointer;font-size:13px;}
.mention-dropdown .mention-item:hover{background:var(--bg3);}
.mention-dropdown .mention-item .mention-role{font-size:11px;color:var(--txt2);margin-left:6px;}

/* Diff history */
.diff-added{background:rgba(16,185,129,.1);color:var(--green);font-size:12px;padding:2px 6px;border-radius:4px;}
.diff-removed{background:rgba(239,68,68,.1);color:var(--red);font-size:12px;padding:2px 6px;border-radius:4px;text-decoration:line-through;}

/* Admin panel */
.admin-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;}
.admin-card h4{color:var(--gold);margin:0 0 8px 0;font-size:14px;}
.brand-tag{display:inline-flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:12px;margin:2px;}
.brand-tag .remove-brand{cursor:pointer;color:var(--red);font-weight:bold;margin-left:4px;}

/* Metrics */
.metric-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;}
.metric-card h4{color:var(--gold);margin:0 0 12px 0;font-size:14px;}
.bar-chart{display:flex;flex-direction:column;gap:6px;}
.bar-row{display:flex;align-items:center;gap:8px;}
.bar-label{min-width:140px;font-size:12px;color:var(--txt2);text-align:right;}
.bar-fill{height:22px;border-radius:4px;display:flex;align-items:center;padding:0 8px;font-size:11px;color:#fff;font-weight:600;min-width:30px;}

/* Alerts badge */
.alert-badge{position:relative;}
.alert-badge::after{content:attr(data-count);position:absolute;top:-6px;right:-8px;background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:50%;min-width:16px;height:16px;display:flex;align-items:center;justify-content:center;padding:0 3px;}

/* Responsive */
@media(max-width:768px){
  .container{padding:12px;}
  .kpi-row{flex-direction:column;}
  .modal .row{flex-direction:column;}
  .app-bar{flex-direction:column;gap:8px;}
}
.hidden{display:none!important;}
.loading{text-align:center;padding:40px;color:var(--txt2);}
</style>
</head>
<body>

<!-- ============= AUTH SCREEN ============= -->
<div id="authScreen" class="auth-screen">
  <div class="auth-box">
    <h2>CDimex</h2>
    <p>Marcas & Compras — Gestión de Desarrollo</p>
    <div id="authLogin">
      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="tu@cdimex.com.ar">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="loginPass" placeholder="Tu contraseña">
      </div>
      <button class="btn-gold" style="width:100%;padding:12px;font-size:15px;margin-top:8px;" onclick="doLogin()">Ingresar</button>
      <div class="switch">¿No tenés cuenta? <a href="#" onclick="showRegister()">Registrate</a></div>
    </div>
    <div id="authRegister" class="hidden">
      <div class="field">
        <label>Nombre completo</label>
        <input type="text" id="regName" placeholder="Tu nombre">
      </div>
      <div class="field">
        <label>Email corporativo</label>
        <input type="email" id="regEmail" placeholder="tu@cdimex.com.ar">
      </div>
      <div class="field">
        <label>Contraseña (mínimo 6 caracteres)</label>
        <input type="password" id="regPass" placeholder="Elegí una contraseña">
      </div>
      <button class="btn-gold" style="width:100%;padding:12px;font-size:15px;margin-top:8px;" onclick="doRegister()">Crear cuenta</button>
      <div class="switch">¿Ya tenés cuenta? <a href="#" onclick="showLogin()">Ingresá</a></div>
    </div>
    <div id="authError" class="error"></div>
  </div>
</div>

<!-- ============= MAIN APP ============= -->
<div id="appMain" class="hidden">
  <div class="app-bar">
    <h1>CDimex — Marcas & Compras</h1>
    <div class="user-info">
      <span id="userName"></span>
      <span id="userRole" class="role-badge"></span>
      <button class="btn-outline btn-sm" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="container">
    <div class="tabs" id="mainTabs">
      <div class="tab active" data-tab="dashboard" onclick="switchTab('dashboard')">Dashboard</div>
      <div class="tab" data-tab="solicitudes" onclick="switchTab('solicitudes')">Solicitudes</div>
      <div class="tab" data-tab="aprobaciones" onclick="switchTab('aprobaciones')">Aprobaciones</div>
      <div class="tab" data-tab="comex" onclick="switchTab('comex')">Comex</div>
      <div class="tab" data-tab="metricas" onclick="switchTab('metricas')">Métricas</div>
      <div class="tab hidden" data-tab="stock" onclick="switchTab('stock')">📦 Stock</div>
      <div class="tab hidden" data-tab="mrp" onclick="switchTab('mrp')">🏭 MRP</div>
      <div class="tab hidden" data-tab="admin" onclick="switchTab('admin')">Admin</div>
    </div>
    <div id="tabContent"></div>
  </div>
</div>

function showError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 5000);
}
function showLogin() {
  document.getElementById('authLogin').classList.remove('hidden');
  document.getElementById('authRegister').classList.add('hidden');
}
function showRegister() {
  document.getElementById('authLogin').classList.add('hidden');
  document.getElementById('authRegister').classList.remove('hidden');
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const pass = document.getElementById('loginPass').value;
  if (!email || !pass) return showError('Completá email y contraseña');
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) return showError(error.message);
  await initApp(data.user);
}

async function doRegister() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim().toLowerCase();
  const pass = document.getElementById('regPass').value;
  if (!name || !email || !pass) return showError('Completá todos los campos');
  if (pass.length < 6) return showError('La contraseña debe tener al menos 6 caracteres');
  const { data, error } = await sb.auth.signUp({
    email, password: pass,
    options: { data: { full_name: name, email: email } }
  });
  if (error) return showError(error.message);
  if (data.user && !data.user.confirmed_at) {
    toast('Cuenta creada. Revisá tu email para confirmar.');
  } else {
    await initApp(data.user);
  }
}

async function doLogout() {
  await sb.auth.signOut();
  currentUser = null; currentProfile = null;
  document.getElementById('appMain').classList.add('hidden');
  document.getElementById('authScreen').classList.remove('hidden');
}

async function initApp(user) {
  currentUser = user;
  // Fetch profile
  const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
  if (!profile) {
    showError('No se encontró tu perfil. Contactá al administrador.');
    return;
  }
  currentProfile = profile;
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('appMain').classList.remove('hidden');
  document.getElementById('userName').textContent = profile.full_name;
  document.getElementById('userRole').textContent = profile.role + (profile.sub_roles?.length ? ' / ' + profile.sub_roles.join(', ') : '');

  // Load extra data in parallel, non-blocking (tables may not exist yet)
  await Promise.allSettled([
    loadUsuarioMarcas(),
    loadAllProfiles(),
    loadPlantillas()
  ]);

  // Show/hide tabs based on role
  const comexTab = document.querySelector('[data-tab="comex"]');
  if (comexTab) {
    if (profile.role === 'compras' && profile.sub_roles?.includes('comex') || profile.can_approve_solicitud) {
      comexTab.classList.remove('hidden');
    } else {
      comexTab.classList.add('hidden');
    }
  }
  // Stock tab for compras and admin
  const stockTab = document.querySelector('[data-tab="stock"]');
  if (stockTab) {
    if (['compras','admin'].includes(profile.role)) {
      stockTab.classList.remove('hidden');
    }
  }
  // MRP tab for compras and admin
  const mrpTab = document.querySelector('[data-tab="mrp"]');
  if (mrpTab) {
    if (['compras','admin'].includes(profile.role)) {
      mrpTab.classList.remove('hidden');
    }
  }
  // Admin tab only for admin role
  const adminTab = document.querySelector('[data-tab="admin"]');
  if (adminTab) {
    if (profile.role === 'admin' || (profile.role === 'compras' && profile.can_approve_solicitud)) {
      adminTab.classList.remove('hidden');
    } else {
      adminTab.classList.add('hidden');
    }
  }

  await loadSolicitudes();
  switchTab('dashboard');
}

async function loadSolicitudes() {
  const { data, error } = await sb.from('solicitudes')
    .select('*, profiles!solicitudes_created_by_fkey(full_name, email, role)')
    .order('created_at', { ascending: false });
  if (!error) solicitudes = data || [];

  // Load retroplan pasos for all active solicitudes (for semáforo)
  const activeIds = solicitudes.filter(s => !['Completado','Rechazada'].includes(s.status)).map(s => s.id);
  if (activeIds.length) {
    const { data: pasos } = await sb.from('retroplan_pasos')
      .select('solicitud_id, nombre, fecha_objetivo, completado, responsable')
      .in('solicitud_id', activeIds)
      .eq('completado', false)
      .order('orden');
    allPendingPasos = pasos || [];
  } else {
    allPendingPasos = [];
  }
}

async function loadSolicitudFull(id) {
  const [sol, items, pasos, insp, comex, comments, history] = await Promise.all([
    sb.from('solicitudes').select('*, profiles!solicitudes_created_by_fkey(full_name, email, role)').eq('id', id).single(),
    sb.from('solicitud_items').select('*').eq('solicitud_id', id).order('created_at'),
    sb.from('retroplan_pasos').select('*').eq('solicitud_id', id).order('orden'),
    sb.from('inspecciones').select('*').eq('solicitud_id', id).order('created_at'),
    sb.from('comex_seguimiento').select('*').eq('solicitud_id', id).single(),
    sb.from('comentarios').select('*, profiles(full_name)').eq('solicitud_id', id).order('created_at', { ascending: false }),
    sb.from('historial').select('*, profiles(full_name)').eq('solicitud_id', id).order('created_at', { ascending: false })
  ]);
  return {
    solicitud: sol.data, items: items.data || [], pasos: pasos.data || [],
    inspecciones: insp.data || [], comex: comex.data, comentarios: comments.data || [], historial: history.data || []
  };
}

async function loadUsuarioMarcas() {
  try {
    const { data, error } = await sb.from('usuario_marcas').select('user_id, marca, profiles(email)');
    if (error || !data || data.length === 0) {
      // Fallback to hardcoded map if table doesn't exist or is empty
      MARCAS_POR_USUARIO = { ...MARCAS_POR_USUARIO_FALLBACK };
      return;
    }
    const map = {};
    data.forEach(row => {
      const email = row.profiles?.email?.toLowerCase();
      if (!email) return;
      if (row.marca === '__ALL__') { map[email] = '__ALL__'; return; }
      if (map[email] === '__ALL__') return;
      if (!map[email]) map[email] = [];
      map[email].push(row.marca);
    });
    MARCAS_POR_USUARIO = map;
  } catch (e) {
    console.warn('Failed to load usuario_marcas, using fallback:', e);
    MARCAS_POR_USUARIO = { ...MARCAS_POR_USUARIO_FALLBACK };
  }
}

async function loadAllProfiles() {
  try {
    const { data } = await sb.from('profiles').select('id, email, full_name, role, sub_roles, can_approve_solicitud, active');
    allProfiles = data || [];
  } catch (e) { allProfiles = []; }
}

async function loadPlantillas() {
  try {
    const { data } = await sb.from('plantillas_marca').select('*');
    plantillasMarca = {};
    (data || []).forEach(p => { plantillasMarca[p.marca] = p; });
  } catch (e) { plantillasMarca = {}; }
}

  return currentProfile?.role === 'marcas';
}

  return currentProfile?.sub_roles?.includes('comex');

  return currentProfile?.sub_roles?.includes('calidad');

function canDelete() {
  const email = currentProfile?.email?.toLowerCase();
  return email === 'nguarino@cdimex.com.ar' || email === 'mjaimes@cdimex.com.ar' || canApprove();
}
function canActOnBrand(marca) {
  // Compras, Comex, Calidad, Admin → can act on any brand
  if (!isMarcas()) return true;
  // can_approve (admin) → can act on any brand
  if (canApprove()) return true;
  const email = currentProfile?.email?.toLowerCase();
  const assigned = MARCAS_POR_USUARIO[email];
  if (!assigned) return false; // email not in map → no access
  if (assigned === '__ALL__') return true; // Director General
  return assigned.includes(marca);
}
function getMisMarcas() {
  const email = currentProfile?.email?.toLowerCase();
  const assigned = MARCAS_POR_USUARIO[email];
  if (!assigned) return [];
  if (assigned === '__ALL__') return MARCAS;
  return assigned;
}

// =============================================
// RETRY SYSTEM & OPERATION WRAPPER
// =============================================
async function withRetry(fn, { retries = 1, label = 'Operación' } = {}) {
  let lastError;
  for (let attempt = 0; attempt <= retries; attempt++) {
    try {
      const result = await fn();
      return result;
    } catch (err) {
      lastError = err;
      console.error(`${label} attempt ${attempt + 1} failed:`, err);
      if (attempt < retries) await new Promise(r => setTimeout(r, 800));
    }
  }
  toast(`${label} falló: ${lastError?.message || 'Error'}. Intentá de nuevo.`, true);
  return null;
}

function pill(status) {
  return `<span class="pill ${STATUS_PILL_CLASS[status] || 'pill-active'}">${status}</span>`;
}

function fmtDate(d) {
  if (!d) return '-';
  return new Date(d + 'T12:00:00').toLocaleDateString('es-AR', { day:'2-digit', month:'short', year:'numeric' });
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr + 'T12:00:00');
  const today = new Date(); today.setHours(12,0,0,0);
  return Math.round((d - today) / 86400000);
}

function calcularSemaforo(activas) {
  const verde = [], amarillo = [], rojo = [];

  activas.forEach(s => {
    // Get pending pasos for this solicitud, sorted by order
    const pasos = allPendingPasos.filter(p => p.solicitud_id === s.id);
    if (!pasos.length) { verde.push({ sol: s, paso: null, dias: null, detalle: 'Sin pasos pendientes' }); return; }

    // Find the NEXT pending paso (first one not completed)
    const next = pasos[0];
    const dias = daysUntil(next.fecha_objetivo);

    const responsableLabel = {
      'marcas': 'Marcas', 'compras': 'Compras', 'comex': 'Comex',
      'calidad': 'Calidad', 'conjunto': 'Conjunto'
    }[next.responsable] || next.responsable || '';

    const entry = {
      sol: s,
      paso: next.nombre,
      dias,
      responsable: responsableLabel,
      detalle: `${next.nombre} (${responsableLabel})`
    };

    if (dias === null || dias > 10) {
      verde.push(entry);
    } else if (dias > 0) {
      amarillo.push(entry);
    } else {
      rojo.push(entry);
    }
  });

  // Sort: más urgente primero
  amarillo.sort((a, b) => (a.dias ?? 999) - (b.dias ?? 999));
  rojo.sort((a, b) => (a.dias ?? 999) - (b.dias ?? 999));

  return { verde, amarillo, rojo };
}

function semaforoItem(x) {
  const diasText = x.dias === null ? '' : x.dias === 0 ? 'Vence hoy' : x.dias > 0 ? `${x.dias}d restantes` : `Vencido hace ${Math.abs(x.dias)}d`;
  return `<div class="semaforo-item" onclick="openSolicitud('${x.sol.id}')">
    <div class="sol-name">#${x.sol.numero} ${x.sol.nombre}</div>
    <div class="sol-paso">Pendiente: ${x.detalle} ${diasText ? '— ' + diasText : ''}</div>
  </div>`;
}

  }
  return '';

function showDashboardList(type) {
  const section = document.getElementById('dashboardListSection');
  if (!section) return;
  let list = [];
  let title = '';
  if (type === 'pending') {
    list = solicitudes.filter(s => s.status === 'Pendiente aprobación Compras');
    title = 'Pendientes de aprobación';
  } else if (type === 'myPending') {
    list = solicitudes.filter(s => {
      if (isMarcas()) return s.status.includes('Marcas') && canActOnBrand(s.marca);
      if (isCalidad()) return s.status.includes('Calidad') || s.status.includes('Inspección');
      if (isComex()) return ['Comex - Proforma y pago','Orden de producción','Booking shipping','En tránsito','Nacionalización'].includes(s.status);
      if (isCompras()) return ['Pendiente aprobación Compras','Propuesta de proveedores','Cotización y negociación','Pedido de muestras','Muestras en tránsito','Esperando muestras técnicas','Aprobada - Lista para OC','OC emitida','En producción'].includes(s.status);
      return false;
    });
    title = 'Requieren tu acción';
  }
  section.innerHTML = `
    <h3 style="color:var(--gold);margin-bottom:12px;">${title} (${list.length})</h3>
    <div class="grid grid-2">
      ${list.length ? list.map(s => solicitudCard(s)).join('') : '<p style="color:var(--txt2)">Sin solicitudes</p>'}
    </div>`;
}

function filterSolicitudes() {
  const q = document.getElementById('searchSol').value.toLowerCase();
  const st = document.getElementById('filterStatus').value;
  const mk = document.getElementById('filterMarca').value;
  let filtered = solicitudes;
  if (q) filtered = filtered.filter(s => s.nombre.toLowerCase().includes(q) || String(s.numero).includes(q));
  if (st) filtered = filtered.filter(s => s.status === st);
  else filtered = filtered.filter(s => s.status !== 'Eliminada'); // Hide eliminated by default
  if (mk) filtered = filtered.filter(s => s.marca === mk);
  document.getElementById('solList').innerHTML = filtered.map(s => solicitudCard(s, true)).join('') || '<p style="color:var(--txt2)">Sin resultados</p>';
}

async function renderMetricas(c) {
  c.innerHTML = '<div style="text-align:center;padding:40px;"><div class="spinner" style="margin:0 auto;width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;"></div><p style="color:var(--txt2);margin-top:12px;">Cargando métricas...</p></div>';

  let metrics = null;
  let alerts = null;
  try {
    const [mRes, aRes] = await Promise.allSettled([
      sb.rpc('get_metrics_data'),
      sb.rpc('get_smart_alerts')
    ]);
    if (mRes.status === 'fulfilled' && !mRes.value?.error) metrics = mRes.value?.data;
    if (aRes.status === 'fulfilled' && !aRes.value?.error) alerts = aRes.value?.data;
  } catch (e) {
    console.warn('Metrics RPC failed, computing from local data:', e);
  }

  // Local computed metrics as fallback
  const activas = solicitudes.filter(s => !['Completado','Rechazada','Eliminada'].includes(s.status));
  const completadas = solicitudes.filter(s => s.status === 'Completado');
  const sinMov = activas.filter(s => {
    const days = Math.round((Date.now() - new Date(s.updated_at).getTime()) / 86400000);
    return days >= 5;
  });

  // Por marca local
  const porMarcaLocal = {};
  solicitudes.forEach(s => {
    if (!porMarcaLocal[s.marca]) porMarcaLocal[s.marca] = { total: 0, activas: 0, completadas: 0 };
    porMarcaLocal[s.marca].total++;
    if (s.status === 'Completado') porMarcaLocal[s.marca].completadas++;
    else if (!['Rechazada','Eliminada'].includes(s.status)) porMarcaLocal[s.marca].activas++;
  });

  // Por tipo local
  const porTipoLocal = {};
  solicitudes.forEach(s => {
    if (!porTipoLocal[s.tipo]) porTipoLocal[s.tipo] = { total: 0, activas: 0, completadas: 0 };
    porTipoLocal[s.tipo].total++;
    if (s.status === 'Completado') porTipoLocal[s.tipo].completadas++;
    else if (!['Rechazada','Eliminada'].includes(s.status)) porTipoLocal[s.tipo].activas++;
  });

  const porMarca = metrics?.por_marca || Object.entries(porMarcaLocal).map(([marca, v]) => ({ marca, ...v }));
  const porTipo = metrics?.por_tipo || Object.entries(porTipoLocal).map(([tipo, v]) => ({ tipo, ...v }));
  const cuellos = metrics?.cuellos_botella || [];
  const tiempoPorEstado = metrics?.tiempo_por_estado || [];
  const tendencia = metrics?.tendencia_mensual || [];
  const alertSinMov = alerts?.sin_movimiento || sinMov.map(s => ({ numero: s.numero, nombre: s.nombre, marca: s.marca, status: s.status, dias_sin_movimiento: Math.round((Date.now() - new Date(s.updated_at).getTime()) / 86400000) }));
  const alertInsp = alerts?.inspeccion_vencida || [];
  const alertPasos = alerts?.paso_excede_promedio || [];

  const maxMarca = porMarca.length ? Math.max(...porMarca.map(m => m.total || 0), 1) : 1;
  const maxTipo = porTipo.length ? Math.max(...porTipo.map(t => t.total || 0), 1) : 1;
  const maxCuello = cuellos.length ? Math.max(...cuellos.map(c => Math.abs(c.dias_promedio_retraso || 0)), 1) : 1;

  c.innerHTML = `
    <!-- ALERTAS INTELIGENTES -->
    <div class="section">
      <h3 style="color:var(--red);">Alertas Inteligentes</h3>
      <div class="grid grid-2" style="gap:12px;">
        <div class="metric-card">
          <h4>Sin movimiento (+5 días) — ${(alertSinMov||[]).length}</h4>
          ${(alertSinMov||[]).length ? (alertSinMov||[]).slice(0,8).map(a => `
            <div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;">
              <strong>#${a.numero}</strong> ${a.nombre} <span style="color:var(--txt2);">(${a.marca})</span>
              <span style="float:right;color:var(--red);font-weight:600;">${a.dias_sin_movimiento}d</span>
            </div>`).join('') : '<p style="color:var(--green);font-size:13px;">Todo en movimiento</p>'}
        </div>
        <div class="metric-card">
          <h4>Inspecciones desaprobadas pendientes — ${(alertInsp||[]).length}</h4>
          ${(alertInsp||[]).length ? (alertInsp||[]).slice(0,6).map(a => `
            <div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;">
              <strong>#${a.numero}</strong> ${a.nombre} <span style="color:var(--txt2);">(${a.tipo})</span>
            </div>`).join('') : '<p style="color:var(--green);font-size:13px;">Sin inspecciones pendientes</p>'}
        </div>
      </div>
      ${(alertPasos||[]).length ? `<div class="metric-card" style="margin-top:12px;">
        <h4>Pasos con mayor retraso</h4>
        ${(alertPasos||[]).slice(0,6).map(a => `
          <div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;">
            <strong>#${a.numero}</strong> ${a.nombre} — <em>${a.paso}</em>
            <span style="float:right;color:var(--red);font-weight:600;">${a.dias_excedido}d vencido</span>
          </div>`).join('')}
      </div>` : ''}
    </div>

    <!-- DISTRIBUCIÓN -->
    <div class="section">
      <h3 style="color:var(--gold);">Distribución</h3>
      <div class="grid grid-2" style="gap:12px;">
        <div class="metric-card">
          <h4>Por Marca (${porMarca.length})</h4>
          <div class="bar-chart">
            ${porMarca.map(m => `<div class="bar-row">
              <div class="bar-label">${m.marca}</div>
              <div class="bar-fill" style="width:${Math.max((m.activas/maxMarca)*100,5)}%;background:var(--violet);">${m.activas}</div>
              <div class="bar-fill" style="width:${Math.max((m.completadas/maxMarca)*100,5)}%;background:var(--green);">${m.completadas}</div>
            </div>`).join('')}
          </div>
          <div style="margin-top:8px;font-size:11px;color:var(--txt2);display:flex;gap:16px;">
            <span><span style="display:inline-block;width:10px;height:10px;background:var(--violet);border-radius:2px;"></span> Activas</span>
            <span><span style="display:inline-block;width:10px;height:10px;background:var(--green);border-radius:2px;"></span> Completadas</span>
          </div>
        </div>
        <div class="metric-card">
          <h4>Por Tipo (${porTipo.length})</h4>
          <div class="bar-chart">
            ${porTipo.map(t => `<div class="bar-row">
              <div class="bar-label">${t.tipo.substring(0,25)}</div>
              <div class="bar-fill" style="width:${Math.max((t.activas/maxTipo)*100,5)}%;background:var(--blue);">${t.activas}</div>
              <div class="bar-fill" style="width:${Math.max((t.completadas/maxTipo)*100,5)}%;background:var(--green);">${t.completadas}</div>
            </div>`).join('')}
          </div>
        </div>
      </div>
    </div>

    <!-- CUELLOS DE BOTELLA -->
    ${cuellos.length ? `<div class="section">
      <h3 style="color:var(--orange);">Cuellos de Botella</h3>
      <div class="metric-card">
        <div class="bar-chart">
          ${cuellos.map(cb => `<div class="bar-row">
            <div class="bar-label">${cb.paso?.substring(0,25) || 'N/A'}</div>
            <div class="bar-fill" style="width:${Math.max((Math.abs(cb.dias_promedio_retraso)/maxCuello)*100,8)}%;background:${Math.abs(cb.dias_promedio_retraso) > 10 ? 'var(--red)' : 'var(--orange)'};">${cb.dias_promedio_retraso}d (${cb.cantidad_retrasados})</div>
          </div>`).join('')}
        </div>
      </div>
    </div>` : ''}

    <!-- TIEMPO POR ESTADO -->
    ${tiempoPorEstado.length ? `<div class="section">
      <h3 style="color:var(--blue);">Tiempo promedio entre estados</h3>
      <div class="metric-card">
        <table style="width:100%;border-collapse:collapse;font-size:13px;">
          <tr style="color:var(--txt2);"><th style="text-align:left;padding:6px;">Transición</th><th style="text-align:right;padding:6px;">Días prom.</th><th style="text-align:right;padding:6px;">Cantidad</th></tr>
          ${tiempoPorEstado.map(t => `<tr style="border-top:1px solid var(--border);">
            <td style="padding:6px;">${(t.estado_desde||'').replace('Cambió estado a ','')}</td>
            <td style="text-align:right;padding:6px;font-weight:600;color:${t.dias_promedio > 7 ? 'var(--orange)' : 'var(--green)'};">${t.dias_promedio}</td>
            <td style="text-align:right;padding:6px;color:var(--txt2);">${t.cantidad}</td>
          </tr>`).join('')}
        </table>
      </div>
    </div>` : ''}

    <!-- TENDENCIA -->
    ${tendencia.length ? `<div class="section">
      <h3 style="color:var(--green);">Tendencia Mensual (últimos 12 meses)</h3>
      <div class="metric-card">
        <div style="display:flex;align-items:flex-end;gap:4px;height:140px;padding-top:10px;">
          ${tendencia.map(t => {
            const maxH = Math.max(...tendencia.map(x => x.creadas), 1);
            const h = Math.max((t.creadas / maxH) * 120, 4);
            return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;">
              <span style="font-size:10px;color:var(--txt2);">${t.creadas}</span>
              <div style="width:100%;height:${h}px;background:var(--gold);border-radius:3px 3px 0 0;"></div>
              <span style="font-size:9px;color:var(--txt2);transform:rotate(-45deg);white-space:nowrap;">${t.mes?.substring(5) || ''}</span>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>` : ''}
  `;
}

  try {
    const [alertRes, prodRes, cfgRes, prodnRes] = await Promise.allSettled([
      sb.rpc('get_stock_alerts_data'),
      sb.from('stock_productos').select('*').order('marca').order('cobertura_meses', { ascending: true }),
      sb.from('config_marcas').select('*').order('marca'),
      sb.from('producciones_planificadas').select('codigo, mes, cantidad').gte('mes', new Date().toISOString().substring(0, 7) + '-01'),
    ]);
    stockData = (alertRes.status === 'fulfilled' && !alertRes.value?.error) ? alertRes.value?.data : null;
    stockProductos = (prodRes.status === 'fulfilled' && !prodRes.value?.error) ? (prodRes.value?.data || []) : [];
    configMarcasData = (cfgRes.status === 'fulfilled' && !cfgRes.value?.error) ? (cfgRes.value?.data || []) : [];
    produccionesData = (prodnRes.status === 'fulfilled' && !prodnRes.value?.error) ? (prodnRes.value?.data || []) : [];
  } catch (e) {
    console.warn('Error loading stock data:', e.message);
    stockData = null;
    stockProductos = [];
    configMarcasData = [];
  }
}

function getProductLeadTime(p) {
  if (p.lead_time_meses) return p.lead_time_meses;
  const cm = configMarcasData.find(c => c.marca === p.marca);
  return cm?.lead_time_meses || 3;
}

function getStockNivel(p) {
  const cm = configMarcasData.find(c => c.marca === p.marca);
  const umbral = cm?.umbral_alerta_meses || 2;
  const lt = getProductLeadTime(p);
  if (p.stock_actual <= 0) return 'SIN STOCK';
  if (p.cobertura_meses <= 1) return 'CRITICO';
  if (p.cobertura_meses <= umbral) return 'ALERTA';
  if (p.cobertura_meses <= lt) return 'ATENCIÓN';
  return 'OK';
}

function filterStockTable() {
  const marca = document.getElementById('stockFilterMarca')?.value || '';
  const riesgo = document.getElementById('stockFilterRiesgo')?.value || '';
  const search = (document.getElementById('stockSearch')?.value || '').toLowerCase();

  let filtered = stockProductos;
  if (marca) filtered = filtered.filter(p => p.marca === marca);
  if (search) filtered = filtered.filter(p => p.nombre.toLowerCase().includes(search) || p.codigo.toLowerCase().includes(search));

  // Add nivel to each
  filtered = filtered.map(p => ({ ...p, nivel: getStockNivel(p) }));

  if (riesgo === 'critico') filtered = filtered.filter(p => p.nivel === 'SIN STOCK' || p.nivel === 'CRITICO');
  else if (riesgo === 'alerta') filtered = filtered.filter(p => p.nivel === 'ALERTA');
  else if (riesgo === 'atencion') filtered = filtered.filter(p => p.nivel === 'ATENCIÓN');
  else if (riesgo === 'ok') filtered = filtered.filter(p => p.nivel === 'OK');

  const riskColor = (nivel) => {
    switch(nivel) {
      case 'SIN STOCK': return 'var(--red)';
      case 'CRITICO': return 'var(--red)';
      case 'ALERTA': return 'var(--orange)';
      case 'ATENCIÓN': return 'var(--gold)';
      default: return 'var(--green)';
    }
  };
  const riskBg = (nivel) => {
    switch(nivel) {
      case 'SIN STOCK': return 'rgba(239,68,68,.15)';
      case 'CRITICO': return 'rgba(239,68,68,.1)';
      case 'ALERTA': return 'rgba(249,115,22,.1)';
      case 'ATENCIÓN': return 'rgba(240,192,64,.1)';
      default: return 'transparent';
    }
  };

  const tbody = document.getElementById('stockTableBody');
  if (!tbody) return;

  // Build production lookup: sum of all planned production per codigo
  const prodLookup = {};
  (produccionesData || []).forEach(pp => {
    prodLookup[pp.codigo] = (prodLookup[pp.codigo] || 0) + (pp.cantidad || 0);
  });

  tbody.innerHTML = filtered.slice(0, 200).map(p => {
    const cm = configMarcasData.find(c => c.marca === p.marca);
    const lt = cm?.lead_time_meses || 3;
    const tipoAbast = cm?.tipo_abastecimiento || 'fabricacion';
    const demanda = p.forecast_proximo_mes || p.venta_mensual_avg;
    const prodPlanif = prodLookup[p.codigo] || 0;
    // Compra sugerida: demanda durante lead time - (stock + producción planificada)
    const compraSugerida = Math.max(0, Math.round(lt * demanda - p.stock_actual - prodPlanif));

    return `<tr style="border-bottom:1px solid var(--border);background:${riskBg(p.nivel)};">
      <td style="padding:8px;font-family:monospace;font-size:12px;">${p.codigo}</td>
      <td style="padding:8px;">${p.nombre}</td>
      <td style="padding:8px;font-size:12px;">${p.marca}</td>
      <td style="padding:8px;text-align:right;font-weight:bold;">${Math.round(p.stock_actual).toLocaleString('es-AR')}</td>
      <td style="padding:8px;text-align:right;">${Math.round(p.venta_mensual_avg).toLocaleString('es-AR')}</td>
      <td style="padding:8px;text-align:right;">${p.forecast_proximo_mes ? Math.round(p.forecast_proximo_mes).toLocaleString('es-AR') : '-'}</td>
      <td style="padding:8px;text-align:right;color:${prodPlanif > 0 ? 'var(--green)' : 'var(--txt2)'};">${prodPlanif > 0 ? Math.round(prodPlanif).toLocaleString('es-AR') : '-'}</td>
      <td style="padding:8px;text-align:right;font-weight:bold;color:${riskColor(p.nivel)};">${p.cobertura_meses}m</td>
      <td style="padding:8px;text-align:center;">
        <input type="number" value="${lt}" min="0.5" max="24" step="0.5" style="width:55px;text-align:center;font-size:11px;padding:2px 4px;"
          onchange="saveProductLeadTime('${p.id}',this.value)" title="Lead time (meses)">
      </td>
      <td style="padding:8px;text-align:center;">
        <span style="background:${riskBg(p.nivel)};color:${riskColor(p.nivel)};padding:2px 8px;border-radius:12px;font-size:11px;font-weight:bold;">${p.nivel}</span>
      </td>
      <td style="padding:8px;text-align:right;font-weight:bold;">${compraSugerida > 0 ? compraSugerida.toLocaleString('es-AR') : '-'}</td>
      <td style="padding:8px;text-align:center;">
        ${p.nivel !== 'OK' ? `<button class="btn-gold btn-sm" onclick="crearSolicitudDesdeStock('${p.codigo}','${p.marca}',${compraSugerida})">Crear OC</button>` : ''}
      </td>
    </tr>`;
  }).join('');

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="12" style="padding:20px;text-align:center;color:var(--txt2);">No hay productos que coincidan con los filtros</td></tr>';
  }
  if (filtered.length > 200) {
    tbody.innerHTML += `<tr><td colspan="12" style="padding:8px;text-align:center;color:var(--txt2);font-size:12px;">Mostrando 200 de ${filtered.length} productos. Usá los filtros para acotar.</td></tr>`;
  }
}

async function saveConfigMarca(id) {
  const lt = parseFloat(document.getElementById('lt_' + id)?.value);
  const ua = parseFloat(document.getElementById('ua_' + id)?.value);
  if (isNaN(lt) || isNaN(ua)) { toast('Valores inválidos', true); return; }
  const { error } = await sb.from('config_marcas').update({ lead_time_meses: lt, umbral_alerta_meses: ua, updated_at: new Date().toISOString() }).eq('id', id);
  if (error) { toast('Error: ' + error.message, true); return; }
  toast('Configuración guardada');
  await renderStock(document.getElementById('tabContent'));
}

async function saveProductLeadTime(productId, value) {
  const lt = parseFloat(value);
  if (isNaN(lt) || lt <= 0) { toast('Lead time inválido', true); return; }
  const { error } = await sb.from('stock_productos').update({ lead_time_meses: lt }).eq('id', productId);
  if (error) { toast('Error: ' + error.message, true); return; }
  // Update local cache
  const prod = stockProductos.find(p => p.id === productId);
  if (prod) prod.lead_time_meses = lt;
  toast(`Lead time actualizado: ${lt} meses`);
  filterStockTable(); // Re-render with new nivel
}

async function triggerSync() {
  toast('Sincronizando con Google Sheets...');
  try {
    const { data: { session } } = await sb.auth.getSession();
    const token = session?.access_token || '';
    const resp = await fetch('/api/sync-sheets', { headers: { 'Authorization': 'Bearer ' + token } });
    const data = await resp.json();
    if (resp.ok) {
      console.log('Sync response:', JSON.stringify(data));
      const ss = data.stock_sistema;
      const bom = data.bom;
      const prod = data.producciones;
      const msg = `Sync OK: Sistema=${ss?.updated||0} upd | Stocks=${data.stocks?.updated||0} | Forecast=${data.forecast?.updated||0} | BOM=${bom?.componentes||0} | Prod=${prod?.records||0}`;
      toast(msg);
      // Refresh current tab
      const c = document.getElementById('tabContent');
      if (currentTab === 'mrp') await renderMRPPage(c);

    toast('Error de conexión: ' + e.message, true);
  }
}

// ─── MRP TAB — Demand Planning S&OP ───
// PROBLEMA IDENTIFICADO: stock_productos tiene códigos sintéticos (del nombre),
// pero bom_productos tiene códigos reales numéricos del sistema.
// SOLUCIÓN: Partir del BOM (lo que fabricamos), cruzar con stock por múltiples claves,
// y mostrar todo incluso sin match perfecto.

const MARCAS_DISC = new Set(['relazzi', 'little paris']);
const COMPRA_EXT_LT = { 'fascino': 150 }; // marca lowercase → LT días
const COB_PT = 60;
const COB_INS = 60;
const COB_PIPE = 120; // PT + insumos

async function renderMRPPage(c) {
  c.innerHTML = '<div style="text-align:center;padding:40px;color:var(--txt2);">Calculando plan de abastecimiento...</div>';

  try {
    const [cmRes, spRes, prRes, bomRes, insRes] = await Promise.all([
      sb.from('config_marcas').select('*'),
      sb.from('stock_productos').select('codigo, nombre, marca, segmento, polo, stock_actual, venta_mensual_avg, forecast_proximo_mes').range(0, 9999),
      sb.from('producciones_planificadas').select('codigo, mes, cantidad').gte('mes', new Date().toISOString().substring(0,7)+'-01').range(0, 9999),
      sb.from('bom_productos').select('codigo_principal, nombre_principal, codigo_insumo, detalle_insumo, cantidad_formula, es_envase, nivel').range(0, 9999),
      sb.from('stock_insumos').select('codigo, detalle, stock_fisico, tipo_insumo_global, lead_time_dias').range(0, 9999),
    ]);

    const configMarcas = cmRes.data || [];
    const stockProds = spRes.data || [];
    const prodPlan = prRes.data || [];
    const bomRows = bomRes.data || [];
    const insumos = insRes.data || [];

    // ══════════════════════════════════════════
    // 1. ÍNDICES
    // ══════════════════════════════════════════
    const insIdx = {};
    insumos.forEach(i => { insIdx[i.codigo] = i; });

    // Producciones: total + primer mes planificado
    const prodIdx = {};   // codigo → total cantidad
    const prodFecha = {}; // codigo → primer mes (fecha más cercana)
    prodPlan.forEach(p => {
      prodIdx[p.codigo] = (prodIdx[p.codigo] || 0) + (p.cantidad || 0);
      if (!prodFecha[p.codigo] || p.mes < prodFecha[p.codigo]) prodFecha[p.codigo] = p.mes;
    });

    const marcaLT = {};
    const marcasFab = new Set(); // marcas con tipo_abastecimiento = fabricacion
    configMarcas.forEach(cm => {
      marcaLT[cm.marca] = (cm.lead_time_meses || 3) * 30;
      if ((cm.tipo_abastecimiento || '').toLowerCase().includes('fabric')) marcasFab.add(cm.marca.toUpperCase());
    });

    // Stock lookup por código y por nombre
    // PRIORIDAD: registros del forecast (tienen segmento/polo cargado → marca correcta)
    const spByCodigo = {};
    const spByNombre = {};
    // First pass: all records
    stockProds.forEach(p => {
      const existing = spByCodigo[p.codigo];
      // Prefer forecast records (have polo/segmento) over syncStocks records (synthetic codes, wrong marca)
      const isForecast = !!(p.polo || p.segmento || p.forecast_proximo_mes);
      const existIsForecast = existing ? !!(existing.polo || existing.segmento || existing.forecast_proximo_mes) : false;
      if (!existing || (isForecast && !existIsForecast)) {
        spByCodigo[p.codigo] = p;
      }
      const nKey = (p.nombre || '').toUpperCase().replace(/\s+/g, ' ').trim();
      if (nKey) {
        const existN = spByNombre[nKey];
        const existNIsForecast = existN ? !!(existN.polo || existN.segmento || existN.forecast_proximo_mes) : false;
        if (!existN || (isForecast && !existNIsForecast)) spByNombre[nKey] = p;
      }
    });

    // ══════════════════════════════════════════
    // 2. BOM INDEX: productos con fórmula
    // ══════════════════════════════════════════
    const bomByPT = {};
    bomRows.forEach(b => {
      if (!bomByPT[b.codigo_principal]) bomByPT[b.codigo_principal] = { codigo: b.codigo_principal, nombre: b.nombre_principal || '', componentes: [] };
      bomByPT[b.codigo_principal].componentes.push(b);
    });
    const bomCodigos = new Set(Object.keys(bomByPT));
    const nBOM = bomCodigos.size;

    // ══════════════════════════════════════════
    // 3. CONSTRUIR LISTA COMPLETA DE FABRICACIÓN
    //    Fuente 1: Productos con BOM (tienen fórmula)
    //    Fuente 2: Productos de marcas con tipo_abastecimiento=fabricacion (sin BOM pero son fabricación)
    //    Esto captura TODOS los productos de fabricación, no solo los del BOM
    // ══════════════════════════════════════════
    const fabMap = {}; // codigo → product data

    // Helper: match stock product to BOM/stock data
    function matchSP(codigo, nombre) {
      let sp = spByCodigo[codigo];
      if (!sp && nombre) {
        const nKey = nombre.toUpperCase().replace(/\s+/g, ' ').trim();
        sp = spByNombre[nKey];
      }
      if (!sp && nombre) {
        const bpUp = nombre.toUpperCase();
        for (const p of stockProds) {
          const pUp = (p.nombre || '').toUpperCase();
          if (pUp && bpUp && (pUp.includes(bpUp) || bpUp.includes(pUp))) { sp = p; break; }
        }
      }
      return sp;
    }

    function buildFabItem(codigo, nombre, marca, sp, componentes) {
      const stock = sp ? (sp.stock_actual || 0) : 0;
      const forecast = sp ? (sp.forecast_proximo_mes || 0) : 0;
      const vtaAvg = sp ? (sp.venta_mensual_avg || 0) : 0;
      const matched = !!sp;
      const vtaMes = Math.max(forecast, vtaAvg);
      const vta3m = vtaMes * 3; // proyección 3 meses
      const demDia = vtaMes / 30;
      const prod = prodIdx[codigo] || (sp ? (prodIdx[sp.codigo] || 0) : 0);
      const fechaProd = prodFecha[codigo] || (sp ? prodFecha[sp.codigo] : null);
      const hasBOM = componentes && componentes.length > 0;

      // Stock insumos por tipo (botella, estuche, esencia)
      let insBot = null, insEst = null, insEse = null;
      let producibles = 0, cuello = null;
      if (hasBOM) {
        producibles = Infinity;
        componentes.forEach(comp => {
          const ins = insIdx[comp.codigo_insumo];
          const stk = ins ? (ins.stock_fisico || 0) : 0;
          const qty = comp.cantidad_formula > 0 ? comp.cantidad_formula : 1;
          const rinde = Math.floor(stk / qty);

          // Clasificar tipo desde detalle del BOM (siempre presente) + fallback a stock_insumos
          const det = (comp.detalle_insumo || '').toUpperCase();
          const tipoIns = ins ? (ins.tipo_insumo_global || '') : '';
          const esFrasco = tipoIns === 'frasco' || det.includes('FRASCO') || det.includes('ENVASE') || det.includes('BOTELLA');
          const esEstuche = tipoIns === 'estuche' || det.includes('ESTUCHE') || det.includes('CAJA') || det.includes('INTERIOR') || det.includes('DISPLAY');
          const esEsencia = tipoIns === 'esencia' || det.includes('ESENCIA') || det.includes('FRAGANCIA') || det.includes('PERFUME') || det.includes('ACEITE');

          // Guardar stock del tipo (mínimo si hay varios del mismo tipo)
          if (esFrasco) insBot = insBot === null ? stk : Math.min(insBot, stk);
          if (esEstuche) insEst = insEst === null ? stk : Math.min(insEst, stk);
          if (esEsencia) insEse = insEse === null ? stk : Math.min(insEse, stk);

          if (rinde < producibles) {
            producibles = rinde;
            cuello = { cod: comp.codigo_insumo, det: comp.detalle_insumo || '', stk, qty, rinde };
          }
        });
        if (producibles === Infinity || producibles < 0) producibles = 0;
      }

      // Cobertura basada en proyección 3 meses (demDia promedio)
      const cobPT = demDia > 0 ? Math.round(stock / demDia) : (stock > 0 ? 999 : 0);
      const cobTot = demDia > 0 ? Math.round((stock + prod + producibles) / demDia) : (stock + prod + producibles > 0 ? 999 : 0);
      const disponible = stock + prod + producibles;

      let quiebrePT = null, quiebreTot = null;
      if (demDia > 0) {
        const hoy = new Date();
        quiebrePT = new Date(hoy.getTime() + cobPT * 86400000);
        quiebreTot = new Date(hoy.getTime() + cobTot * 86400000);
      }

      const discMarca = MARCAS_DISC.has((marca || '').toLowerCase());
      const extMarca = !!COMPRA_EXT_LT[(marca || '').toLowerCase()];

      let accion = '', urg = 0;
      if (discMarca) { accion = '⏸️ Disc.'; urg = -1; }
      else if (extMarca) { accion = '✈️ Compra ext.'; urg = 0; }
      else if (demDia <= 0 && stock <= 0 && producibles <= 0) { accion = '❓ Sin datos'; urg = 0; }
      else if (cobPT < 30) { accion = '🔴 PRODUCIR YA'; urg = 3; }
      else if (cobPT < COB_PT) { accion = '🟡 Planificar'; urg = 2; }
      else if (cobTot < COB_PIPE) { accion = '🟠 Comprar ins.'; urg = 1; }
      else { accion = '🟢 OK'; }

      return {
        codigo, nombre, marca, matched, hasBOM,
        stock, forecast, vtaAvg, vtaMes, vta3m, demDia, prod, producibles,
        cuello, cobPT, cobTot, disponible, quiebrePT, quiebreTot,
        fechaProd, insBot, insEst, insEse,
        accion, urg, componentes: componentes || [],
        discMarca, extMarca
      };
    }

    // Build a code→forecast lookup for marca correction
    // Forecast records have polo/segmento → their marca is the correct one from the Marca column
    const forecastByCodigo = {};
    stockProds.forEach(p => {
      if (p.polo || p.segmento || p.forecast_proximo_mes) {
        if (!forecastByCodigo[p.codigo] || (p.polo || p.segmento)) forecastByCodigo[p.codigo] = p;
      }
    });

    // Fuente 1: Productos con BOM
    for (const bp of Object.values(bomByPT)) {
      const sp = matchSP(bp.codigo, bp.nombre);
      // Marca: prioridad 1) forecast record por código exacto, 2) stock_productos match, 3) vacío
      const fcst = forecastByCodigo[bp.codigo];
      const marca = fcst ? fcst.marca : (sp ? (sp.marca || '') : '');
      const nombre = fcst ? (fcst.nombre || bp.nombre) : (bp.nombre || (sp ? sp.nombre : ''));
      fabMap[bp.codigo] = buildFabItem(bp.codigo, nombre, marca, sp || fcst, bp.componentes);
    }

    // Fuente 2: Productos de stock_productos cuya marca es de fabricación (y no están ya en fabMap)
    const fabMapCodigos = new Set(Object.keys(fabMap));
    for (const sp of stockProds) {
      if (!sp.marca || sp.marca === 'Sin asignar') continue;
      if (fabMapCodigos.has(sp.codigo)) continue;
      // Check if marca is fabricación
      if (!marcasFab.has(sp.marca.toUpperCase())) continue;
      if (MARCAS_DISC.has(sp.marca.toLowerCase())) continue;
      if (COMPRA_EXT_LT[sp.marca.toLowerCase()]) continue;
      // Check if already matched by BOM (by nombre)
      let alreadyInBOM = false;
      for (const k of fabMapCodigos) {
        const f = fabMap[k];
        if (f.nombre && sp.nombre && f.nombre.toUpperCase() === sp.nombre.toUpperCase()) { alreadyInBOM = true; break; }
      }
      if (alreadyInBOM) continue;

      fabMap[sp.codigo] = buildFabItem(sp.codigo, sp.nombre, sp.marca, sp, []);
    }

    const fabList = Object.values(fabMap);

    // Separar y ordenar
    const fabActivos = fabList
      .filter(p => !p.discMarca && !p.extMarca)
      .sort((a, b) => b.vtaMes - a.vtaMes || a.cobPT - b.cobPT);
    const fabExt = fabList.filter(p => p.extMarca);

    // ══════════════════════════════════════════
    // 4. COMPRA DIRECTA: productos sin BOM y marca NO fabricación
    // ══════════════════════════════════════════
    const fabAllCodigos = new Set(Object.keys(fabMap));
    const compraAll = stockProds
      .filter(p => {
        if (!p.marca || p.marca === 'Sin asignar') return false;
        if (fabAllCodigos.has(p.codigo)) return false;
        if (MARCAS_DISC.has((p.marca || '').toLowerCase())) return false;
        if (marcasFab.has(p.marca.toUpperCase())) return false; // ya está en fabricación
        const dem = Math.max(p.forecast_proximo_mes || 0, p.venta_mensual_avg || 0);
        return dem > 0;
      })
      .map(p => {
        const dem = Math.max(p.forecast_proximo_mes || 0, p.venta_mensual_avg || 0);
        const demDia = dem / 30;
        const stk = p.stock_actual || 0;
        const cobDias = demDia > 0 ? Math.round(stk / demDia) : 999;
        const isExt = !!COMPRA_EXT_LT[(p.marca || '').toLowerCase()];
        const lt = isExt ? COMPRA_EXT_LT[(p.marca || '').toLowerCase()] : (marcaLT[p.marca] || 90);
        let accion = '', urg = 0;
        if (cobDias < 30) { accion = '🔴 COMPRAR YA'; urg = 3; }
        else if (cobDias < 60) { accion = '🟡 Iniciar OC'; urg = 2; }
        else if (cobDias < lt) { accion = '🟠 Planificar'; urg = 1; }
        else { accion = '🟢 OK'; }
        return { ...p, demanda: dem, demDia, cobDias, lt, isExt, accion, urg };
      })
      .sort((a, b) => b.demanda - a.demanda);
    const compraTop = compraAll.slice(0, 60);

    // Agregar Fascino (compra exterior) a compra
    fabExt.forEach(p => {
      const lt = COMPRA_EXT_LT[(p.marca || '').toLowerCase()] || 150;
      let accion = '', urg = 0;
      if (p.cobPT < 30) { accion = '🔴 COMPRAR YA'; urg = 3; }
      else if (p.cobPT < 60) { accion = '🟡 Iniciar OC'; urg = 2; }
      else if (p.cobPT < lt) { accion = '🟠 Planificar'; urg = 1; }
      else { accion = '🟢 OK'; }
      compraTop.push({ codigo: p.codigo, nombre: p.nombre, marca: p.marca, stock_actual: p.stock, demanda: p.vtaMes, demDia: p.demDia, cobDias: p.cobPT, lt, isExt: true, accion, urg });
    });
    compraTop.sort((a, b) => b.demanda - a.demanda);

    // ══════════════════════════════════════════
    // 5. DISCONTINUADOS
    // ══════════════════════════════════════════
    const discProds = stockProds.filter(p => MARCAS_DISC.has((p.marca || '').toLowerCase()) && (p.stock_actual > 0 || (p.venta_mensual_avg || 0) > 0));

    // ══════════════════════════════════════════
    // 6. INSUMOS: necesidades para cubrir pipeline 120d
    // ══════════════════════════════════════════
    const insDem = {};
    fabActivos.filter(p => p.hasBOM).forEach(p => {
      const necTotal = p.demDia * COB_PIPE;
      const disp = p.stock + p.prod + p.producibles;
      const deficit = Math.max(0, necTotal - disp);
      if (deficit <= 0) return;
      p.componentes.forEach(comp => {
        if (!insDem[comp.codigo_insumo]) {
          const ins = insIdx[comp.codigo_insumo] || {};
          insDem[comp.codigo_insumo] = { cod: comp.codigo_insumo, det: comp.detalle_insumo || ins.detalle || '', stk: ins.stock_fisico || 0, tipo: ins.tipo_insumo_global || 'otro', lt: ins.lead_time_dias || 135, dem: 0, pts: new Set(), info: [] };
        }
        const d = deficit * (comp.cantidad_formula || 1);
        insDem[comp.codigo_insumo].dem += d;
        insDem[comp.codigo_insumo].pts.add(p.codigo);
        insDem[comp.codigo_insumo].info.push({ cod: p.codigo, nom: (p.nombre||'').substring(0,20), def: Math.round(deficit), d: Math.round(d) });
      });
    });
    const insCompra = Object.values(insDem)
      .map(i => ({ ...i, dem: Math.round(i.dem), buy: Math.max(0, Math.round(i.dem - i.stk)), n: i.pts.size, sh: i.pts.size > 1 }))
      .filter(i => i.buy > 0)
      .sort((a, b) => { const p = { frasco:1,estuche:2,esencia:3 }; return (p[a.tipo]||9)-(p[b.tipo]||9) || b.buy-a.buy; });
    const insGrp = {};
    insCompra.forEach(i => { if (!insGrp[i.tipo]) insGrp[i.tipo]=[]; insGrp[i.tipo].push(i); });

    // ══════════════════════════════════════════
    // 7. KPIs & helpers
    // ══════════════════════════════════════════
    const nFabTotal = fabActivos.length;
    const nFabConBOM = fabActivos.filter(p => p.hasBOM).length;
    const nFabSinBOM = nFabTotal - nFabConBOM;
    const nFabUrg = fabActivos.filter(p => p.urg >= 2).length;
    const nCompUrg = compraTop.filter(p => p.urg >= 2).length;
    const cobClr = d => d < 30 ? 'var(--red)' : d < 60 ? 'var(--orange)' : d < 90 ? 'var(--gold)' : 'var(--green)';
    const tLabel = { frasco:'🧴 Frascos',estuche:'📦 Estuches',esencia:'💧 Esencias',tapa:'🔲 Tapas',collar:'⭕ Collares',valvula:'🔧 Válvulas',otro:'📋 Otros' };
    const fmtDate = d => d ? d.toLocaleDateString('es-AR', { day:'2-digit', month:'short' }) : '-';
    const fmtMes = m => { if (!m) return '-'; const d = new Date(m+'T00:00:00'); return d.toLocaleDateString('es-AR',{month:'short',year:'2-digit'}); };
    // Insumo status icon: ✅ hay stock, ❌ sin stock, ➖ no aplica
    const insIcon = (v) => v === null ? '<span style="color:var(--txt2)">➖</span>' : v > 0 ? '<span style="color:var(--green)">✅</span>' : '<span style="color:var(--red)">❌</span>';

    // ALL products for display (sorted by demanda, top sellers first)
    const fabTop = fabActivos;

    c.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h2 style="color:var(--gold);font-size:20px;">🏭 MRP — Plan de Abastecimiento</h2>
        <div style="display:flex;gap:8px;">
          <button class="btn-outline btn-sm" onclick="triggerSync()">🔄 Sincronizar</button>
          <button class="btn-outline btn-sm" onclick="renderMRPPage(document.getElementById('tabContent'))">📊 Recalcular</button>
        </div>
      </div>

      <div class="kpi-row" style="margin-bottom:10px;">
        <div class="kpi" style="cursor:pointer;" onclick="showMrpTab('fab')"><div class="num" style="color:${nFabUrg>0?'var(--red)':'var(--green)'}">${nFabUrg}</div><div class="label">Fab. urgentes</div></div>
        <div class="kpi" style="cursor:pointer;" onclick="showMrpTab('ins')"><div class="num" style="color:${insCompra.length>0?'var(--orange)':'var(--green)'}">${insCompra.length}</div><div class="label">Insumos a comprar</div></div>
        <div class="kpi" style="cursor:pointer;" onclick="showMrpTab('cmp')"><div class="num" style="color:${nCompUrg>0?'var(--violet)':'var(--green)'}">${nCompUrg}</div><div class="label">Compra urgentes</div></div>
        <div class="kpi"><div class="num">${nFabTotal}</div><div class="label">PT Fabricación</div></div>
        <div class="kpi"><div class="num" style="color:var(--green)">${nBOM} BOM</div><div class="label">${nFabSinBOM > 0 ? nFabSinBOM+' sin fórmula' : 'Todos con fórmula'}</div></div>
      </div>

      <div style="color:var(--txt2);font-size:11px;margin-bottom:10px;background:var(--bg3);padding:8px 12px;border-radius:6px;">
        <strong>Política:</strong> Cob. PT ${COB_PT}d + Cob. insumos ${COB_INS}d = ${COB_PIPE}d pipeline |
        Demanda = MAX(forecast, vta promedio) | Ranking por demanda |
        Excluidos: ${[...MARCAS_DISC].join(', ')} |
        ${Object.keys(COMPRA_EXT_LT).join(', ')}: compra exterior LT ${Object.values(COMPRA_EXT_LT).join(',')}d
      </div>

      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
        <button class="btn-gold btn-sm" onclick="showMrpTab('fab')" id="mrpBtnFab">🏭 Fabricación (${nFabTotal})</button>
        <button class="btn-outline btn-sm" onclick="showMrpTab('ins')" id="mrpBtnIns">🛒 Insumos (${insCompra.length})</button>
        <button class="btn-outline btn-sm" onclick="showMrpTab('cmp')" id="mrpBtnCmp">🛍️ Compra (${compraTop.length})</button>
        <button class="btn-outline btn-sm" onclick="showMrpTab('dsc')" id="mrpBtnDsc" style="opacity:0.7;">📦 Disc. (${discProds.length})</button>
      </div>

      <!-- ═══ FABRICACIÓN ═══ -->
      <div id="mrpPnlFab" class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <h3 style="color:var(--gold);">Plan de Producción — ${nFabTotal} productos (ordenados por demanda)</h3>
          <div style="display:flex;gap:6px;">
            <select id="mrpFiltFab" onchange="filterMrpFab()" style="width:auto;min-width:150px;font-size:12px;">
              <option value="">Todas las marcas</option>
              ${[...new Set(fabTop.filter(p=>p.marca).map(p=>p.marca))].sort().map(m=>`<option value="${m}">${m}</option>`).join('')}
            </select>
            <select id="mrpFiltUrgFab" onchange="filterMrpFab()" style="width:auto;min-width:120px;font-size:12px;">
              <option value="">Todas acciones</option>
              <option value="3">🔴 Producir ya</option>
              <option value="2">🟡 Planificar</option>
              <option value="1">🟠 Comprar ins.</option>
              <option value="0">🟢 OK</option>
            </select>
          </div>
        </div>
        <p style="color:var(--txt2);font-size:11px;margin-bottom:8px;">
          ${nFabConBOM} con BOM + ${nFabSinBOM} sin fórmula.
          <strong>Vta 3M</strong> = proyección 3 meses. <strong>Stock Ins.</strong>: ✅=hay / ❌=sin stock / ➖=no aplica.
          <strong>Produc.</strong> = uds fabricables con insumos actuales.
        </p>
        ${fabTop.length === 0
          ? `<p style="color:var(--txt2);padding:20px;text-align:center;">
              No se encontraron productos de fabricación. Verificar config_marcas y/o BOM.
              <br><small>Marcas fab: ${[...marcasFab].join(', ') || 'ninguna'}</small>
            </p>`
          : `
          <div style="overflow-x:auto;">
            <table style="width:100%;border-collapse:collapse;font-size:11px;" id="mrpTblFab">
              <thead>
                <tr style="border-bottom:1px solid var(--border);background:var(--bg3);">
                  <th rowspan="2" style="padding:4px 3px;text-align:left;">Código</th>
                  <th rowspan="2" style="padding:4px 3px;text-align:left;">Producto</th>
                  <th rowspan="2" style="padding:4px 3px;text-align:left;">Marca</th>
                  <th colspan="2" style="padding:4px 3px;text-align:center;border-bottom:1px solid var(--border);color:var(--gold);">Venta</th>
                  <th rowspan="2" style="padding:4px 3px;text-align:right;">Stock PT</th>
                  <th colspan="3" style="padding:4px 3px;text-align:center;border-bottom:1px solid var(--border);color:var(--violet);">Stock Insumos</th>
                  <th rowspan="2" style="padding:4px 3px;text-align:right;" title="Uds producibles con insumos actuales">Produc.</th>
                  <th rowspan="2" style="padding:4px 3px;text-align:right;">Prod.Plan</th>
                  <th rowspan="2" style="padding:4px 3px;text-align:center;" title="Fecha planificada de producción">Fch.Prod</th>
                  <th rowspan="2" style="padding:4px 3px;text-align:right;">Disp.</th>
                  <th rowspan="2" style="padding:4px 3px;text-align:center;">Cob.PT</th>
                  <th rowspan="2" style="padding:4px 3px;text-align:center;">Cob.Tot</th>
                  <th rowspan="2" style="padding:4px 3px;text-align:center;" title="Fecha estimada rotura stock PT">Quiebre</th>
                  <th rowspan="2" style="padding:4px 3px;text-align:center;">Acción</th>
                  <th rowspan="2" style="padding:4px 3px;text-align:left;">Cuello</th>
                </tr>
                <tr style="border-bottom:2px solid var(--border);background:var(--bg3);">
                  <th style="padding:2px 3px;text-align:right;font-size:9px;">Mes</th>
                  <th style="padding:2px 3px;text-align:right;font-size:9px;">3M</th>
                  <th style="padding:2px 3px;text-align:center;font-size:9px;" title="Botella/Frasco">Bot</th>
                  <th style="padding:2px 3px;text-align:center;font-size:9px;" title="Estuche/Caja">Est</th>
                  <th style="padding:2px 3px;text-align:center;font-size:9px;" title="Esencia/Fragancia">Ese</th>
                </tr>
              </thead><tbody>
              ${fabTop.map((p, i) => `
                <tr style="border-bottom:1px solid var(--border);${i<40?'':'opacity:0.85;'}${p.urg>=3?'background:rgba(255,50,50,0.08);':p.urg>=2?'background:rgba(255,165,0,0.05);':''}" data-marca="${p.marca}" data-urg="${p.urg}">
                  <td style="padding:2px 3px;font-family:monospace;font-size:9px;color:var(--txt2);" title="${p.codigo}">${p.codigo}</td>
                  <td style="padding:2px 3px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${p.nombre}${!p.hasBOM?' (sin BOM)':''}">${(p.nombre||'').substring(0,22)}${!p.hasBOM?' <span style=color:var(--orange);font-size:8px;>∅</span>':''}</td>
                  <td style="padding:2px 3px;font-size:9px;">${p.marca||'?'}</td>
                  <td style="padding:2px 3px;text-align:right;font-weight:bold;">${p.vtaMes>0?Math.round(p.vtaMes).toLocaleString():'<span style=color:var(--txt2)>-</span>'}</td>
                  <td style="padding:2px 3px;text-align:right;color:var(--txt2);">${p.vta3m>0?Math.round(p.vta3m).toLocaleString():'-'}</td>
                  <td style="padding:2px 3px;text-align:right;color:${p.stock<=0?'var(--red)':'var(--txt)'};">${Math.round(p.stock).toLocaleString()}</td>
                  <td style="padding:2px 3px;text-align:center;">${p.hasBOM?insIcon(p.insBot):'-'}</td>
                  <td style="padding:2px 3px;text-align:center;">${p.hasBOM?insIcon(p.insEst):'-'}</td>
                  <td style="padding:2px 3px;text-align:center;">${p.hasBOM?insIcon(p.insEse):'-'}</td>
                  <td style="padding:2px 3px;text-align:right;color:${p.producibles<=0?(p.hasBOM?'var(--red)':'var(--txt2)'):'var(--green)'};">${p.hasBOM?Math.round(p.producibles).toLocaleString():'-'}</td>
                  <td style="padding:2px 3px;text-align:right;color:${p.prod>0?'var(--green)':'var(--txt2)'};">${p.prod>0?Math.round(p.prod).toLocaleString():'-'}</td>
                  <td style="padding:2px 3px;text-align:center;font-size:9px;color:${p.fechaProd?'var(--gold)':'var(--txt2)'};">${fmtMes(p.fechaProd)}</td>
                  <td style="padding:2px 3px;text-align:right;font-weight:bold;">${Math.round(p.disponible).toLocaleString()}</td>

async function processStockFile() {
  const fileInput = document.getElementById('stockFileInput');
  if (!fileInput?.files?.length) { toast('Seleccioná un archivo', true); return; }

  const file = fileInput.files[0];
  const resultDiv = document.getElementById('stockUploadResult');
  resultDiv.innerHTML = '<p style="color:var(--txt2);">Procesando...</p>';

  try {
    // Read file as CSV or use basic parsing
    const text = await file.text();
    const lines = text.split('\n').filter(l => l.trim());
    if (lines.length < 2) { resultDiv.innerHTML = '<p style="color:var(--red);">Archivo vacío o sin datos</p>'; return; }

    const headers = lines[0].split(',').map(h => h.trim().toUpperCase());
    const iCodigo = headers.findIndex(h => h.includes('CODIGO') || h.includes('COD') || h.includes('SKU'));
    const iNombre = headers.findIndex(h => h.includes('NOMBRE') || h.includes('PRODUCTO') || h.includes('DESC'));
    const iMarca = headers.findIndex(h => h.includes('MARCA') || h.includes('BRAND'));
    const iStock = headers.findIndex(h => h.includes('STOCK') || h.includes('INVENTARIO'));
    const iVenta = headers.findIndex(h => h.includes('VENTA') || h.includes('VTA') || h.includes('DEMANDA'));

    if (iCodigo < 0 || iMarca < 0) {
      resultDiv.innerHTML = '<p style="color:var(--red);">No se encontraron las columnas requeridas (Código, Marca)</p>';
      return;
    }

    const productos = [];
    for (let i = 1; i < lines.length; i++) {
      const cols = lines[i].split(',').map(c => c.trim());
      const codigo = cols[iCodigo];
      const marca = cols[iMarca];
      if (!codigo || !marca) continue;
      const stock = parseFloat((cols[iStock] || '0').replace(/[^0-9.\-]/g, '')) || 0;
      const venta = parseFloat((cols[iVenta] || '0').replace(/[^0-9.\-]/g, '')) || 0;

      productos.push({
        codigo, marca,
        nombre: cols[iNombre] || codigo,
        stock_actual: stock,
        venta_mensual_avg: venta,
        cobertura_meses: venta > 0 ? Math.round((stock / venta) * 10) / 10 : 99,
        fecha_sync: new Date().toISOString(),
      });
    }

    if (productos.length === 0) {
      resultDiv.innerHTML = '<p style="color:var(--red);">No se encontraron productos válidos</p>';
      return;
    }

    const { error } = await sb.from('stock_productos').upsert(productos, { onConflict: 'codigo,marca' });
    if (error) throw error;

    resultDiv.innerHTML = `<p style="color:var(--green);">✅ ${productos.length} productos cargados correctamente</p>`;
    toast(`${productos.length} productos de stock cargados`);
    setTimeout(() => renderStock(document.getElementById('tabContent')), 1500);
  } catch (e) {
    resultDiv.innerHTML = `<p style="color:var(--red);">Error: ${e.message}</p>`;
  }
}

// Admin: Add brand to user
async function addBrandToUser(userId) {
  const marca = document.getElementById(`addBrand_${userId}`)?.value;
  if (!marca) return;
  await withRetry(async () => {
    // If adding __ALL__, remove individual brands first
    if (marca === '__ALL__') {
      await sb.from('usuario_marcas').delete().eq('user_id', userId);
    }
    const { error } = await sb.from('usuario_marcas').upsert({ user_id: userId, marca }, { onConflict: 'user_id,marca' });
    if (error) throw error;
  }, { label: 'Asignar marca' });

  renderAdmin(document.getElementById('tabContent'));
}
