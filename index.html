// ─── MRP TAB — Demand Planning S&OP ───
// PROBLEMA IDENTIFICADO: stock_productos tiene códigos sintéticos (del nombre),
// pero bom_productos tiene códigos reales numéricos del sistema.
// SOLUCIÓN: Partir del BOM (lo que fabricamos), cruzar con stock por múltiples claves,
// y mostrar todo incluso sin match perfecto.

const MARCAS_DISC = new Set(['relazzi', 'little paris']);
const COMPRA_EXT_LT = { 'fascino': 150 }; // marca lowercase → LT días
const COB_PT = 60;
const COB_INS = 60;
const COB_PIPE = 120; // PT + insumos

async function renderMRPPage(c, _rv) {
  c.innerHTML = '<div style="text-align:center;padding:40px;color:var(--txt2);">Calculando plan de abastecimiento...</div>';

  // Helper: fetch ALL rows from a table, paginating in chunks of 1000
  async function fetchAll(table, select, filters) {
    const PAGE = 1000;
    let all = [];
    let from = 0;
    while (true) {
      let q = sb.from(table).select(select).range(from, from + PAGE - 1);
      if (filters) q = filters(q);
      const { data, error } = await q;
      if (error) { console.error(`fetchAll ${table} error:`, error); break; }
      if (!data || data.length === 0) break;
      all = all.concat(data);
      if (data.length < PAGE) break; // last page
      from += PAGE;
    }
    return all;
  }

  try {
    const [cmRes, stockProds, prodPlan, bomRows, insumos] = await Promise.all([
      sb.from('config_marcas').select('*'),
      fetchAll('stock_productos', 'codigo, nombre, marca, segmento, polo, stock_actual, venta_mensual_avg, forecast_proximo_mes'),
      fetchAll('producciones_planificadas', 'codigo, mes, cantidad', q => q.gte('mes', new Date().toISOString().substring(0,7)+'-01')),
      fetchAll('bom_productos', 'codigo_principal, nombre_principal, codigo_insumo, detalle_insumo, cantidad_formula, es_envase, nivel, categoria'),
      fetchAll('stock_insumos', 'codigo, detalle, stock_fisico, tipo_insumo_global, lead_time_dias'),
    ]);

    if (_rv !== undefined && _rv !== _tabRenderVersion) return;
    const configMarcas = cmRes.data || [];

    // ══════════════════════════════════════════
    // 1. ÍNDICES
    // ══════════════════════════════════════════
    const insIdx = {};
    insumos.forEach(i => { insIdx[i.codigo] = i; });

    // Producciones: total + primer mes planificado
    const prodIdx = {};   // codigo → total cantidad
    const prodFecha = {}; // codigo → primer mes (fecha más cercana)
    prodPlan.forEach(p => {
      prodIdx[p.codigo] = (prodIdx[p.codigo] || 0) + (p.cantidad || 0);
      if (!prodFecha[p.codigo] || p.mes < prodFecha[p.codigo]) prodFecha[p.codigo] = p.mes;
    });

    const marcaLT = {};
    const marcasFab = new Set(); // marcas con tipo_abastecimiento = fabricacion
    configMarcas.forEach(cm => {
      marcaLT[cm.marca] = (cm.lead_time_meses || 3) * 30;
      if ((cm.tipo_abastecimiento || '').toLowerCase().includes('fabric')) marcasFab.add(cm.marca.toUpperCase());
    });

    // Stock lookup por código y por nombre
    // PRIORIDAD: registros del forecast (tienen segmento/polo cargado → marca correcta)
    const spByCodigo = {};
    const spByNombre = {};
    // First pass: all records
    stockProds.forEach(p => {
      const existing = spByCodigo[p.codigo];
      // Prefer forecast records (have polo/segmento) over syncStocks records (synthetic codes, wrong marca)
      const isForecast = !!(p.polo || p.segmento || p.forecast_proximo_mes);
      const existIsForecast = existing ? !!(existing.polo || existing.segmento || existing.forecast_proximo_mes) : false;
      if (!existing || (isForecast && !existIsForecast)) {
        spByCodigo[p.codigo] = p;
      }
      const nKey = (p.nombre || '').toUpperCase().replace(/\s+/g, ' ').trim();
      if (nKey) {
        const existN = spByNombre[nKey];
        const existNIsForecast = existN ? !!(existN.polo || existN.segmento || existN.forecast_proximo_mes) : false;
        if (!existN || (isForecast && !existNIsForecast)) spByNombre[nKey] = p;
      }
    });

    // ══════════════════════════════════════════
    // 2. BOM INDEX: identificar PTs reales vs insumos/sub-ensambles
    // ══════════════════════════════════════════
    // Paso 1: Agrupar componentes por codigo_principal
    const bomByPT = {};
    const allInsumosCodigos = new Set(); // todos los códigos que aparecen como insumo
    bomRows.forEach(b => {
      if (!bomByPT[b.codigo_principal]) bomByPT[b.codigo_principal] = { codigo: b.codigo_principal, nombre: b.nombre_principal || '', componentes: [] };
      bomByPT[b.codigo_principal].componentes.push(b);
      allInsumosCodigos.add(b.codigo_insumo); // este código es un insumo de algo
    });

    // Paso 2: Identificar sub-ensambles vs PTs reales
    // Un codigo_principal que TAMBIÉN es insumo de otro PT puede ser sub-ensamble
    // PERO: si existe en stock_productos como SKU independiente (tiene ventas/forecast),
    // es un PT real que también se usa en sets/cofres → NO excluirlo
    // Lógica Demand Planning: planificar el padre y el hijo por separado
    const spCodigoSet = new Set(stockProds.map(p => p.codigo));
    const subEnsambles = new Set();
    for (const cod of Object.keys(bomByPT)) {
      if (allInsumosCodigos.has(cod) && !spCodigoSet.has(cod)) subEnsambles.add(cod);
    }

    // PTs reales = todos los que tienen BOM MENOS los sub-ensambles puros (no tienen SKU propio)
    const bomPTReales = {};
    for (const [cod, data] of Object.entries(bomByPT)) {
      if (!subEnsambles.has(cod)) bomPTReales[cod] = data;
    }
    const bomCodigos = new Set(Object.keys(bomPTReales));
    const nBOM = bomCodigos.size;
    const nSubEnsambles = subEnsambles.size;

    // ══════════════════════════════════════════
    // 3. CONSTRUIR LISTA COMPLETA DE FABRICACIÓN
    //    Fuente 1: Productos con BOM (tienen fórmula)
    //    Fuente 2: Productos de marcas con tipo_abastecimiento=fabricacion (sin BOM pero son fabricación)
    //    Esto captura TODOS los productos de fabricación, no solo los del BOM
    // ══════════════════════════════════════════
    const fabMap = {}; // codigo → product data

    // Helper: match stock product to BOM/stock data
    function matchSP(codigo, nombre) {
      let sp = spByCodigo[codigo];
      if (!sp && nombre) {
        const nKey = nombre.toUpperCase().replace(/\s+/g, ' ').trim();
        sp = spByNombre[nKey];
      }
      if (!sp && nombre) {
        const bpUp = nombre.toUpperCase();
        for (const p of stockProds) {
          const pUp = (p.nombre || '').toUpperCase();
          if (pUp && bpUp && (pUp.includes(bpUp) || bpUp.includes(pUp))) { sp = p; break; }
        }
      }
      return sp;
    }

    function buildFabItem(codigo, nombre, marca, sp, componentes) {
      const stock = sp ? (sp.stock_actual || 0) : 0;
      const forecast = sp ? (sp.forecast_proximo_mes || 0) : 0;
      const vtaAvg = sp ? (sp.venta_mensual_avg || 0) : 0;
      const matched = !!sp;
      const vtaMes = Math.max(forecast, vtaAvg);
      const vta3m = vtaMes * 3; // proyección 3 meses
      const demDia = vtaMes / 30;
      const prod = prodIdx[codigo] || (sp ? (prodIdx[sp.codigo] || 0) : 0);
      const fechaProd = prodFecha[codigo] || (sp ? prodFecha[sp.codigo] : null);
      const hasBOM = componentes && componentes.length > 0;

      // Stock insumos por tipo (botella, estuche, esencia)
      // Fuente primaria: stock_insumos.tipo_insumo_global (clasificado en sync)
      // Fallback: keywords en detalle_insumo del BOM
      let insBot = null, insEst = null, insEse = null;
      let producibles = 0, cuello = null;
      if (hasBOM) {
        producibles = Infinity;
        componentes.forEach(comp => {
          const ins = insIdx[comp.codigo_insumo];
          const stk = ins ? (ins.stock_fisico || 0) : 0;
          const qty = comp.cantidad_formula > 0 ? comp.cantidad_formula : 1;
          const rinde = Math.floor(stk / qty);

          // Clasificar tipo del componente
          const tipoG = ins ? (ins.tipo_insumo_global || '').toLowerCase() : '';
          const det = (comp.detalle_insumo || '').toUpperCase();
          const cat = (comp.categoria || '').toUpperCase();

          // Determinar tipo: prioridad stock_insumos.tipo_insumo_global, luego keywords
          let esFrasco = false, esEstuche = false, esEsencia = false;
          if (tipoG === 'frasco') esFrasco = true;
          else if (tipoG === 'estuche') esEstuche = true;
          else if (tipoG === 'esencia') esEsencia = true;
          else {
            // Fallback: keywords en detalle o categoría
            if (det.includes('FRASCO') || det.includes('ENVASE') || det.includes('BOTELLA') || det.includes('FLACON')
                || cat.includes('FRASCO') || cat.includes('ENVASE')) esFrasco = true;
            if (det.includes('ESTUCHE') || det.includes('CAJA') || det.includes('INTERIOR') || det.includes('DISPLAY')
                || det.includes('PACKAGING') || cat.includes('ESTUCHE') || cat.includes('CAJA')) esEstuche = true;
            if (det.includes('ESENCIA') || det.includes('FRAGANCIA') || det.includes('PERFUME') || det.includes('PARFUM')
                || det.includes('EAU DE') || det.includes('ACEITE') || det.includes('COMPOUND') || det.includes('CONCENTRADO')
                || cat.includes('ESENCIA') || cat.includes('FRAGANCIA')) esEsencia = true;
          }

          // Guardar stock del tipo (mínimo si hay varios del mismo tipo)
          if (esFrasco) insBot = insBot === null ? stk : Math.min(insBot, stk);
          if (esEstuche) insEst = insEst === null ? stk : Math.min(insEst, stk);
          if (esEsencia) insEse = insEse === null ? stk : Math.min(insEse, stk);

          if (rinde < producibles) {
            producibles = rinde;
            cuello = { cod: comp.codigo_insumo, det: comp.detalle_insumo || '', stk, qty, rinde };
          }
        });
        if (producibles === Infinity || producibles < 0) producibles = 0;
      }

      // Cobertura basada en proyección 3 meses (demDia promedio)
      const cobPT = demDia > 0 ? Math.round(stock / demDia) : (stock > 0 ? 999 : 0);
      const cobTot = demDia > 0 ? Math.round((stock + prod + producibles) / demDia) : (stock + prod + producibles > 0 ? 999 : 0);
      const disponible = stock + prod + producibles;

      let quiebrePT = null, quiebreTot = null;
      if (demDia > 0) {
        const hoy = new Date();
        quiebrePT = new Date(hoy.getTime() + cobPT * 86400000);
        quiebreTot = new Date(hoy.getTime() + cobTot * 86400000);
      }

      const discMarca = MARCAS_DISC.has((marca || '').toLowerCase());
      const extMarca = !!COMPRA_EXT_LT[(marca || '').toLowerCase()];

      let accion = '', urg = 0;
      if (discMarca) { accion = '⏸️ Disc.'; urg = -1; }
      else if (extMarca) { accion = '✈️ Compra ext.'; urg = 0; }
      else if (demDia <= 0 && stock <= 0 && producibles <= 0) { accion = '❓ Sin datos'; urg = 0; }
      else if (cobPT < 30) { accion = '🔴 PRODUCIR YA'; urg = 3; }
      else if (cobPT < COB_PT) { accion = '🟡 Planificar'; urg = 2; }
      else if (cobTot < COB_PIPE) { accion = '🟠 Comprar ins.'; urg = 1; }
      else { accion = '🟢 OK'; }

      // Clasificación ABCD: MAX(forecast anualizado, ventas históricas 2025)
      const vtaForecast = vtaMes * 12;
      const vtaHistorica = (VENTAS_2025[codigo] || [0])[0];
      const vtaAnual = Math.max(vtaForecast, vtaHistorica);
      let abc = 'D';
      if (vtaAnual >= 70000) abc = 'A';
      else if (vtaAnual >= 50000) abc = 'B';
      else if (vtaAnual >= 30000) abc = 'C';

      return {
        codigo, nombre, marca, matched, hasBOM,
        stock, forecast, vtaAvg, vtaMes, vta3m, demDia, prod, producibles,
        cuello, cobPT, cobTot, disponible, quiebrePT, quiebreTot,
        fechaProd, insBot, insEst, insEse,
        accion, urg, componentes: componentes || [],
        discMarca, extMarca, abc, vtaAnual
      };
    }

    // Build a code→forecast lookup for marca correction
    // Forecast records have polo/segmento → their marca is the correct one from the Marca column
    const forecastByCodigo = {};
    stockProds.forEach(p => {
      if (p.polo || p.segmento || p.forecast_proximo_mes) {
        if (!forecastByCodigo[p.codigo] || (p.polo || p.segmento)) forecastByCodigo[p.codigo] = p;
      }
    });

    // Fuente 1: Productos con BOM (solo PTs reales, no sub-ensambles)
    for (const bp of Object.values(bomPTReales)) {
      const sp = matchSP(bp.codigo, bp.nombre);
      // Marca: prioridad 1) forecast record por código exacto, 2) stock_productos match, 3) vacío
      const fcst = forecastByCodigo[bp.codigo];
      const marca = fcst ? fcst.marca : (sp ? (sp.marca || '') : '');
      const nombre = fcst ? (fcst.nombre || bp.nombre) : (bp.nombre || (sp ? sp.nombre : ''));
      fabMap[bp.codigo] = buildFabItem(bp.codigo, nombre, marca, sp || fcst, bp.componentes);
    }

    // Fuente 2: Productos de stock_productos cuya marca es de fabricación (y no están ya en fabMap)
    const fabMapCodigos = new Set(Object.keys(fabMap));
    for (const sp of stockProds) {
      if (!sp.marca || sp.marca === 'Sin asignar') continue;
      if (fabMapCodigos.has(sp.codigo)) continue;
      // Check if marca is fabricación
      if (!marcasFab.has(sp.marca.toUpperCase())) continue;
      if (MARCAS_DISC.has(sp.marca.toLowerCase())) continue;
      if (COMPRA_EXT_LT[sp.marca.toLowerCase()]) continue;
      // Check if already matched by BOM (by nombre)
      let alreadyInBOM = false;
      for (const k of fabMapCodigos) {
        const f = fabMap[k];
        if (f.nombre && sp.nombre && f.nombre.toUpperCase() === sp.nombre.toUpperCase()) { alreadyInBOM = true; break; }
      }
      if (alreadyInBOM) continue;

      fabMap[sp.codigo] = buildFabItem(sp.codigo, sp.nombre, sp.marca, sp, []);
    }

    const fabList = Object.values(fabMap);

    // Separar y ordenar
    const fabActivos = fabList
      .filter(p => !p.discMarca && !p.extMarca)
      .sort((a, b) => b.vtaMes - a.vtaMes || a.cobPT - b.cobPT);
    const fabExt = fabList.filter(p => p.extMarca);

    // ══════════════════════════════════════════
    // 4. COMPRA DIRECTA: productos sin BOM y marca NO fabricación
    // ══════════════════════════════════════════
    const fabAllCodigos = new Set(Object.keys(fabMap));
    const compraAll = stockProds
      .filter(p => {
        if (!p.marca || p.marca === 'Sin asignar') return false;
        if (fabAllCodigos.has(p.codigo)) return false;
        if (MARCAS_DISC.has((p.marca || '').toLowerCase())) return false;
        if (marcasFab.has(p.marca.toUpperCase())) return false; // ya está en fabricación
        const dem = Math.max(p.forecast_proximo_mes || 0, p.venta_mensual_avg || 0);
        return dem > 0;
      })
      .map(p => {
        const dem = Math.max(p.forecast_proximo_mes || 0, p.venta_mensual_avg || 0);
        const demDia = dem / 30;
        const stk = p.stock_actual || 0;
        const cobDias = demDia > 0 ? Math.round(stk / demDia) : 999;
        const isExt = !!COMPRA_EXT_LT[(p.marca || '').toLowerCase()];
        const lt = isExt ? COMPRA_EXT_LT[(p.marca || '').toLowerCase()] : (marcaLT[p.marca] || 90);
        let accion = '', urg = 0;
        if (cobDias < 30) { accion = '🔴 COMPRAR YA'; urg = 3; }
        else if (cobDias < 60) { accion = '🟡 Iniciar OC'; urg = 2; }
        else if (cobDias < lt) { accion = '🟠 Planificar'; urg = 1; }
        else { accion = '🟢 OK'; }
        return { ...p, demanda: dem, demDia, cobDias, lt, isExt, accion, urg };
      })
      .sort((a, b) => b.demanda - a.demanda);
    const compraTop = compraAll.slice(0, 60);

    // Agregar Fascino (compra exterior) a compra
    fabExt.forEach(p => {
      const lt = COMPRA_EXT_LT[(p.marca || '').toLowerCase()] || 150;
      let accion = '', urg = 0;
      if (p.cobPT < 30) { accion = '🔴 COMPRAR YA'; urg = 3; }
      else if (p.cobPT < 60) { accion = '🟡 Iniciar OC'; urg = 2; }
      else if (p.cobPT < lt) { accion = '🟠 Planificar'; urg = 1; }
      else { accion = '🟢 OK'; }
      compraTop.push({ codigo: p.codigo, nombre: p.nombre, marca: p.marca, stock_actual: p.stock, demanda: p.vtaMes, demDia: p.demDia, cobDias: p.cobPT, lt, isExt: true, accion, urg });
    });
    compraTop.sort((a, b) => b.demanda - a.demanda);

    // ══════════════════════════════════════════
    // 5. DISCONTINUADOS
    // ══════════════════════════════════════════
    const discProds = stockProds.filter(p => MARCAS_DISC.has((p.marca || '').toLowerCase()) && (p.stock_actual > 0 || (p.venta_mensual_avg || 0) > 0));

    // ══════════════════════════════════════════
    // 6. INSUMOS: necesidades para cubrir pipeline 120d
    // ══════════════════════════════════════════
    const insDem = {};
    fabActivos.filter(p => p.hasBOM).forEach(p => {
      const necTotal = p.demDia * COB_PIPE;
      const disp = p.stock + p.prod + p.producibles;
      const deficit = Math.max(0, necTotal - disp);
      if (deficit <= 0) return;
      p.componentes.forEach(comp => {
        if (!insDem[comp.codigo_insumo]) {
          const ins = insIdx[comp.codigo_insumo] || {};
          insDem[comp.codigo_insumo] = { cod: comp.codigo_insumo, det: comp.detalle_insumo || ins.detalle || '', stk: ins.stock_fisico || 0, tipo: ins.tipo_insumo_global || 'otro', lt: ins.lead_time_dias || 135, dem: 0, pts: new Set(), info: [] };
        }
        const d = deficit * (comp.cantidad_formula || 1);
        insDem[comp.codigo_insumo].dem += d;
        insDem[comp.codigo_insumo].pts.add(p.codigo);
        insDem[comp.codigo_insumo].info.push({ cod: p.codigo, nom: (p.nombre||'').substring(0,20), def: Math.round(deficit), d: Math.round(d) });
      });
    });
    const insCompra = Object.values(insDem)
      .map(i => ({ ...i, dem: Math.round(i.dem), buy: Math.max(0, Math.round(i.dem - i.stk)), n: i.pts.size, sh: i.pts.size > 1 }))
      .filter(i => i.buy > 0)
      .sort((a, b) => { const p = { frasco:1,estuche:2,esencia:3 }; return (p[a.tipo]||9)-(p[b.tipo]||9) || b.buy-a.buy; });
    const insGrp = {};
    insCompra.forEach(i => { if (!insGrp[i.tipo]) insGrp[i.tipo]=[]; insGrp[i.tipo].push(i); });

    // ══════════════════════════════════════════
    // 7. KPIs & helpers
    // ══════════════════════════════════════════
    const nFabTotal = fabActivos.length;
    const nFabConBOM = fabActivos.filter(p => p.hasBOM).length;
    const nFabSinBOM = nFabTotal - nFabConBOM;

    // DEBUG: BOM products detail
    console.group('🔍 BOM Products Debug');
    const bomProds = fabActivos.filter(p => p.hasBOM);
    console.log(`${bomProds.length} productos con BOM:`);
    bomProds.slice(0, 5).forEach(p => {
      console.log(`  ${p.codigo} ${p.nombre} | stk=${p.stock} prod=${p.prod} produc=${p.producibles} | insBot=${p.insBot} insEst=${p.insEst} insEse=${p.insEse}`);
      console.log('    Componentes:', p.componentes.map(c => ({
        cod: c.codigo_insumo,
        det: (c.detalle_insumo||'').substring(0,30),
        qty: c.cantidad_formula,
        insMatch: !!insIdx[c.codigo_insumo],
        stk: insIdx[c.codigo_insumo]?.stock_fisico,
        tipo: insIdx[c.codigo_insumo]?.tipo_insumo_global
      })));
    });
    // Debug insCompra calculation
    let debugDeficits = 0;
    bomProds.forEach(p => {
      const necTotal = p.demDia * COB_PIPE;
      const disp = p.stock + p.prod + p.producibles;
      const deficit = Math.max(0, necTotal - disp);
      if (deficit > 0) debugDeficits++;
    });
    console.log(`Products with deficit: ${debugDeficits}/${bomProds.length}`);
    console.log(`insCompra items: ${insCompra.length}`);
    console.groupEnd();
    const nFabUrg = fabActivos.filter(p => p.urg >= 2).length;
    const nCompUrg = compraTop.filter(p => p.urg >= 2).length;
    const cobClr = d => d < 30 ? 'var(--red)' : d < 60 ? 'var(--orange)' : d < 90 ? 'var(--gold)' : 'var(--green)';
    const tLabel = { frasco:'🧴 Frascos',estuche:'📦 Estuches',esencia:'💧 Esencias',tapa:'🔲 Tapas',collar:'⭕ Collares',valvula:'🔧 Válvulas',etiqueta:'🏷️ Etiquetas',promo:'🎯 Promo',otro:'📋 Otros' };
    const fmtDate = d => d ? d.toLocaleDateString('es-AR', { day:'2-digit', month:'short' }) : '-';
    const fmtMes = m => { if (!m) return '-'; const d = new Date(m+'T00:00:00'); return d.toLocaleDateString('es-AR',{month:'short',year:'2-digit'}); };
    // Insumo stock display: número con color
    const insNum = (v) => v === null ? '<span style="color:var(--txt2);font-size:8px;">-</span>' : v > 0 ? `<span style="color:var(--green);font-size:9px;">${Math.round(v).toLocaleString()}</span>` : '<span style="color:var(--red);font-weight:bold;font-size:9px;">0</span>';

    // ALL products for display (sorted by demanda, top sellers first)
    const fabTop = fabActivos;

    // Expand container for MRP wide tables
    const container = c.closest('.container');
    if (container) { container.style.maxWidth = '100%'; container.style.padding = '10px 16px'; }

    c.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h2 style="color:var(--gold);font-size:20px;">🏭 MRP — Plan de Abastecimiento</h2>
        <div style="display:flex;gap:8px;">
          <button class="btn-outline btn-sm" onclick="triggerSync()">🔄 Sincronizar</button>
          <button class="btn-outline btn-sm" onclick="renderMRPPage(document.getElementById('tabContent'))">📊 Recalcular</button>
        </div>
      </div>

      <div class="kpi-row" style="margin-bottom:10px;">
        <div class="kpi" style="cursor:pointer;" onclick="showMrpTab('fab')"><div class="num" style="color:${nFabUrg>0?'var(--red)':'var(--green)'}">${nFabUrg}</div><div class="label">Fab. urgentes</div></div>
        <div class="kpi" style="cursor:pointer;" onclick="showMrpTab('ins')"><div class="num" style="color:${insCompra.length>0?'var(--orange)':'var(--green)'}">${insCompra.length}</div><div class="label">Insumos a comprar</div></div>
        <div class="kpi" style="cursor:pointer;" onclick="showMrpTab('cmp')"><div class="num" style="color:${nCompUrg>0?'var(--violet)':'var(--green)'}">${nCompUrg}</div><div class="label">Compra urgentes</div></div>
        <div class="kpi"><div class="num">${nFabTotal}</div><div class="label">PT Fabricación</div></div>
        <div class="kpi"><div class="num" style="color:var(--green)">${nBOM} PT</div><div class="label">${nBOM} BOM${nSubEnsambles>0?', '+nSubEnsambles+' sub-ens.':''}</div></div>
      </div>

      ${insumos.length === 0 || insumos.filter(i=>i.stock_fisico>0).length === 0 ? `
      <div style="background:rgba(255,50,50,0.15);border:1px solid var(--red);padding:10px 14px;border-radius:8px;margin-bottom:10px;font-size:12px;">
        <strong style="color:var(--red);">⚠️ PROBLEMA: Stock de insumos no disponible</strong><br>
        <span style="color:var(--txt);">
          stock_insumos: <strong>${insumos.length}</strong> registros en DB, <strong>${insumos.filter(i=>i.stock_fisico>0).length}</strong> con stock > 0.<br>
          bom_productos: <strong>${bomRows.length}</strong> componentes, <strong>${[...new Set(bomRows.map(b=>b.codigo_principal))].length}</strong> PTs distintos.<br>
          Match BOM↔Insumos: <strong>${bomRows.filter(b=>insIdx[b.codigo_insumo]).length}/${bomRows.length}</strong>
          ${insumos.length === 0
            ? '<br><strong>→ La tabla stock_insumos está VACÍA. Ejecutá "Sincronizar" para cargar los datos del BOM.</strong>'
            : insumos.filter(i=>i.stock_fisico>0).length === 0
              ? '<br><strong>→ Todos los insumos tienen stock_fisico = 0. Verificar que la columna STOCK_FISICO del sheet BOM se esté leyendo correctamente.</strong>'
              : ''
          }
          ${bomRows.length > 0 && bomRows.filter(b=>insIdx[b.codigo_insumo]).length === 0
            ? '<br><strong>→ Ningún codigo_insumo del BOM coincide con stock_insumos. Los códigos no matchean.</strong>'
            : ''
          }
        </span>
        <br><small style="color:var(--txt2);">Abrí la consola del navegador (F12) para ver datos de diagnóstico detallados.</small>
      </div>` : ''}

      <div style="color:var(--txt2);font-size:11px;margin-bottom:10px;background:var(--bg3);padding:8px 12px;border-radius:6px;">
        <strong>Política:</strong> Cob. PT ${COB_PT}d + Cob. insumos ${COB_INS}d = ${COB_PIPE}d pipeline |
        Demanda = MAX(forecast, vta promedio) | Ranking por demanda |
        Excluidos: ${[...MARCAS_DISC].join(', ')} |
        ${Object.keys(COMPRA_EXT_LT).join(', ')}: compra exterior LT ${Object.values(COMPRA_EXT_LT).join(',')}d
      </div>

      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
        <button class="btn-gold btn-sm" onclick="showMrpTab('fab')" id="mrpBtnFab">🏭 Fabricación (${nFabTotal})</button>
        <button class="btn-outline btn-sm" onclick="showMrpTab('ins')" id="mrpBtnIns">🛒 Insumos (${insCompra.length})</button>
        <button class="btn-outline btn-sm" onclick="showMrpTab('cmp')" id="mrpBtnCmp">🛍️ Compra (${compraTop.length})</button>
        <button class="btn-outline btn-sm" onclick="showMrpTab('dsc')" id="mrpBtnDsc" style="opacity:0.7;">📦 Disc. (${discProds.length})</button>
      </div>

      <!-- ═══ FABRICACIÓN ═══ -->
      <div id="mrpPnlFab" class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <h3 style="color:var(--gold);">Plan de Producción — ${nFabTotal} productos (ordenados por demanda)</h3>
          <div style="display:flex;gap:6px;">
            <select id="mrpFiltFab" onchange="filterMrpFab()" style="width:auto;min-width:150px;font-size:12px;">
              <option value="">Todas las marcas</option>
              ${[...new Set(fabTop.filter(p=>p.marca).map(p=>p.marca))].sort().map(m=>`<option value="${m}">${m}</option>`).join('')}
            </select>
            <select id="mrpFiltUrgFab" onchange="filterMrpFab()" style="width:auto;min-width:120px;font-size:12px;">
              <option value="">Todas acciones</option>
              <option value="3">🔴 Producir ya</option>
              <option value="2">🟡 Planificar</option>
              <option value="1">🟠 Comprar ins.</option>
              <option value="0">🟢 OK</option>
            </select>
            <select id="mrpFiltABC" onchange="filterMrpFab()" style="width:auto;min-width:80px;font-size:12px;">
              <option value="">ABCD</option>
              <option value="A">A (>70k)</option>
              <option value="B">B (50-70k)</option>
              <option value="C">C (30-50k)</option>
              <option value="D">D (<30k)</option>
            </select>
          </div>
        </div>
        <p style="color:var(--txt2);font-size:11px;margin-bottom:8px;">
          ${nFabConBOM} con BOM + ${nFabSinBOM} sin fórmula${nSubEnsambles>0?' ('+nSubEnsambles+' sub-ensambles excluidos)':''}.
          <strong>Vta 3M</strong> = proyección 3 meses. <strong>Stock Ins.</strong> = cantidad física de cada tipo (Bot=Botella/Frasco, Est=Estuche/Caja, Ese=Esencia). "-" = no tiene ese componente.
          <strong>Produc.</strong> = uds fabricables con insumos actuales (cuello de botella).
        </p>
        ${fabTop.length === 0
          ? `<p style="color:var(--txt2);padding:20px;text-align:center;">
              No se encontraron productos de fabricación. Verificar config_marcas y/o BOM.
              <br><small>Marcas fab: ${[...marcasFab].join(', ') || 'ninguna'}</small>
            </p>`
          : `
          <div style="overflow-x:auto;max-height:80vh;overflow-y:auto;position:relative;">
            <table style="width:100%;border-collapse:collapse;font-size:11px;" id="mrpTblFab">
              <thead style="position:sticky;top:0;z-index:10;">
                <tr style="border-bottom:1px solid var(--border);background:var(--bg2);">
                  <th rowspan="2" style="padding:4px 4px;text-align:left;background:var(--bg2);">Código</th>
                  <th rowspan="2" style="padding:4px 4px;text-align:left;background:var(--bg2);">Producto</th>
                  <th rowspan="2" style="padding:4px 4px;text-align:left;background:var(--bg2);">Marca</th>
                  <th rowspan="2" style="padding:4px 4px;text-align:center;background:var(--bg2);" title="Clasificación ABCD por volumen anual">ABC</th>
                  <th colspan="2" style="padding:4px 4px;text-align:center;border-bottom:1px solid var(--border);color:var(--gold);background:var(--bg2);">Venta</th>
                  <th rowspan="2" style="padding:4px 4px;text-align:right;background:var(--bg2);">Stock PT</th>
                  <th colspan="3" style="padding:4px 4px;text-align:center;border-bottom:1px solid var(--border);color:var(--violet);background:var(--bg2);">Stock Insumos</th>
                  <th rowspan="2" style="padding:4px 4px;text-align:right;background:var(--bg2);" title="Uds producibles con insumos actuales">Produc.</th>
                  <th rowspan="2" style="padding:4px 4px;text-align:right;background:var(--bg2);">Prod.Plan</th>
                  <th rowspan="2" style="padding:4px 4px;text-align:center;background:var(--bg2);" title="Fecha planificada de producción">Fch.Prod</th>
                  <th rowspan="2" style="padding:4px 4px;text-align:right;background:var(--bg2);">Disp.</th>
                  <th rowspan="2" style="padding:4px 4px;text-align:center;background:var(--bg2);">Cob.PT</th>
                  <th rowspan="2" style="padding:4px 4px;text-align:center;background:var(--bg2);">Cob.Tot</th>
                  <th rowspan="2" style="padding:4px 4px;text-align:center;background:var(--bg2);" title="Fecha estimada rotura stock PT">Quiebre</th>
                  <th rowspan="2" style="padding:4px 4px;text-align:center;background:var(--bg2);">Acción</th>
                  <th rowspan="2" style="padding:4px 4px;text-align:left;background:var(--bg2);">Cuello</th>
                </tr>
                <tr style="border-bottom:2px solid var(--border);background:var(--bg2);">
                  <th style="padding:2px 4px;text-align:right;font-size:9px;background:var(--bg2);">Mes</th>
                  <th style="padding:2px 3px;text-align:right;font-size:9px;background:var(--bg2);">3M</th>
                  <th style="padding:2px 3px;text-align:center;font-size:9px;background:var(--bg2);" title="Botella/Frasco">Bot</th>
                  <th style="padding:2px 3px;text-align:center;font-size:9px;background:var(--bg2);" title="Estuche/Caja">Est</th>
                  <th style="padding:2px 3px;text-align:center;font-size:9px;background:var(--bg2);" title="Esencia/Fragancia">Ese</th>
                </tr>
              </thead><tbody>
              ${fabTop.map((p, i) => `
                <tr style="border-bottom:1px solid var(--border);${i<40?'':'opacity:0.85;'}${p.urg>=3?'background:rgba(255,50,50,0.08);':p.urg>=2?'background:rgba(255,165,0,0.05);':''}" data-marca="${p.marca}" data-urg="${p.urg}" data-abc="${p.abc}">
                  <td style="padding:2px 4px;font-family:monospace;font-size:9px;color:var(--txt2);" title="${p.codigo}">${p.codigo}</td>
                  <td style="padding:2px 4px;min-width:220px;max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${p.nombre}${!p.hasBOM?' (sin BOM)':''}">${(p.nombre||'').substring(0,38)}${!p.hasBOM?' <span style=color:var(--orange);font-size:8px;>∅</span>':''}</td>
                  <td style="padding:2px 4px;font-size:9px;white-space:nowrap;">${p.marca||'?'}</td>
                  <td style="padding:2px 4px;text-align:center;font-weight:bold;font-size:10px;color:${{A:'var(--green)',B:'var(--blue)',C:'var(--gold)',D:'var(--txt2)'}[p.abc]||'var(--txt2)'};">${p.abc}</td>
                  <td style="padding:2px 4px;text-align:right;font-weight:bold;">${p.vtaMes>0?Math.round(p.vtaMes).toLocaleString():'<span style=color:var(--txt2)>-</span>'}</td>
                  <td style="padding:2px 4px;text-align:right;color:var(--txt2);">${p.vta3m>0?Math.round(p.vta3m).toLocaleString():'-'}</td>
                  <td style="padding:2px 4px;text-align:right;color:${p.stock<=0?'var(--red)':'var(--txt)'};">${Math.round(p.stock).toLocaleString()}</td>
                  <td style="padding:2px 4px;text-align:right;">${p.hasBOM?insNum(p.insBot):'-'}</td>
                  <td style="padding:2px 4px;text-align:right;">${p.hasBOM?insNum(p.insEst):'-'}</td>
                  <td style="padding:2px 4px;text-align:right;">${p.hasBOM?insNum(p.insEse):'-'}</td>
                  <td style="padding:2px 4px;text-align:right;color:${p.producibles<=0?(p.hasBOM?'var(--red)':'var(--txt2)'):'var(--green)'};">${p.hasBOM?Math.round(p.producibles).toLocaleString():'-'}</td>
                  <td style="padding:2px 4px;text-align:right;color:${p.prod>0?'var(--green)':'var(--txt2)'};">${p.prod>0?Math.round(p.prod).toLocaleString():'-'}</td>
                  <td style="padding:2px 4px;text-align:center;font-size:9px;color:${p.fechaProd?'var(--gold)':'var(--txt2)'};">${fmtMes(p.fechaProd)}</td>
                  <td style="padding:2px 4px;text-align:right;font-weight:bold;">${Math.round(p.disponible).toLocaleString()}</td>
                  <td style="padding:2px 4px;text-align:center;font-weight:bold;color:${cobClr(p.cobPT)};">${p.cobPT>=999?'∞':p.cobPT+'d'}</td>
                  <td style="padding:2px 4px;text-align:center;font-weight:bold;color:${cobClr(p.cobTot)};">${p.cobTot>=999?'∞':p.cobTot+'d'}</td>
                  <td style="padding:2px 4px;text-align:center;font-size:9px;color:${p.cobPT<60?'var(--red)':'var(--txt2)'};">${p.quiebrePT && p.cobPT<999 ? fmtDate(p.quiebrePT) : '-'}</td>
                  <td style="padding:2px 4px;text-align:center;font-size:10px;white-space:nowrap;">${p.accion}</td>
                  <td style="padding:2px 4px;font-size:8px;color:var(--txt2);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${p.cuello?p.cuello.det+' (stk:'+p.cuello.stk+', rinde:'+p.cuello.rinde+')':''}">${p.cuello?(p.cuello.det||p.cuello.cod).substring(0,18)+' →'+p.cuello.rinde:(p.hasBOM?'-':'')}</td>
                </tr>
              `).join('')}
              </tbody></table>
          </div>
          <p style="color:var(--txt2);font-size:10px;margin-top:6px;">
            📊 ${nFabTotal} PTs fab (${nFabConBOM} BOM, ${nFabSinBOM} sin). ${nSubEnsambles} sub-ens.
            | 🔗 Insumos: ${insumos.length} en DB, ${bomRows.length} BOM rows,
            match ${bomRows.filter(b => insIdx[b.codigo_insumo]).length}/${bomRows.length} (${bomRows.length > 0 ? Math.round(bomRows.filter(b => insIdx[b.codigo_insumo]).length / bomRows.length * 100) : 0}%).
            | ${insumos.filter(i => i.stock_fisico > 0).length}/${insumos.length} con stock>0.
            | Tipos: ${(() => { const t = {}; insumos.forEach(i => { t[i.tipo_insumo_global||'?'] = (t[i.tipo_insumo_global||'?']||0)+1; }); return Object.entries(t).map(([k,v])=>k+':'+v).join(', '); })()}
            ${bomRows.filter(b => insIdx[b.codigo_insumo]).length < bomRows.length * 0.5 ? ' | ⚠️ <strong style="color:var(--orange);">Match bajo: verificar sincronización BOM (config_sheets.sheet_name_bom)</strong>' : ''}
          </p>`
        }
      </div>

      <!-- ═══ INSUMOS ═══ -->
      <div id="mrpPnlIns" class="card" style="display:none;">
        <h3 style="color:var(--gold);margin-bottom:4px;">Necesidades de Insumos</h3>
        <p style="color:var(--txt2);font-size:11px;margin-bottom:8px;">
          Para cubrir ${COB_PIPE}d de pipeline. 🔗 = insumo compartido entre PTs (demanda agregada).
        </p>
        ${insCompra.length===0
          ? '<p style="color:var(--green);padding:20px;text-align:center;">✅ Insumos cubiertos para los próximos '+COB_PIPE+' días.</p>'
          : Object.entries(insGrp).map(([tipo,items])=>`
          <div style="margin-bottom:14px;">
            <h4 style="margin-bottom:4px;font-size:13px;">${tLabel[tipo]||tipo} — ${items.length} items</h4>
            <table style="width:100%;border-collapse:collapse;font-size:12px;">
              <thead><tr style="border-bottom:2px solid var(--border);background:var(--bg3);">
                <th style="padding:4px 6px;text-align:left;">Código</th><th style="padding:4px 6px;text-align:left;">Insumo</th>
                <th style="padding:4px 6px;text-align:right;">Stock</th><th style="padding:4px 6px;text-align:right;">Necesidad</th>
                <th style="padding:4px 6px;text-align:right;color:var(--red);">Comprar</th><th style="padding:4px 6px;text-align:right;">LT</th>
                <th style="padding:4px 6px;text-align:left;">PTs</th>
              </tr></thead><tbody>
              ${items.map(i=>`
                <tr style="border-bottom:1px solid var(--border);">
                  <td style="padding:3px 6px;font-family:monospace;font-size:10px;">${i.cod}${i.sh?' 🔗':''}</td>
                  <td style="padding:3px 6px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${i.det}">${(i.det||'').substring(0,30)}</td>
                  <td style="padding:3px 6px;text-align:right;">${Math.round(i.stk).toLocaleString()}</td>
                  <td style="padding:3px 6px;text-align:right;">${i.dem.toLocaleString()}</td>
                  <td style="padding:3px 6px;text-align:right;color:var(--red);font-weight:bold;">${i.buy.toLocaleString()}</td>
                  <td style="padding:3px 6px;text-align:right;">${Math.round(i.lt/30*10)/10}m</td>
                  <td style="padding:3px 6px;font-size:9px;color:var(--txt2);" title="${i.info.map(pt=>pt.cod+' '+pt.nom+' def:'+pt.def).join('\n')}">${i.n}PT: ${i.info.slice(0,3).map(pt=>pt.cod).join(',')}${i.n>3?'...':''}</td>
                </tr>`).join('')}
              </tbody></table></div>`).join('')}
      </div>

      <!-- ═══ COMPRA DIRECTA ═══ -->
      <div id="mrpPnlCmp" class="card" style="display:none;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <h3 style="color:var(--gold);">Compra Directa / Exterior — ${compraTop.length} productos</h3>
          <select id="mrpFiltCmp" onchange="filterMrpCompra()" style="width:auto;min-width:150px;font-size:12px;">
            <option value="">Todas las marcas</option>
            ${[...new Set(compraTop.map(p=>p.marca))].sort().map(m=>`<option value="${m}">${m}</option>`).join('')}
          </select>
        </div>
        <p style="color:var(--txt2);font-size:11px;margin-bottom:8px;">Productos sin BOM y marcas de compra + Fascino ✈️ (full service exterior, LT 150d).</p>
        ${compraTop.length===0?'<p style="color:var(--txt2);padding:20px;text-align:center;">Sin productos de compra directa con demanda.</p>':`
        <div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:12px;" id="mrpTblCmp">
          <thead><tr style="border-bottom:2px solid var(--border);background:var(--bg3);">
            <th style="padding:5px 4px;">#</th><th style="padding:5px 4px;text-align:left;">Código</th><th style="padding:5px 4px;text-align:left;">Producto</th>
            <th style="padding:5px 4px;text-align:left;">Marca</th><th style="padding:5px 4px;text-align:right;">Demanda/mes</th><th style="padding:5px 4px;text-align:right;">Stock</th>
            <th style="padding:5px 4px;text-align:center;">Cob.</th><th style="padding:5px 4px;text-align:right;">LT</th>
            <th style="padding:5px 4px;text-align:right;">Nec.LT</th><th style="padding:5px 4px;text-align:center;">Acción</th>
          </tr></thead><tbody>
          ${compraTop.map((p,i)=>{
            const nec=Math.round(p.demDia*(p.lt||90));
            const gap=Math.max(0,nec-(p.stock_actual||p.stock||0));
            return `<tr style="border-bottom:1px solid var(--border);${p.urg>=3?'background:rgba(255,50,50,0.08);':p.urg>=2?'background:rgba(255,165,0,0.05);':''}" data-marca="${p.marca}">
              <td style="padding:3px 4px;color:var(--txt2);font-size:10px;">${i+1}</td>
              <td style="padding:3px 4px;font-family:monospace;font-size:10px;">${p.codigo}</td>
              <td style="padding:3px 4px;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${p.nombre}">${(p.nombre||'').substring(0,25)}</td>
              <td style="padding:3px 4px;font-size:10px;">${p.marca}${p.isExt?' ✈️':''}</td>
              <td style="padding:3px 4px;text-align:right;font-weight:bold;">${Math.round(p.demanda).toLocaleString()}</td>
              <td style="padding:3px 4px;text-align:right;">${Math.round(p.stock_actual||p.stock||0).toLocaleString()}</td>
              <td style="padding:3px 4px;text-align:center;font-weight:bold;color:${cobClr(p.cobDias||p.cobPT||999)};">${(p.cobDias||p.cobPT||999)>=999?'∞':(p.cobDias||p.cobPT)+'d'}</td>
              <td style="padding:3px 4px;text-align:right;">${Math.round((p.lt||90)/30*10)/10}m</td>
              <td style="padding:3px 4px;text-align:right;">${nec.toLocaleString()}${gap>0?' <span style=color:var(--red);font-weight:bold>(−'+gap.toLocaleString()+')</span>':''}</td>
              <td style="padding:3px 4px;text-align:center;font-size:11px;">${p.accion}</td>
            </tr>`;}).join('')}
          </tbody></table></div>`}
      </div>

      <!-- ═══ DISCONTINUADOS ═══ -->
      <div id="mrpPnlDsc" class="card" style="display:none;">
        <h3 style="color:var(--txt2);margin-bottom:4px;">📦 Discontinuados</h3>
        <p style="color:var(--txt2);font-size:11px;margin-bottom:8px;">Marcas: ${[...MARCAS_DISC].join(', ')}. Requieren estrategia de liquidación.</p>
        ${discProds.length===0?'<p style="padding:20px;text-align:center;color:var(--txt2);">Sin stock de discontinuados.</p>':`
        <div style="background:var(--bg3);padding:8px 12px;border-radius:6px;margin-bottom:10px;">
          <strong style="color:var(--gold);">${discProds.filter(p=>(p.stock_actual||0)>0).length}</strong> SKUs con stock |
          <strong style="color:var(--orange);">${discProds.reduce((s,p)=>s+(p.stock_actual||0),0).toLocaleString()}</strong> uds totales
        </div>
        <table style="width:100%;border-collapse:collapse;font-size:12px;">
          <thead><tr style="border-bottom:2px solid var(--border);background:var(--bg3);">
            <th style="padding:5px 6px;text-align:left;">Código</th><th style="padding:5px 6px;text-align:left;">Producto</th><th style="padding:5px 6px;">Marca</th>
            <th style="padding:5px 6px;text-align:right;">Stock</th><th style="padding:5px 6px;text-align:right;">Vta.res.</th><th style="padding:5px 6px;">Sugerencia</th>
          </tr></thead><tbody>
          ${discProds.sort((a,b)=>(b.stock_actual||0)-(a.stock_actual||0)).map(p=>{
            const dem=Math.max(p.forecast_proximo_mes||0,p.venta_mensual_avg||0);
            const sug=dem>0?(((p.stock_actual||0)/dem*30)>180?'Liquidar excedente':'Venta natural'):'Liquidar/donar';
            return `<tr style="border-bottom:1px solid var(--border);">
              <td style="padding:3px 6px;font-family:monospace;font-size:10px;">${p.codigo}</td>
              <td style="padding:3px 6px;">${(p.nombre||'').substring(0,30)}</td><td style="padding:3px 6px;">${p.marca}</td>
              <td style="padding:3px 6px;text-align:right;font-weight:bold;">${Math.round(p.stock_actual||0).toLocaleString()}</td>
              <td style="padding:3px 6px;text-align:right;">${dem>0?Math.round(dem).toLocaleString():'-'}</td>
              <td style="padding:3px 6px;font-size:11px;color:var(--txt2);">${sug}</td>
            </tr>`;}).join('')}
          </tbody></table>`}
      </div>
    `;
  } catch (e) {
    c.innerHTML = `<div class="card" style="text-align:center;padding:40px;"><h3 style="color:var(--red);">Error MRP</h3><p style="color:var(--txt2);">${e.message}</p>
      <button class="btn-outline" style="margin-top:12px;" onclick="renderMRPPage(document.getElementById('tabContent'))">Reintentar</button></div>`;
  }
}

function showMrpTab(t) {
  ['fab','ins','cmp','dsc'].forEach(k => {
    const p = document.getElementById('mrpPnl' + k.charAt(0).toUpperCase() + k.slice(1));
    const b = document.getElementById('mrpBtn' + k.charAt(0).toUpperCase() + k.slice(1));
    if (p) p.style.display = k === t ? '' : 'none';
    if (b) b.className = k === t ? 'btn-gold btn-sm' : 'btn-outline btn-sm';
  });
}

function filterMrpCompra() {
  const m = document.getElementById('mrpFiltCmp')?.value || '';
  document.querySelectorAll('#mrpTblCmp tr[data-marca]').forEach(r => { r.style.display = !m || r.dataset.marca === m ? '' : 'none'; });
}

function filterMrpFab() {
  const m = document.getElementById('mrpFiltFab')?.value || '';
  const u = document.getElementById('mrpFiltUrgFab')?.value || '';
  const a = document.getElementById('mrpFiltABC')?.value || '';
  document.querySelectorAll('#mrpTblFab tr[data-marca]').forEach(r => {
    const mOk = !m || r.dataset.marca === m;
    const uOk = !u || r.dataset.urg === u;
    const aOk = !a || r.dataset.abc === a;
    r.style.display = mOk && uOk && aOk ? '' : 'none';
  });
}

// Admin: Mark user row as dirty (show save button)
function markUserDirty(userId) {
  const btn = document.getElementById(`saveUser_${userId}`);
  if (btn) btn.style.display = 'inline-block';
}

// Admin: Save user profile (role + can_approve)
async function saveUserProfile(userId) {
  const roleEl = document.getElementById(`role_${userId}`);
  const approveEl = document.getElementById(`approve_${userId}`);
  if (!roleEl) return;
  const newRole = roleEl.value;
  const canApprove = approveEl?.checked || false;
  const { error } = await sb.from('profiles').update({ role: newRole, can_approve_solicitud: canApprove }).eq('id', userId);
  if (error) { toast('Error actualizando usuario: ' + error.message); return; }
  toast('Usuario actualizado correctamente');
  const btn = document.getElementById(`saveUser_${userId}`);
  if (btn) btn.style.display = 'none';
  // Reload profiles
  await loadAllProfiles();
}

// Admin: Add brand to user
async function addBrandToUser(userId) {
  const marca = document.getElementById(`addBrand_${userId}`)?.value;
  if (!marca) return;
  await withRetry(async () => {
    // If adding __ALL__, remove individual brands first
    if (marca === '__ALL__') {
      await sb.from('usuario_marcas').delete().eq('user_id', userId);
    }
    const { error } = await sb.from('usuario_marcas').upsert({ user_id: userId, marca }, { onConflict: 'user_id,marca' });
    if (error) throw error;
  }, { label: 'Asignar marca' });
  await loadUsuarioMarcas();
  renderAdmin(document.getElementById('tabContent'));
}

async function removeBrandFromUser(userId, marca) {
  await withRetry(async () => {
    const { error } = await sb.from('usuario_marcas').delete().eq('user_id', userId).eq('marca', marca);
    if (error) throw error;
  }, { label: 'Quitar marca' });
  await loadUsuarioMarcas();
  renderAdmin(document.getElementById('tabContent'));
}

async function removeAllBrandsFromUser(userId) {
  await withRetry(async () => {
    const { error } = await sb.from('usuario_marcas').delete().eq('user_id', userId);
    if (error) throw error;
  }, { label: 'Quitar todas las marcas' });
  await loadUsuarioMarcas();
  renderAdmin(document.getElementById('tabContent'));
}

// Admin: Proveedores habituales
async function addProveedorHabitual(marca) {
  const inputId = `newProv_${marca.replace(/[^a-zA-Z]/g,'_')}`;
  const prov = document.getElementById(inputId)?.value?.trim();
  if (!prov) return;
  await withRetry(async () => {
    const existing = plantillasMarca[marca];
    if (existing) {
      const provs = [...(existing.proveedores_habituales || []), prov];
      const { error } = await sb.from('plantillas_marca').update({ proveedores_habituales: provs }).eq('marca', marca);
      if (error) throw error;
    } else {
      const { error } = await sb.from('plantillas_marca').insert({ marca, proveedores_habituales: [prov] });
      if (error) throw error;
    }
  }, { label: 'Agregar proveedor' });
  await loadPlantillas();
  renderAdmin(document.getElementById('tabContent'));
}

async function removeProveedorHabitual(marca, prov) {
  await withRetry(async () => {
    const existing = plantillasMarca[marca];
    if (!existing) return;
    const provs = (existing.proveedores_habituales || []).filter(p => p !== prov);
    const { error } = await sb.from('plantillas_marca').update({ proveedores_habituales: provs }).eq('marca', marca);
    if (error) throw error;
  }, { label: 'Quitar proveedor' });
  await loadPlantillas();
  renderAdmin(document.getElementById('tabContent'));
}

// Admin: Save Google Sheets config
// Extraer Sheet ID de una URL completa de Google Sheets
function extractSheetId(input) {
  if (!input) return null;
  const match = input.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  if (match) return match[1];
  if (!input.includes('/') && input.length > 10) return input;
  return input.trim();
}

async function saveConfigSheets(btn) {
  const status = document.getElementById('sheetsStatus');
  if (btn) btn.disabled = true;
  if (status) { status.textContent = 'Guardando...'; status.style.color = 'var(--gold)'; }

  try {
    const rawStocks = document.getElementById('cfgSheetIdStocks')?.value?.trim() || '';
    const rawForecast = document.getElementById('cfgSheetIdForecast')?.value?.trim() || '';
    const rawStockSistema = document.getElementById('cfgSheetIdStockSistema')?.value?.trim() || '';
    const rawBom = document.getElementById('cfgSheetIdBom')?.value?.trim() || '';
    const rawProducciones = document.getElementById('cfgSheetIdProducciones')?.value?.trim() || '';
    const sheetIdStocks = extractSheetId(rawStocks);
    const sheetIdForecast = extractSheetId(rawForecast);
    const sheetIdStockSistema = extractSheetId(rawStockSistema);
    const sheetIdBom = extractSheetId(rawBom);
    const sheetIdProducciones = extractSheetId(rawProducciones);
    const sheetNameStocks = document.getElementById('cfgSheetNameStocks')?.value?.trim() || 'Ventas stock cierre cobertura';
    const sheetNameForecast = document.getElementById('cfgSheetNameForecast')?.value?.trim() || 'Resumen Gral.';
    const sheetNameStockSistema = document.getElementById('cfgSheetNameStockSistema')?.value?.trim() || 'Stock Sistema';
    const sheetNameDescripcion = document.getElementById('cfgSheetNameDescripcion')?.value?.trim() || 'Descripcion';
    const sheetNameBom = document.getElementById('cfgSheetNameBom')?.value?.trim() || 'BASE BRUTA';
    const sheetNameProducciones = document.getElementById('cfgSheetNameProducciones')?.value?.trim() || 'UNIFICADO';

    if (!sheetIdStocks && !sheetIdForecast && !sheetIdStockSistema && !sheetIdBom) {
      toast('Ingresá al menos un Sheet ID o URL', true);
      if (status) { status.textContent = '⚠️ Falta Sheet ID'; status.style.color = 'var(--red)'; }
      if (btn) btn.disabled = false;
      return;
    }

    console.log('Saving sheets config:', { sheetIdStocks, sheetIdForecast, sheetIdStockSistema });

    const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout (10s). Ejecutá el SQL de permisos RLS en Supabase.')), 10000));

    const configData = {
      sheet_id_stocks: sheetIdStocks, sheet_name_stocks: sheetNameStocks,
      sheet_id_forecast: sheetIdForecast, sheet_name_forecast: sheetNameForecast,
      sheet_id_stock_sistema: sheetIdStockSistema, sheet_name_stock_sistema: sheetNameStockSistema,
      sheet_name_descripcion: sheetNameDescripcion,
      sheet_id_bom: sheetIdBom, sheet_name_bom: sheetNameBom,
      sheet_id_producciones: sheetIdProducciones, sheet_name_producciones: sheetNameProducciones,
      sync_enabled: true,
    };

    const save = (async () => {
      // Try upsert first
      const { error: upsErr } = await sb.from('config_sheets').upsert({ id: 1, ...configData }, { onConflict: 'id' });
      if (upsErr) {
        console.log('Upsert failed:', upsErr.message, '→ trying update only');
        const { error: updErr } = await sb.from('config_sheets').update(configData).eq('id', 1);
        if (updErr) throw new Error('Update: ' + updErr.message + ' | Upsert: ' + upsErr.message);
      }
    })();

    await Promise.race([save, timeout]);

    if (sheetIdStocks) document.getElementById('cfgSheetIdStocks').value = sheetIdStocks;
    if (sheetIdForecast) document.getElementById('cfgSheetIdForecast').value = sheetIdForecast;
    if (sheetIdStockSistema) document.getElementById('cfgSheetIdStockSistema').value = sheetIdStockSistema;
    if (sheetIdBom) document.getElementById('cfgSheetIdBom').value = sheetIdBom;
    if (sheetIdProducciones) document.getElementById('cfgSheetIdProducciones').value = sheetIdProducciones;

    toast('Configuración de Sheets guardada ✓');
    if (status) { status.textContent = '✅ Guardado'; status.style.color = 'var(--green)'; }
  } catch (e) {
    console.error('saveConfigSheets error:', e);
    toast('Error: ' + e.message, true);
    if (status) { status.textContent = '❌ ' + e.message; status.style.color = 'var(--red)'; }
  }
  if (btn) btn.disabled = false;
}

function loadPlantillaProveedores() {
  const marca = document.getElementById('nsMarca')?.value;
  const hint = document.getElementById('plantillaProvHint');
  if (!marca || marca === '__otra__' || !plantillasMarca[marca]) {
    if (hint) hint.style.display = 'none';
    return;
  }
  const provs = plantillasMarca[marca]?.proveedores_habituales || [];
  if (provs.length && hint) {
    hint.style.display = 'block';
    hint.innerHTML = `<span style="font-size:11px;color:var(--gold);">Proveedores habituales de ${marca}: ${provs.join(', ')}</span>`;
  }

function calcularAnalisisRegular() {
  const stockInsumo = parseFloat(document.getElementById('nsStockInsumo').value) || 0;
  const stockPT = parseFloat(document.getElementById('nsStockPT').value) || 0;
  const fcstM1 = parseFloat(document.getElementById('nsFcstM1').value) || 0;
  const fcstM2 = parseFloat(document.getElementById('nsFcstM2').value) || 0;
  const fcstM3 = parseFloat(document.getElementById('nsFcstM3').value) || 0;
  const consumoXPT = parseFloat(document.getElementById('nsConsumoXPT').value) || 1;
  const leadTime = parseInt(document.getElementById('nsLeadTime').value) || 150;

  const fcstTotal3m = fcstM1 + fcstM2 + fcstM3;
  const fcstMensualProm = fcstTotal3m / 3;

  if (!fcstMensualProm) return toast('Completá el forecast de al menos un mes', true);

  // ---- Demanda diaria de PT ----
  const demandaDiariaPT = fcstMensualProm / 30;

  // ---- Cobertura total ----
  // El stock de insumo se va a convertir en PT (insumo / consumoXPT = PT producibles)
  const ptProduciblesConInsumo = stockInsumo / consumoXPT;
  const stockTotalEnPT = stockPT + ptProduciblesConInsumo;
  const coberturaTotal = Math.round(stockTotalEnPT / demandaDiariaPT);

  // Cobertura solo de PT actual (sin considerar insumo)
  const coberturaPT = Math.round(stockPT / demandaDiariaPT);
  // Cobertura solo del insumo (en días de demanda de PT)
  const coberturaInsumo = Math.round(ptProduciblesConInsumo / demandaDiariaPT);

  // ---- Fecha límite para emitir la OC ----
  // El insumo nuevo tarda "leadTime" días en llegar.
  // Queremos que llegue antes de que la cobertura total baje de 90 días.
  // Entonces la OC se debe emitir cuando falten (cobertura - 90) días... menos el lead time.
  // diasHastaStock90 = días hasta que la cobertura total llegue a 90 días
  const diasHastaStock90 = Math.max(0, coberturaTotal - 90);
  // La OC tiene que salir "leadTime" días antes de que necesitemos el insumo
  const diasParaEmitirOC = diasHastaStock90 - leadTime;

  const hoy = new Date();
  const fechaOC = new Date(hoy);
  fechaOC.setDate(fechaOC.getDate() + Math.max(0, diasParaEmitirOC));

  // Fecha estimada de llegada
  const fechaLlegada = new Date(fechaOC);
  fechaLlegada.setDate(fechaLlegada.getDate() + leadTime);

  // ---- Cantidad a comprar ----
  // Queremos tener 90 días de insumo DESPUÉS de que llegue la compra.
  // Al momento de llegada, el stock de insumo habrá bajado.
  // Consumo diario de insumo = demandaDiariaPT * consumoXPT
  const consumoDiarioInsumo = demandaDiariaPT * consumoXPT;
  // Días hasta llegada desde hoy
  const diasHastaLlegada = Math.max(0, Math.round((fechaLlegada - hoy) / (1000*60*60*24)));
  // Insumo restante al momento de llegada (puede ser negativo = quiebre)
  const insumoAlLlegar = stockInsumo - (consumoDiarioInsumo * diasHastaLlegada);
  // Necesitamos: 90 días de insumo post-llegada
  const insumoTarget = consumoDiarioInsumo * 90;
  const cantidadCompra = Math.max(0, Math.ceil(insumoTarget - Math.max(0, insumoAlLlegar)));

  // ---- Alerta de urgencia ----
  const esUrgente = diasParaEmitirOC < 0;
  const diasAtraso = Math.abs(Math.min(0, diasParaEmitirOC));
  const hayQuiebre = insumoAlLlegar < 0;
  const diasQuiebre = hayQuiebre ? Math.ceil(Math.abs(insumoAlLlegar) / consumoDiarioInsumo) : 0;

  // Guardar resultados
  document.getElementById('nsFechaNecesidadCalc').value = fechaOC.toISOString().split('T')[0];
  document.getElementById('nsCantidadCompra').value = cantidadCompra;

  // Mostrar resultados
  const res = document.getElementById('resultadoAnalisis');
  res.classList.remove('hidden');
  res.innerHTML = `
    ${esUrgente ? `<div style="background:var(--red);color:#fff;padding:10px 14px;border-radius:6px;margin-bottom:12px;font-size:13px;font-weight:600;">
      ⚠️ OC URGENTE — La orden de compra debería haberse emitido hace ${diasAtraso} días para mantener 90 días de cobertura.
      ${hayQuiebre ? `<br>⛔ QUIEBRE DE STOCK: habrá ${diasQuiebre} días sin insumo antes de que llegue la compra.` : ''}
    </div>` : ''}
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
      <div style="text-align:center;padding:10px;background:var(--bg3);border-radius:8px;">
        <div style="font-size:11px;color:var(--txt2);text-transform:uppercase;">Cobertura PT</div>
        <div style="font-size:22px;font-weight:800;color:${coberturaPT < 30 ? 'var(--red)' : coberturaPT < 60 ? 'var(--orange)' : 'var(--green)'};">${coberturaPT}d</div>
        <div style="font-size:11px;color:var(--txt2);">${stockPT.toLocaleString('es-AR')} un.</div>
      </div>
      <div style="text-align:center;padding:10px;background:var(--bg3);border-radius:8px;">
        <div style="font-size:11px;color:var(--txt2);text-transform:uppercase;">Cobertura Insumo</div>
        <div style="font-size:22px;font-weight:800;color:${coberturaInsumo < 45 ? 'var(--red)' : coberturaInsumo < 90 ? 'var(--orange)' : 'var(--green)'};">${coberturaInsumo}d</div>
        <div style="font-size:11px;color:var(--txt2);">${stockInsumo.toLocaleString('es-AR')} un. (= ${Math.round(ptProduciblesConInsumo).toLocaleString('es-AR')} PT)</div>
      </div>
      <div style="text-align:center;padding:10px;background:var(--bg3);border-radius:8px;">
        <div style="font-size:11px;color:var(--txt2);text-transform:uppercase;">Cobertura Total</div>
        <div style="font-size:22px;font-weight:800;color:${coberturaTotal < 90 ? 'var(--red)' : coberturaTotal < 150 ? 'var(--orange)' : 'var(--green)'};">${coberturaTotal}d</div>
        <div style="font-size:11px;color:var(--txt2);">PT + Insumo convertido</div>
      </div>
    </div>
    <div style="margin-top:10px;font-size:12px;color:var(--txt2);line-height:1.6;">
      Forecast promedio mensual: <strong style="color:var(--txt)">${Math.round(fcstMensualProm).toLocaleString('es-AR')}</strong> un/mes
      · Demanda diaria: <strong style="color:var(--txt)">${Math.round(demandaDiariaPT)}</strong> PT/día
      · Consumo diario insumo: <strong style="color:var(--txt)">${Math.round(consumoDiarioInsumo)}</strong> un/día
      · Lead time: <strong style="color:var(--txt)">${leadTime}</strong> días
    </div>
    <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div style="text-align:center;">
        <div style="font-size:11px;color:var(--txt2);text-transform:uppercase;">Cantidad a comprar</div>
        <div style="font-size:28px;font-weight:800;color:var(--gold);">${cantidadCompra.toLocaleString('es-AR')}</div>
        <div style="font-size:12px;color:var(--txt2);">unidades de insumo</div>
      </div>
      <div style="text-align:center;">
        <div style="font-size:11px;color:var(--txt2);text-transform:uppercase;">Fecha recomendada de OC</div>
        <div style="font-size:28px;font-weight:800;color:${esUrgente ? 'var(--red)' : 'var(--gold)'};">${fechaOC.toLocaleDateString('es-AR')}</div>
        <div style="font-size:12px;color:var(--txt2);">Llegada estimada: ${fechaLlegada.toLocaleDateString('es-AR')}</div>
      </div>
    </div>`;

  toast('Análisis calculado correctamente');
}

async function submitSolicitud() {
  const tipo = document.getElementById('nsTipo').value;
  const marcaSel = document.getElementById('nsMarca').value;
  const marca = marcaSel === '__otra__' ? document.getElementById('nsMarcaOtra').value.trim() : marcaSel;
  const nombre = document.getElementById('nsNombre').value.trim();
  const desc = document.getElementById('nsDesc').value.trim();
  const costo = parseFloat(document.getElementById('nsCosto').value) || null;
  const cotiz = document.getElementById('nsCotiz').value;
  const cotizNombre = document.getElementById('nsCotizNombre')?.value?.trim() || null;
  const origenCompra = document.getElementById('nsOrigenCompra')?.value || 'exterior';

  // Collect códigos internos
  const codigosEls = document.querySelectorAll('.codigo-interno-val');
  const codigosInternos = [];
  codigosEls.forEach(el => { if (el.value.trim()) codigosInternos.push(el.value.trim()); });

  // Determine dates based on tipo
  let sellIn = null, lanzamiento = null, fechaNecesidad = null;
  let datosRegulares = null;
  let datosSet = null;

  if (tipo === 'Nuevos desarrollos') {
    sellIn = document.getElementById('nsSellIn').value || null;
    lanzamiento = document.getElementById('nsLanzamiento').value || null;
    const fechaProd = document.getElementById('nsFechaProduccion').value || null;
    if (!lanzamiento) return toast('La fecha de lanzamiento es obligatoria', true);
  } else if (tipo === 'Cambio de proveedor' || tipo === 'Traspaso compra local al exterior' || tipo === 'Adaptación de desarrollo') {
    fechaNecesidad = document.getElementById('nsFechaNecesidad').value || null;
    lanzamiento = fechaNecesidad;
    if (!fechaNecesidad) return toast('La fecha de necesidad es obligatoria', true);
  } else if (tipo === 'Compras regulares') {
    const stockInsumo = document.getElementById('nsStockInsumo').value;
    const stockPT = document.getElementById('nsStockPT').value;
    const fcstM1 = document.getElementById('nsFcstM1').value;
    const fcstM2 = document.getElementById('nsFcstM2').value;
    const fcstM3 = document.getElementById('nsFcstM3').value;
    const consumoXPT = document.getElementById('nsConsumoXPT').value;
    const leadTime = document.getElementById('nsLeadTime').value;
    const cantidadCompra = document.getElementById('nsCantidadCompra').value;
    fechaNecesidad = document.getElementById('nsFechaNecesidadCalc').value || null;
    lanzamiento = fechaNecesidad;
    if (!fechaNecesidad) return toast('Ejecutá el cálculo de fecha y cantidad primero', true);
    datosRegulares = { stockInsumo, stockPT, fcstM1, fcstM2, fcstM3, consumoXPT, leadTime, cantidadCompra };
  } else if (tipo === 'Set, Cofres y Otros') {
    const subtipoSel = document.getElementById('nsSubtipoSet').value;
    const subtipo = subtipoSel === '__otro__' ? document.getElementById('nsSubtipoOtro').value.trim() : subtipoSel;
    sellIn = document.getElementById('nsFechaSellInSet').value || null;
    lanzamiento = sellIn; // Use sell-in as reference for retroplan
    if (!lanzamiento) return toast('La fecha de necesidad de Sell In es obligatoria', true);

    // Collect componentes
    const prods = [];
    document.querySelectorAll('#nsProductosPrincipales .set-componente').forEach(row => {
      const n = row.querySelector('.set-comp-nombre')?.value?.trim();
      if (n) prods.push({ nombre: n, existente: row.querySelector('.set-comp-existente')?.checked });
    });
    const accs = [];
    document.querySelectorAll('#nsAccesorios .set-componente').forEach(row => {
      const n = row.querySelector('.set-comp-nombre')?.value?.trim();
      if (n) accs.push({ nombre: n, existente: row.querySelector('.set-comp-existente')?.checked });
    });
    datosSet = {
      subtipo,
      productos_principales: prods,
      accesorios: accs,
      packaging_secundario: document.getElementById('nsPackagingSecundario')?.value?.trim() || '',
      consideraciones: document.getElementById('nsConsideraciones')?.value?.trim() || ''
    };
  }

  if (!marca) return toast('Seleccioná una marca', true);
  if (!nombre) return toast('Completá el nombre del desarrollo', true);

  try {
  // Collect items from item blocks
  const itemBlocks = document.querySelectorAll('.item-block');
  const items = [];
  itemBlocks.forEach(block => {
    const nameEl = block.querySelector('.item-name');
    const tipoEl = block.querySelector('.item-tipo-val');
    const catEl = block.querySelector('.item-cat');
    const n = nameEl?.value?.trim();
    if (!n) return;
    const item = { nombre: n, tipo_producto: tipoEl?.value || 'Otro' };

    // Collect sub-components for botellas
    const cat = catEl?.value;
    if (cat === 'botella_vidrio' || cat === 'botella_plastico') {
      const comps = [];
      if (block.querySelector('.comp-botella')?.checked) comps.push('Botella');
      if (block.querySelector('.comp-bomba')?.checked) comps.push('Bomba');
      if (block.querySelector('.comp-collar')?.checked) comps.push('Collar');
      if (block.querySelector('.comp-tapa')?.checked) comps.push('Tapa');
      item.notas = 'Componentes: ' + comps.join(', ');
      const comparte = block.querySelector('.item-comparte')?.value;
      if (comparte === 'si') {
        const detalle = block.querySelector('.item-comparte-detalle')?.value?.trim();
        if (detalle) item.notas += ' | Comparte con: ' + detalle;
      }
    }
    // Estuche tipo
    if (cat === 'estuche') {
      const estucheTipo = block.querySelector('.item-estuche-tipo')?.value;
      if (estucheTipo) item.notas = 'Tipo: ' + estucheTipo;
      item.tratamiento_especial = 'estuche';
    }
    items.push(item);
  });

  // Collect referencias
  const refEls = document.querySelectorAll('.ref-value');
  const referencias = [];
  refEls.forEach(el => {
    const val = el.value.trim();
    if (val) referencias.push({ tipo: el.dataset.refTipo, valor: val });
  });
  const links = referencias.filter(r => r.tipo !== 'descripcion').map(r => r.valor);
  const descRefs = referencias.filter(r => r.tipo === 'descripcion').map(r => r.valor);
  const fullDesc = [desc, ...descRefs.map(d => 'Ref: ' + d)].filter(Boolean).join('\n');

  // Build extra description parts
  let extraDesc = '';
  if (datosRegulares) extraDesc += `\n--- Análisis Compra Regular ---\nStock Insumo: ${datosRegulares.stockInsumo} | Stock PT: ${datosRegulares.stockPT}\nForecast 3M: ${datosRegulares.fcstM1}/${datosRegulares.fcstM2}/${datosRegulares.fcstM3}\nConsumo x PT: ${datosRegulares.consumoXPT} | Lead time: ${datosRegulares.leadTime} días\nCantidad a comprar: ${datosRegulares.cantidadCompra}`;
  if (codigosInternos.length) extraDesc += `\n--- Códigos internos ---\n${codigosInternos.join(', ')}`;
  if (datosSet) {
    extraDesc += `\n--- ${datosSet.subtipo} ---`;
    if (datosSet.productos_principales.length) extraDesc += `\nProductos principales: ${datosSet.productos_principales.map(p => p.nombre + (p.existente ? ' (existente)' : ' (a desarrollar)')).join(', ')}`;
    if (datosSet.accesorios.length) extraDesc += `\nAccesorios: ${datosSet.accesorios.map(a => a.nombre + (a.existente ? ' (existente)' : ' (a desarrollar)')).join(', ')}`;
    if (datosSet.packaging_secundario) extraDesc += `\nPackaging: ${datosSet.packaging_secundario}`;
    if (datosSet.consideraciones) extraDesc += `\nConsideraciones: ${datosSet.consideraciones}`;
  }
  extraDesc += `\n[Origen: ${origenCompra === 'local' ? 'Compra Local' : 'Exterior (importación)'}]`;

  // Create solicitud - build insert object dynamically
  const insertObj = {
    tipo, marca, nombre, descripcion: fullDesc + extraDesc,
    fecha_sell_in: sellIn, fecha_lanzamiento: lanzamiento,
    costo_objetivo: costo, cotizacion_responsable: cotiz,
    cotizacion_responsable_nombre: cotizNombre,
    links_referencia: links,
    status: 'Pendiente aprobación Compras',
    created_by: currentUser.id
  };
  // Try with notas column first; if it fails (column missing), retry without
  if (codigosInternos.length) insertObj.notas = `[CODIGOS] ${codigosInternos.join(', ')}`;
  let sol, error;
  ({ data: sol, error } = await sb.from('solicitudes').insert(insertObj).select().single());
  if (error && error.message?.includes('notas')) {
    delete insertObj.notas;
    if (codigosInternos.length) insertObj.descripcion += `\n[CODIGOS] ${codigosInternos.join(', ')}`;
    ({ data: sol, error } = await sb.from('solicitudes').insert(insertObj).select().single());
  }
  if (error) return toast('Error: ' + error.message, true);

  // Create items
  if (items.length) {
    await sb.from('solicitud_items').insert(items.map(it => ({ ...it, solicitud_id: sol.id })));
  }

  // Generate retroplan
  const template = RETROPLAN_TEMPLATES[tipo] || RETROPLAN_TEMPLATES['Nuevos desarrollos'];
  const launchDate = new Date(lanzamiento + 'T12:00:00');
  const pasos = template.map((t, i) => {
    const fecha = new Date(launchDate);
    fecha.setDate(fecha.getDate() - t.dias);
    let resp = t.responsable;
    if (resp === '__COTIZ__') resp = cotiz;
    return {
      solicitud_id: sol.id, orden: i + 1, nombre: t.nombre,
      responsable: resp, dias_offset: t.dias,
      fecha_objetivo: fecha.toISOString().split('T')[0]
    };
  });
  await sb.from('retroplan_pasos').insert(pasos);

  // Log history
  await sb.from('historial').insert({
    solicitud_id: sol.id, actor_id: currentUser.id,
    evento: 'Solicitud creada', detalle: `Tipo: ${tipo}, Marca: ${marca}`
  });

  // Send email notification
  await sendEmail(
    ['nmaggi@cdimex.com.ar','nguarino@cdimex.com.ar','mjaimes@cdimex.com.ar'],
    `Nueva solicitud #${sol.numero}: ${nombre}`,
    `<p><strong>${currentProfile.full_name}</strong> creó una nueva solicitud:</p>
     <p><strong>${nombre}</strong> (${marca}) — ${tipo}</p>
     <p>Fecha lanzamiento: ${fmtDate(lanzamiento)}</p>
     <p>Ingresá a la app para revisarla y aprobarla.</p>`
  );

  closeModal('newSolModal');
  await loadSolicitudes();
  switchTab('dashboard');
  toast('Solicitud creada exitosamente');
  } catch (err) {
    console.error('Error creando solicitud:', err);
    toast('Error al crear solicitud: ' + (err.message || err), true);
  }
}
