// Admin: Proveedores habituales
async function addProveedorHabitual(marca) {
  const inputId = `newProv_${marca.replace(/[^a-zA-Z]/g,'_')}`;
  const prov = document.getElementById(inputId)?.value?.trim();
  if (!prov) return;
  await withRetry(async () => {
    const existing = plantillasMarca[marca];
    if (existing) {
      const provs = [...(existing.proveedores_habituales || []), prov];
      const { error } = await sb.from('plantillas_marca').update({ proveedores_habituales: provs }).eq('marca', marca);
      if (error) throw error;
    } else {
      const { error } = await sb.from('plantillas_marca').insert({ marca, proveedores_habituales: [prov] });
      if (error) throw error;
    }
  }, { label: 'Agregar proveedor' });
  await loadPlantillas();
  renderAdmin(document.getElementById('tabContent'));
}

async function removeProveedorHabitual(marca, prov) {
  await withRetry(async () => {
    const existing = plantillasMarca[marca];
    if (!existing) return;
    const provs = (existing.proveedores_habituales || []).filter(p => p !== prov);
    const { error } = await sb.from('plantillas_marca').update({ proveedores_habituales: provs }).eq('marca', marca);
    if (error) throw error;
  }, { label: 'Quitar proveedor' });
  await loadPlantillas();
  renderAdmin(document.getElementById('tabContent'));
}

// Admin: Save Google Sheets config
// Extraer Sheet ID de una URL completa de Google Sheets
function extractSheetId(input) {
  if (!input) return null;
  const match = input.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  if (match) return match[1];
  if (!input.includes('/') && input.length > 10) return input;
  return input.trim();
}

async function saveConfigSheets(btn) {
  const status = document.getElementById('sheetsStatus');
  if (btn) btn.disabled = true;
  if (status) { status.textContent = 'Guardando...'; status.style.color = 'var(--gold)'; }

  try {
    const rawStocks = document.getElementById('cfgSheetIdStocks')?.value?.trim() || '';
    const rawForecast = document.getElementById('cfgSheetIdForecast')?.value?.trim() || '';
    const rawStockSistema = document.getElementById('cfgSheetIdStockSistema')?.value?.trim() || '';
    const rawBom = document.getElementById('cfgSheetIdBom')?.value?.trim() || '';
    const rawProducciones = document.getElementById('cfgSheetIdProducciones')?.value?.trim() || '';
    const sheetIdStocks = extractSheetId(rawStocks);
    const sheetIdForecast = extractSheetId(rawForecast);
    const sheetIdStockSistema = extractSheetId(rawStockSistema);
    const sheetIdBom = extractSheetId(rawBom);
    const sheetIdProducciones = extractSheetId(rawProducciones);
    const sheetNameStocks = document.getElementById('cfgSheetNameStocks')?.value?.trim() || 'Ventas stock cierre cobertura';
    const sheetNameForecast = document.getElementById('cfgSheetNameForecast')?.value?.trim() || 'Resumen Gral.';
    const sheetNameStockSistema = document.getElementById('cfgSheetNameStockSistema')?.value?.trim() || 'Stock Sistema';
    const sheetNameDescripcion = document.getElementById('cfgSheetNameDescripcion')?.value?.trim() || 'Descripcion';
    const sheetNameBom = document.getElementById('cfgSheetNameBom')?.value?.trim() || 'BASE BRUTA';
    const sheetNameProducciones = document.getElementById('cfgSheetNameProducciones')?.value?.trim() || 'UNIFICADO';

    if (!sheetIdStocks && !sheetIdForecast && !sheetIdStockSistema && !sheetIdBom) {
      toast('Ingresá al menos un Sheet ID o URL', true);
      if (status) { status.textContent = '⚠️ Falta Sheet ID'; status.style.color = 'var(--red)'; }
      if (btn) btn.disabled = false;
      return;
    }

    console.log('Saving sheets config:', { sheetIdStocks, sheetIdForecast, sheetIdStockSistema });

    const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout (10s). Ejecutá el SQL de permisos RLS en Supabase.')), 10000));

    const configData = {
      sheet_id_stocks: sheetIdStocks, sheet_name_stocks: sheetNameStocks,
      sheet_id_forecast: sheetIdForecast, sheet_name_forecast: sheetNameForecast,
      sheet_id_stock_sistema: sheetIdStockSistema, sheet_name_stock_sistema: sheetNameStockSistema,
      sheet_name_descripcion: sheetNameDescripcion,
      sheet_id_bom: sheetIdBom, sheet_name_bom: sheetNameBom,
      sheet_id_producciones: sheetIdProducciones, sheet_name_producciones: sheetNameProducciones,
      sync_enabled: true,
    };

    const save = (async () => {
      // Try upsert first
      const { error: upsErr } = await sb.from('config_sheets').upsert({ id: 1, ...configData }, { onConflict: 'id' });
      if (upsErr) {
        console.log('Upsert failed:', upsErr.message, '→ trying update only');
        const { error: updErr } = await sb.from('config_sheets').update(configData).eq('id', 1);
        if (updErr) throw new Error('Update: ' + updErr.message + ' | Upsert: ' + upsErr.message);
      }
    })();

    await Promise.race([save, timeout]);

    if (sheetIdStocks) document.getElementById('cfgSheetIdStocks').value = sheetIdStocks;
    if (sheetIdForecast) document.getElementById('cfgSheetIdForecast').value = sheetIdForecast;
    if (sheetIdStockSistema) document.getElementById('cfgSheetIdStockSistema').value = sheetIdStockSistema;
    if (sheetIdBom) document.getElementById('cfgSheetIdBom').value = sheetIdBom;
    if (sheetIdProducciones) document.getElementById('cfgSheetIdProducciones').value = sheetIdProducciones;

    toast('Configuración de Sheets guardada ✓');
    if (status) { status.textContent = '✅ Guardado'; status.style.color = 'var(--green)'; }
  } catch (e) {
    console.error('saveConfigSheets error:', e);
    toast('Error: ' + e.message, true);
    if (status) { status.textContent = '❌ ' + e.message; status.style.color = 'var(--red)'; }
  }
  if (btn) btn.disabled = false;
}

function loadPlantillaProveedores() {
  const marca = document.getElementById('nsMarca')?.value;
  const hint = document.getElementById('plantillaProvHint');
  if (!marca || marca === '__otra__' || !plantillasMarca[marca]) {
    if (hint) hint.style.display = 'none';
    return;
  }
  const provs = plantillasMarca[marca]?.proveedores_habituales || [];

function calcularAnalisisRegular() {
  const stockInsumo = parseFloat(document.getElementById('nsStockInsumo').value) || 0;
  const stockPT = parseFloat(document.getElementById('nsStockPT').value) || 0;
  const fcstM1 = parseFloat(document.getElementById('nsFcstM1').value) || 0;
  const fcstM2 = parseFloat(document.getElementById('nsFcstM2').value) || 0;
  const fcstM3 = parseFloat(document.getElementById('nsFcstM3').value) || 0;
  const consumoXPT = parseFloat(document.getElementById('nsConsumoXPT').value) || 1;
  const leadTime = parseInt(document.getElementById('nsLeadTime').value) || 150;

  const fcstTotal3m = fcstM1 + fcstM2 + fcstM3;
  const fcstMensualProm = fcstTotal3m / 3;

  if (!fcstMensualProm) return toast('Completá el forecast de al menos un mes', true);

  // ---- Demanda diaria de PT ----
  const demandaDiariaPT = fcstMensualProm / 30;

  // ---- Cobertura total ----
  // El stock de insumo se va a convertir en PT (insumo / consumoXPT = PT producibles)
  const ptProduciblesConInsumo = stockInsumo / consumoXPT;
  const stockTotalEnPT = stockPT + ptProduciblesConInsumo;
  const coberturaTotal = Math.round(stockTotalEnPT / demandaDiariaPT);

  // Cobertura solo de PT actual (sin considerar insumo)
  const coberturaPT = Math.round(stockPT / demandaDiariaPT);
  // Cobertura solo del insumo (en días de demanda de PT)
  const coberturaInsumo = Math.round(ptProduciblesConInsumo / demandaDiariaPT);

  // ---- Fecha límite para emitir la OC ----
  // El insumo nuevo tarda "leadTime" días en llegar.
  // Queremos que llegue antes de que la cobertura total baje de 90 días.
  // Entonces la OC se debe emitir cuando falten (cobertura - 90) días... menos el lead time.
  // diasHastaStock90 = días hasta que la cobertura total llegue a 90 días
  const diasHastaStock90 = Math.max(0, coberturaTotal - 90);
  // La OC tiene que salir "leadTime" días antes de que necesitemos el insumo
  const diasParaEmitirOC = diasHastaStock90 - leadTime;

  const hoy = new Date();
  const fechaOC = new Date(hoy);
  fechaOC.setDate(fechaOC.getDate() + Math.max(0, diasParaEmitirOC));

  // Fecha estimada de llegada
  const fechaLlegada = new Date(fechaOC);
  fechaLlegada.setDate(fechaLlegada.getDate() + leadTime);

  // ---- Cantidad a comprar ----
  // Queremos tener 90 días de insumo DESPUÉS de que llegue la compra.
  // Al momento de llegada, el stock de insumo habrá bajado.
  // Consumo diario de insumo = demandaDiariaPT * consumoXPT
  const consumoDiarioInsumo = demandaDiariaPT * consumoXPT;
  // Días hasta llegada desde hoy
  const diasHastaLlegada = Math.max(0, Math.round((fechaLlegada - hoy) / (1000*60*60*24)));
  // Insumo restante al momento de llegada (puede ser negativo = quiebre)
  const insumoAlLlegar = stockInsumo - (consumoDiarioInsumo * diasHastaLlegada);
  // Necesitamos: 90 días de insumo post-llegada
  const insumoTarget = consumoDiarioInsumo * 90;
  const cantidadCompra = Math.max(0, Math.ceil(insumoTarget - Math.max(0, insumoAlLlegar)));

  // ---- Alerta de urgencia ----
  const esUrgente = diasParaEmitirOC < 0;
  const diasAtraso = Math.abs(Math.min(0, diasParaEmitirOC));
  const hayQuiebre = insumoAlLlegar < 0;
  const diasQuiebre = hayQuiebre ? Math.ceil(Math.abs(insumoAlLlegar) / consumoDiarioInsumo) : 0;

  // Guardar resultados
  document.getElementById('nsFechaNecesidadCalc').value = fechaOC.toISOString().split('T')[0];
  document.getElementById('nsCantidadCompra').value = cantidadCompra;

  // Mostrar resultados
  const res = document.getElementById('resultadoAnalisis');
  res.classList.remove('hidden');
  res.innerHTML = `
    ${esUrgente ? `<div style="background:var(--red);color:#fff;padding:10px 14px;border-radius:6px;margin-bottom:12px;font-size:13px;font-weight:600;">
      ⚠️ OC URGENTE — La orden de compra debería haberse emitido hace ${diasAtraso} días para mantener 90 días de cobertura.
      ${hayQuiebre ? `<br>⛔ QUIEBRE DE STOCK: habrá ${diasQuiebre} días sin insumo antes de que llegue la compra.` : ''}
    </div>` : ''}
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
      <div style="text-align:center;padding:10px;background:var(--bg3);border-radius:8px;">
        <div style="font-size:11px;color:var(--txt2);text-transform:uppercase;">Cobertura PT</div>
        <div style="font-size:22px;font-weight:800;color:${coberturaPT < 30 ? 'var(--red)' : coberturaPT < 60 ? 'var(--orange)' : 'var(--green)'};">${coberturaPT}d</div>
        <div style="font-size:11px;color:var(--txt2);">${stockPT.toLocaleString('es-AR')} un.</div>
      </div>
      <div style="text-align:center;padding:10px;background:var(--bg3);border-radius:8px;">
        <div style="font-size:11px;color:var(--txt2);text-transform:uppercase;">Cobertura Insumo</div>
        <div style="font-size:22px;font-weight:800;color:${coberturaInsumo < 45 ? 'var(--red)' : coberturaInsumo < 90 ? 'var(--orange)' : 'var(--green)'};">${coberturaInsumo}d</div>
        <div style="font-size:11px;color:var(--txt2);">${stockInsumo.toLocaleString('es-AR')} un. (= ${Math.round(ptProduciblesConInsumo).toLocaleString('es-AR')} PT)</div>
      </div>
      <div style="text-align:center;padding:10px;background:var(--bg3);border-radius:8px;">
        <div style="font-size:11px;color:var(--txt2);text-transform:uppercase;">Cobertura Total</div>
        <div style="font-size:22px;font-weight:800;color:${coberturaTotal < 90 ? 'var(--red)' : coberturaTotal < 150 ? 'var(--orange)' : 'var(--green)'};">${coberturaTotal}d</div>
        <div style="font-size:11px;color:var(--txt2);">PT + Insumo convertido</div>
      </div>
    </div>
    <div style="margin-top:10px;font-size:12px;color:var(--txt2);line-height:1.6;">
      Forecast promedio mensual: <strong style="color:var(--txt)">${Math.round(fcstMensualProm).toLocaleString('es-AR')}</strong> un/mes
      · Demanda diaria: <strong style="color:var(--txt)">${Math.round(demandaDiariaPT)}</strong> PT/día
      · Consumo diario insumo: <strong style="color:var(--txt)">${Math.round(consumoDiarioInsumo)}</strong> un/día
      · Lead time: <strong style="color:var(--txt)">${leadTime}</strong> días
    </div>
    <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div style="text-align:center;">
        <div style="font-size:11px;color:var(--txt2);text-transform:uppercase;">Cantidad a comprar</div>
        <div style="font-size:28px;font-weight:800;color:var(--gold);">${cantidadCompra.toLocaleString('es-AR')}</div>
        <div style="font-size:12px;color:var(--txt2);">unidades de insumo</div>
      </div>
      <div style="text-align:center;">
        <div style="font-size:11px;color:var(--txt2);text-transform:uppercase;">Fecha recomendada de OC</div>
        <div style="font-size:28px;font-weight:800;color:${esUrgente ? 'var(--red)' : 'var(--gold)'};">${fechaOC.toLocaleDateString('es-AR')}</div>
        <div style="font-size:12px;color:var(--txt2);">Llegada estimada: ${fechaLlegada.toLocaleDateString('es-AR')}</div>
      </div>
    </div>`;

  toast('Análisis calculado correctamente');
}

  } else if (tipo === 'Compras regulares') {

    };
  }

  if (!marca) return toast('Seleccioná una marca', true);
  if (!nombre) return toast('Completá el nombre del desarrollo', true);

  if (datosSet) {
    extraDesc += `\n--- ${datosSet.subtipo} ---`;
    if (datosSet.productos_principales.length) extraDesc += `\nProductos principales: ${datosSet.productos_principales.map(p => p.nombre + (p.existente ? ' (existente)' : ' (a desarrollar)')).join(', ')}`;
    if (datosSet.accesorios.length) extraDesc += `\nAccesorios: ${datosSet.accesorios.map(a => a.nombre + (a.existente ? ' (existente)' : ' (a desarrollar)')).join(', ')}`;
    if (datosSet.packaging_secundario) extraDesc += `\nPackaging: ${datosSet.packaging_secundario}`;
    if (datosSet.consideraciones) extraDesc += `\nConsideraciones: ${datosSet.consideraciones}`;
  }
  extraDesc += `\n[Origen: ${origenCompra === 'local' ? 'Compra Local' : 'Exterior (importación)'}]`;

  // Create solicitud
  const { data: sol, error } = await sb.from('solicitudes').insert({
    tipo, marca, nombre, descripcion: fullDesc + extraDesc,
    fecha_sell_in: sellIn, fecha_lanzamiento: lanzamiento,
    costo_objetivo: costo, cotizacion_responsable: cotiz,
    cotizacion_responsable_nombre: cotizNombre,
    links_referencia: links,
    notas: codigosInternos.length ? `[CODIGOS] ${codigosInternos.join(', ')}` : null,
    status: 'Pendiente aprobación Compras',
    created_by: currentUser.id
  }).select().single();

  if (error) return toast('Error: ' + error.message, true);

  // Create items
  if (items.length) {
    await sb.from('solicitud_items').insert(items.map(it => ({ ...it, solicitud_id: sol.id })));
  }

  // Generate retroplan
  const template = RETROPLAN_TEMPLATES[tipo] || RETROPLAN_TEMPLATES['Nuevos desarrollos'];
  const launchDate = new Date(lanzamiento + 'T12:00:00');
  const pasos = template.map((t, i) => {
    const fecha = new Date(launchDate);
    fecha.setDate(fecha.getDate() - t.dias);
    let resp = t.responsable;
    if (resp === '__COTIZ__') resp = cotiz;
    return {
      solicitud_id: sol.id, orden: i + 1, nombre: t.nombre,
      responsable: resp, dias_offset: t.dias,
      fecha_objetivo: fecha.toISOString().split('T')[0]
    };
  });
  await sb.from('retroplan_pasos').insert(pasos);

  // Log history
  await sb.from('historial').insert({
    solicitud_id: sol.id, actor_id: currentUser.id,
    evento: 'Solicitud creada', detalle: `Tipo: ${tipo}, Marca: ${marca}`
  });

  // Send email notification
  await sendEmail(
    ['nmaggi@cdimex.com.ar','nguarino@cdimex.com.ar','mjaimes@cdimex.com.ar'],
    `Nueva solicitud #${sol.numero}: ${nombre}`,
    `<p><strong>${currentProfile.full_name}</strong> creó una nueva solicitud:</p>
     <p><strong>${nombre}</strong> (${marca}) — ${tipo}</p>
     <p>Fecha lanzamiento: ${fmtDate(lanzamiento)}</p>
     <p>Ingresá a la app para revisarla y aprobarla.</p>`
  );

  closeModal('newSolModal');
  await loadSolicitudes();
  switchTab('dashboard');
  toast('Solicitud creada exitosamente');
  } catch (err) {
    console.error('Error creando solicitud:', err);
    toast('Error al crear solicitud: ' + (err.message || err), true);
  }
}

      }

      html += `<p style="color:var(--txt2);font-size:13px;">Cada área aprueba o desaprueba su inspección en la sección de abajo. Si alguna se desaprueba, se indica el motivo y plazo para resolver, y queda disponible para volver a aprobar.</p>`;

          <label style="font-size:12px;">Fecha estimada de arribo (ETA)</label>
          <input type="date" id="etaInput" style="max-width:200px;">
        </div>`;
        html += `<button class="btn-blue" onclick="markShipped('${sid}')">Confirmar embarque → En tránsito</button>`;
      }
      break;
    case 'En tránsito':
      if (isComex() || canApprove()) {
        html += `<button class="btn-blue" onclick="markNacionalizacion('${sid}')">Arribo → Nacionalización</button>`;
      }
      break;
    case 'Nacionalización':
      if (isComex() || isCompras() || canApprove()) {
        html += `<button class="btn-green" onclick="markCompleted('${sid}')">Nacionalizado → Completado</button>`;
      }
      break;
  }

  bar.innerHTML = html || '<span style="color:var(--txt2);font-size:13px;">Sin acciones disponibles para tu rol en este estado.</span>';
}

// =============================================
// RETROPLAN VISUAL
// =============================================
function renderRetroplan(pasos) {
  const el = document.getElementById('retroplanTimeline');
  if (!pasos.length) { el.innerHTML = '<p style="color:var(--txt2)">Sin retroplan definido</p>'; return; }

  el.innerHTML = pasos.map(p => {
    const days = daysUntil(p.fecha_objetivo);
    let cls = '';
    if (p.completado) cls = 'completed';
    else if (days !== null && days < 0) cls = 'overdue';
    else if (days !== null && days <= 10) cls = 'active';

    return `<div class="retro-step ${cls}">
      <div class="dot"></div>
      <div class="step-name">${p.completado ? '✓ ' : ''}${p.nombre}</div>
      <div class="step-date">${fmtDate(p.fecha_objetivo)}${p.completado ? ' — Completado ' + fmtDate(p.fecha_completado) : (days !== null && days < 0 ? ` — <span style="color:var(--red)">Vencido hace ${Math.abs(days)}d</span>` : (days !== null ? ` — ${days}d restantes` : ''))}</div>
      <div class="step-responsible">${p.responsable || ''}</div>
      ${!p.completado && (isCompras() || canApprove()) ? `<button class="btn-outline btn-sm" onclick="completePaso('${p.id}')" style="margin-top:4px;">Marcar completado</button>` : ''}
    </div>`;
  }).join('');
}

      ${showAestheticApproval ? '<th>Acciones</th>' : ''}

    </tr>
    ${items.map(it => `<tr>
      <td>${it.nombre}</td>
      <td>${it.tipo_producto || '-'}</td>
      <td style="font-size:12px;color:var(--txt2);max-width:180px;">${it.notas || (it.tratamiento_especial ? `<span style="color:var(--orange)">${it.tratamiento_especial}</span>` : '-')}</td>
      <td>${pill_item(it.status_estetico)}</td>

function pill_item(status) {
  const cls = status === 'aprobado' ? 'pill-approved' : (status === 'rechazado' || status === 'desaprobado') ? 'pill-rejected' : 'pill-pending';
  return `<span class="pill ${cls}">${status}</span>`;
}

function renderInspecciones(inspecciones, s) {
  const el = document.getElementById('inspeccionesSection');
  const tipos = [
    { key: 'calidad_funcional', label: 'Calidad - Funcionalidad', canApproveRole: () => isCalidad() || canApprove() },
    { key: 'estetica_marcas', label: 'Marcas - Estética', canApproveRole: () => (isMarcas() && canActOnBrand(s.marca)) || canApprove() },
    { key: 'comex_packing', label: 'Comex - Packing List & Shipping Marks', canApproveRole: () => isComex() || canApprove() }
  ];

  const showInsp = s.status === 'Inspección pre-embarque';

  el.innerHTML = tipos.map(t => {
    const insp = inspecciones.find(i => i.tipo === t.key);
    const resultado = insp?.resultado || 'pendiente';
    const notas = insp?.notas || '';

    // Parse rejection details if desaprobado
    let rechazoInfo = '';
    if (resultado === 'desaprobado' && notas) {
      const plazoMatch = notas.match(/\[PLAZO: (.+?)\]/);
      const motivo = notas.replace(/\[PLAZO: .+?\]\s*/, '');
      rechazoInfo = `<div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:6px;padding:8px 10px;margin-top:6px;font-size:12px;">
        <div style="color:var(--red);font-weight:600;">Motivo: ${motivo}</div>
        ${plazoMatch ? `<div style="color:var(--orange);margin-top:4px;">Plazo para resolver: <strong>${plazoMatch[1]}</strong></div>` : ''}
      </div>`;
    }

    return `<div style="padding:10px 0;border-bottom:1px solid var(--border);">
      <div style="display:flex;align-items:center;gap:12px;">
        <div style="flex:1;font-size:14px;">${t.label}</div>
        <div>${pill_item(resultado)}</div>
        ${showInsp && (resultado === 'pendiente' || resultado === 'desaprobado') && t.canApproveRole() ? `
          <button class="btn-green btn-sm" onclick="approveInspeccion('${s.id}','${t.key}')">Aprobar</button>
          ${resultado !== 'desaprobado' ? `<button class="btn-red btn-sm" onclick="openDesaprobarInspeccionModal('${s.id}','${t.key}','${t.label}')">Desaprobar</button>` : `<button class="btn-red btn-sm" onclick="openDesaprobarInspeccionModal('${s.id}','${t.key}','${t.label}')">Re-desaprobar</button>`}
        ` : ''}
      </div>
      ${rechazoInfo}
    </div>`;
  }).join('');
}

function renderHistory(history) {
  const el = document.getElementById('historySection');
  el.innerHTML = history.map(h => {
    let detalleHtml = '';
    if (h.detalle) {
      // Check if detalle contains diff JSON
      if (h.detalle.startsWith('{') && h.detalle.includes('"cambios"')) {
        try {
          const diff = JSON.parse(h.detalle);
          detalleHtml = '<div style="margin-top:4px;">' + (diff.cambios || []).map(c =>
            `<div style="font-size:12px;"><span style="color:var(--txt2);">${c.campo}:</span> <span class="diff-removed">${c.antes || '(vacío)'}</span> → <span class="diff-added">${c.despues || '(vacío)'}</span></div>`
          ).join('') + (diff.nota ? `<div style="font-size:12px;color:var(--txt2);margin-top:2px;">${diff.nota}</div>` : '') + '</div>';
        } catch (e) {
          detalleHtml = `<br><span style="color:var(--txt2);font-size:12px;">${h.detalle}</span>`;
        }
      } else {
        detalleHtml = `<br><span style="color:var(--txt2);font-size:12px;">${h.detalle}</span>`;
      }
    }
    return `<div class="history-entry">
      <span class="time">${fmtDate(h.created_at?.split('T')[0])}</span>
      <strong>${h.profiles?.full_name || 'Sistema'}</strong>: ${h.evento}
      ${detalleHtml}
    </div>`;
  }).join('') || '<p style="color:var(--txt2)">Sin historial</p>';
}

async function updateStatus(id, newStatus, evento, detalle, emailTo, emailSubject, emailBody) {
  const s = solicitudes.find(x => x.id === id);
  const oldStatus = s?.status;
  const diffJson = JSON.stringify({
    cambios: [{ campo: 'Estado', antes: oldStatus, despues: newStatus }],
    nota: detalle || ''
  });
  const { error } = await sb.from('solicitudes').update({ status: newStatus }).eq('id', id);
  if (error) { toast('Error al cambiar estado: ' + error.message, true); return; }
  await sb.from('historial').insert({ solicitud_id: id, actor_id: currentUser.id, evento, detalle: diffJson });
  if (emailTo && emailSubject) {
    sendEmail(emailTo, emailSubject, emailBody || `<p>${evento}</p>`).catch(e => console.warn('Email error:', e));
  }
  await loadSolicitudes();
  toast(evento);
  await openSolicitud(id);
}

async function submitRechazoMuestra(solId) {
  const motivo = document.getElementById('rechazoMotivo').value.trim();
  if (!motivo) return toast('Escribí el motivo del rechazo', true);

  const fotos = [];
  document.querySelectorAll('.rechazo-foto-url').forEach(el => { if (el.value) fotos.push(el.value); });

  try {
    // Update all items as rejected
    const { data: items } = await sb.from('solicitud_items').select('id, status_estetico').eq('solicitud_id', solId);
    const pendientes = items?.filter(i => i.status_estetico !== 'aprobado') || [];
    for (const it of pendientes) {
      await sb.from('solicitud_items').update({ status_estetico: 'rechazado', notas: motivo }).eq('id', it.id);
    }

    const detalleRechazo = motivo + (fotos.length ? '\n\nFotos: ' + fotos.join(', ') : '');

    await sb.from('historial').insert({
      solicitud_id: solId, actor_id: currentUser.id,
      evento: 'Muestras rechazadas estéticamente — Vuelve a Compras',
      detalle: detalleRechazo
    });

    // Save fotos in notas
    if (fotos.length) {
      const s = solicitudes.find(x => x.id === solId);
      const notasAct = s?.notas || '';
      await sb.from('solicitudes').update({ notas: notasAct + `\n[RECHAZO FOTOS] ${fotos.join(' | ')}` }).eq('id', solId);
    }

    const s = solicitudes.find(x => x.id === solId);
    closeModal('rechazoModal');

    // Goes BACK to Pedido de muestras (Compras has to re-work with proveedor)
    await updateStatus(solId, 'Pedido de muestras', 'Muestras rechazadas - Vuelve a Compras', motivo,
      ['nmaggi@cdimex.com.ar','mjaimes@cdimex.com.ar','nguarino@cdimex.com.ar'].filter(Boolean),
      `Solicitud #${s?.numero}: Muestras rechazadas`,
      `<p>Las muestras de <strong>${s?.nombre}</strong> fueron rechazadas estéticamente.</p><p><strong>Motivo:</strong> ${motivo}</p>${fotos.length ? '<p>Se adjuntaron ' + fotos.length + ' foto(s) de referencia.</p>' : ''}<p>La solicitud vuelve a Compras para gestionar con el proveedor.</p>`);
  } catch (err) {
    console.error(err);
    toast('Error: ' + err.message, true);
  }
}

// =============================================
// REGENERAR RETROPLAN
// =============================================
async function regenerarRetroplan(solId, tipo, fechaLanzamiento) {
  if (!confirm('¿Regenerar el retroplan con el template actualizado?\n\nEsto eliminará todos los pasos actuales y creará los nuevos. Los pasos ya completados se perderán.')) return;

  // Get cotización responsable for __COTIZ__ placeholder
  const { data: sol } = await sb.from('solicitudes').select('cotizacion_responsable').eq('id', solId).single();
  const cotiz = sol?.cotizacion_responsable || 'compras';

  // Delete existing pasos
  await sb.from('retroplan_pasos').delete().eq('solicitud_id', solId);

  // Generate new pasos from current template
  const template = RETROPLAN_TEMPLATES[tipo] || RETROPLAN_TEMPLATES['Nuevos desarrollos'];
  const launchDate = new Date(fechaLanzamiento + 'T12:00:00');
  const pasos = template.map((t, i) => {
    const fecha = new Date(launchDate);
    fecha.setDate(fecha.getDate() - t.dias);
    let resp = t.responsable;
    if (resp === '__COTIZ__') resp = cotiz;
    return {
      solicitud_id: solId, orden: i + 1, nombre: t.nombre,
      responsable: resp, dias_offset: t.dias,
      fecha_objetivo: fecha.toISOString().split('T')[0]
    };
  });

  await sb.from('retroplan_pasos').insert(pasos);

  // Log
  await sb.from('historial').insert({
    solicitud_id: solId, actor_id: currentUser.id,
    evento: 'Retroplan regenerado', detalle: `Template: ${tipo}, ${template.length} pasos`
  });

  toast('Retroplan regenerado exitosamente');
  await openSolicitud(solId);
}

// =============================================
// CHANGE LAUNCH DATE
// =============================================
async function changeLaunchDate(id, currentDate) {
  const newDate = prompt('Nueva fecha de lanzamiento (YYYY-MM-DD):', currentDate);
  if (!newDate || newDate === currentDate) return;

  // Update solicitud
  await sb.from('solicitudes').update({ fecha_lanzamiento: newDate }).eq('id', id);

  // Recalculate all retroplan dates
  const { data: pasos } = await sb.from('retroplan_pasos').select('*').eq('solicitud_id', id).order('orden');
  const launchDate = new Date(newDate + 'T12:00:00');
  for (const p of pasos) {
    const fecha = new Date(launchDate);
    fecha.setDate(fecha.getDate() - p.dias_offset);
    await sb.from('retroplan_pasos').update({ fecha_objetivo: fecha.toISOString().split('T')[0] }).eq('id', p.id);
  }

  // Log and notify
  await sb.from('historial').insert({
    solicitud_id: id, actor_id: currentUser.id,
    evento: 'Fecha de lanzamiento modificada',
    detalle: `De ${currentDate} a ${newDate}. Todo el retroplan fue recalculado.`
  });

  const s = solicitudes.find(x => x.id === id);
  // Notify all involved
  const { data: allProfiles } = await sb.from('profiles').select('email');
  const emails = allProfiles?.map(p => p.email) || [];
  await sendEmail(emails,
    `CAMBIO DE FECHA: Solicitud #${s.numero} — ${s.nombre}`,
    `<p><strong>${currentProfile.full_name}</strong> cambió la fecha de lanzamiento de <strong>${s.nombre}</strong>.</p>
     <p>Fecha anterior: ${fmtDate(currentDate)}</p>
     <p>Nueva fecha: ${fmtDate(newDate)}</p>
     <p><strong>Todo el retroplan fue recalculado.</strong> Revisá las nuevas fechas en la app.</p>`
  );

  toast('Fecha de lanzamiento actualizada y retroplan recalculado');
  await loadSolicitudes();
  await openSolicitud(id);
}

async function addComment(solId) {
  const texto = document.getElementById('newComment').value.trim();
  if (!texto) return;
  const { error } = await sb.from('comentarios').insert({ solicitud_id: solId, autor_id: currentUser.id, texto });
  if (error) { toast('Error al comentar: ' + error.message, true); return; }
  sb.from('historial').insert({ solicitud_id: solId, actor_id: currentUser.id, evento: 'Comentario agregado' }).then(() => {});
  document.getElementById('newComment').value = '';
  toast('Comentario agregado');
  await openSolicitud(solId);

  // @mention emails in background (non-blocking)
  const mentions = texto.match(/@(\w+(?:\s\w+)?)/g);
  if (mentions) {
    const s = solicitudes.find(x => x.id === solId);
    for (const mention of mentions) {
      const name = mention.replace('@', '').toLowerCase();
      const mentioned = allProfiles.find(p =>
        p.full_name?.toLowerCase().includes(name) ||
        p.email?.split('@')[0].toLowerCase().includes(name)
      );
      if (mentioned?.email) {
        sendEmail(
          [mentioned.email],
          `Te mencionaron en Solicitud #${s?.numero || ''}`,
          `<p><strong>${currentProfile.full_name}</strong> te mencionó en un comentario:</p><blockquote style="border-left:3px solid #f0c040;padding:8px 12px;margin:12px 0;color:#666;">${texto}</blockquote>`
        ).catch(e => console.warn('Mention email error:', e));
      }
    }
  }
}

// @mention autocomplete
function handleMentionInput(textarea) {
  const val = textarea.value;
  const cursorPos = textarea.selectionStart;
  const textUpToCursor = val.substring(0, cursorPos);
  const mentionMatch = textUpToCursor.match(/@(\w*)$/);
  const dropdown = document.getElementById('mentionDropdown');

  if (!mentionMatch) { dropdown.style.display = 'none'; return; }

  const query = mentionMatch[1].toLowerCase();
  const matches = allProfiles.filter(p =>
    p.full_name?.toLowerCase().includes(query) ||
    p.email?.split('@')[0].toLowerCase().includes(query)
  ).slice(0, 6);

  if (matches.length === 0) { dropdown.style.display = 'none'; return; }

  dropdown.style.display = 'block';
  dropdown.innerHTML = matches.map(p =>
    `<div class="mention-item" onclick="insertMention('${p.full_name}')">
      ${p.full_name}<span class="mention-role">${p.role}</span>
    </div>`
  ).join('');
}

function insertMention(name) {
  const textarea = document.getElementById('newComment');
  const val = textarea.value;
  const cursorPos = textarea.selectionStart;
  const textBefore = val.substring(0, cursorPos);
  const textAfter = val.substring(cursorPos);
  const newBefore = textBefore.replace(/@(\w*)$/, `@${name} `);
  textarea.value = newBefore + textAfter;
  textarea.focus();
  textarea.selectionStart = textarea.selectionEnd = newBefore.length;
  document.getElementById('mentionDropdown').style.display = 'none';
}

// =============================================
// EMAIL
// =============================================
async function sendEmail(to, subject, html) {
  try {
    const resp = await fetch('/api/send-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': 'cdimex-internal-2024' },
      body: JSON.stringify({ to: Array.isArray(to) ? to : [to], subject: `[CDimex] ${subject}`, html: wrapEmail(html) })
    });
    if (!resp.ok) console.warn('Email send failed:', await resp.text());
  } catch (e) {
    console.warn('Email send error:', e);
    // Fallback: open mailto
    const emails = Array.isArray(to) ? to.join(',') : to;
    window.open(`mailto:${emails}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(subject)}`);
  }
}

function wrapEmail(body) {
  return `<div style="font-family:Arial,sans-serif;max-width:600px;margin:0 auto;">
    <div style="background:#1a1a2e;color:#f0c040;padding:16px 20px;border-radius:8px 8px 0 0;">
      <h2 style="margin:0;font-size:18px;">CDimex — Marcas & Compras</h2>
    </div>
    <div style="padding:20px;background:#f9f9f9;border-radius:0 0 8px 8px;">${body}</div>
    <div style="padding:8px 20px;text-align:center;"><small style="color:#999;">Sistema de gestión CDimex</small></div>
  </div>`;
}

// =============================================
// SEMÁFORO → GOOGLE SHEETS SYNC
// =============================================
async function syncSemaforoToSheets(semaforo) {
  const rows = [];
  const today = new Date().toISOString().split('T')[0];

  [...semaforo.amarillo, ...semaforo.rojo].forEach(x => {
    rows.push([
      today,
      x.sol.numero || '',
      x.sol.nombre || '',
      x.sol.marca || '',
      x.sol.tipo || '',
      x.sol.status || '',
      x.paso || '',
      x.responsable || '',
      x.dias ?? '',
      x.dias !== null && x.dias <= 0 ? 'ROJO' : 'AMARILLO'
    ]);
  });

  if (!rows.length) return;

  try {
    await fetch('/api/semaforo-sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': 'cdimex-internal-2024' },
      body: JSON.stringify({ rows })
    });
  } catch (e) { console.warn('Semáforo sync error:', e); }
}
