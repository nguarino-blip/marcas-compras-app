<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CDimex — Marcas & Compras</title>
<style>
:root{
  --bg:#0f0f1a;--bg2:#1a1a2e;--bg3:#252540;--card:#1e1e35;
  --gold:#f0c040;--violet:#a855f7;--green:#22c55e;--red:#ef4444;--orange:#f97316;--blue:#3b82f6;
  --txt:#e2e2e2;--txt2:#999;--border:#333355;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;}
a{color:var(--gold);text-decoration:none;}
button{cursor:pointer;border:none;border-radius:6px;padding:8px 16px;font-size:14px;font-weight:600;transition:all .2s;}
input,select,textarea{background:var(--bg3);color:var(--txt);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:14px;width:100%;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);}
.btn-gold{background:var(--gold);color:#000;} .btn-gold:hover{background:#daa520;}
.btn-green{background:var(--green);color:#fff;} .btn-green:hover{opacity:.85;}
.btn-red{background:var(--red);color:#fff;} .btn-red:hover{opacity:.85;}
.btn-violet{background:var(--violet);color:#fff;} .btn-violet:hover{opacity:.85;}
.btn-blue{background:var(--blue);color:#fff;} .btn-blue:hover{opacity:.85;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--txt);} .btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.btn-sm{padding:5px 10px;font-size:12px;}

/* Layout */
.app-bar{background:var(--bg2);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.app-bar h1{font-size:18px;color:var(--gold);}
.app-bar .user-info{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--txt2);}
.app-bar .user-info .role-badge{background:var(--violet);color:#fff;padding:2px 8px;border-radius:12px;font-size:11px;text-transform:uppercase;}
.container{max-width:1200px;margin:0 auto;padding:20px;}
.grid{display:grid;gap:16px;}
.grid-2{grid-template-columns:repeat(auto-fit,minmax(300px,1fr));}
.grid-3{grid-template-columns:repeat(auto-fit,minmax(250px,1fr));}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:border-color .2s;}
.card:hover{border-color:var(--gold);}
.card h3{color:var(--gold);margin-bottom:8px;font-size:16px;}
.card .meta{color:var(--txt2);font-size:12px;margin-bottom:4px;}

/* Status pills */
.pill{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;text-transform:uppercase;}
.pill-pending{background:#f0c04022;color:var(--gold);}
.pill-active{background:#3b82f622;color:var(--blue);}
.pill-marcas{background:#a855f722;color:var(--violet);}
.pill-calidad{background:#f9731622;color:var(--orange);}
.pill-approved{background:#22c55e22;color:var(--green);}
.pill-rejected{background:#ef444422;color:var(--red);}
.pill-comex{background:#06b6d422;color:#06b6d4;}

/* Auth screen */
.auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.auth-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:40px;width:100%;max-width:420px;}
.auth-box h2{color:var(--gold);text-align:center;margin-bottom:8px;}
.auth-box p{color:var(--txt2);text-align:center;margin-bottom:24px;font-size:14px;}
.auth-box .field{margin-bottom:16px;}
.auth-box label{display:block;font-size:13px;color:var(--txt2);margin-bottom:4px;}
.auth-box .error{color:var(--red);font-size:13px;margin-top:8px;display:none;}
.auth-box .switch{text-align:center;margin-top:16px;font-size:13px;color:var(--txt2);}

/* Dashboard KPI */
.kpi-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;flex:1;min-width:140px;text-align:center;}
.kpi .num{font-size:28px;font-weight:800;color:var(--gold);}
.kpi .label{font-size:12px;color:var(--txt2);margin-top:2px;}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:0;}
.tab{padding:8px 16px;font-size:14px;color:var(--txt2);border-bottom:2px solid transparent;cursor:pointer;transition:all .2s;}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.tab:hover{color:var(--txt);}

/* Retroplan visual */
.retroplan-timeline{position:relative;padding-left:30px;}
.retro-step{position:relative;padding:12px 16px;margin-bottom:8px;border-left:3px solid var(--border);transition:all .3s;}
.retro-step.completed{border-left-color:var(--green);background:rgba(34,197,94,.05);}
.retro-step.active{border-left-color:var(--gold);background:rgba(240,192,64,.05);}
.retro-step.overdue{border-left-color:var(--red);background:rgba(239,68,68,.05);}
.retro-step .dot{position:absolute;left:-9px;top:16px;width:14px;height:14px;border-radius:50%;border:2px solid var(--border);background:var(--bg);}
.retro-step.completed .dot{border-color:var(--green);background:var(--green);}
.retro-step.active .dot{border-color:var(--gold);background:var(--gold);}
.retro-step.overdue .dot{border-color:var(--red);background:var(--red);}
.retro-step .step-name{font-weight:600;font-size:14px;}
.retro-step .step-date{font-size:12px;color:var(--txt2);margin-top:2px;}
.retro-step .step-responsible{font-size:11px;color:var(--violet);margin-top:2px;}

/* Detail sections */
.section{margin-bottom:24px;}
.section h3{color:var(--gold);font-size:15px;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.action-bar{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0;}

/* Type buttons grid */
.tipo-btns{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:20px;}
.tipo-btn{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:18px 16px;cursor:pointer;transition:all .25s;text-align:left;}
.tipo-btn:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 4px 16px rgba(240,192,64,.12);}
.tipo-btn .tipo-icon{font-size:24px;margin-bottom:6px;}
.tipo-btn .tipo-title{font-size:14px;font-weight:700;color:var(--gold);margin-bottom:2px;}
.tipo-btn .tipo-desc{font-size:12px;color:var(--txt2);line-height:1.4;}

/* KPI clickable */
.kpi.clickable{cursor:pointer;transition:all .2s;} .kpi.clickable:hover{border-color:var(--gold);transform:translateY(-2px);}

/* Semáforo */
.semaforo-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:24px;}
.semaforo-col{border-radius:var(--radius);padding:14px;min-height:80px;}
.semaforo-col.verde{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.25);}
.semaforo-col.amarillo{background:rgba(249,115,22,.08);border:1px solid rgba(249,115,22,.25);}
.semaforo-col.rojo{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);}
.semaforo-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.semaforo-dot{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
.semaforo-col.verde .semaforo-dot{background:var(--green);}
.semaforo-col.amarillo .semaforo-dot{background:var(--orange);}
.semaforo-col.rojo .semaforo-dot{background:var(--red);}
.semaforo-title{font-size:13px;font-weight:700;}
.semaforo-col.verde .semaforo-title{color:var(--green);}
.semaforo-col.amarillo .semaforo-title{color:var(--orange);}
.semaforo-col.rojo .semaforo-title{color:var(--red);}
.semaforo-count{font-size:22px;font-weight:800;margin-left:auto;}
.semaforo-col.verde .semaforo-count{color:var(--green);}
.semaforo-col.amarillo .semaforo-count{color:var(--orange);}
.semaforo-col.rojo .semaforo-count{color:var(--red);}
.semaforo-item{font-size:12px;padding:6px 8px;margin-bottom:4px;border-radius:6px;background:rgba(255,255,255,.03);cursor:pointer;transition:background .2s;}
.semaforo-item:hover{background:rgba(255,255,255,.08);}
.semaforo-item .sol-name{font-weight:600;color:var(--txt);}
.semaforo-item .sol-paso{color:var(--txt2);margin-top:2px;}

/* Items table */
.items-table{width:100%;border-collapse:collapse;}
.items-table th{background:var(--bg3);color:var(--txt2);padding:8px;font-size:12px;text-align:left;}
.items-table td{padding:8px;border-bottom:1px solid var(--border);font-size:13px;}

/* Comments */
.comment{background:var(--bg3);border-radius:8px;padding:10px 14px;margin-bottom:8px;}
.comment .author{font-weight:600;font-size:13px;color:var(--gold);}
.comment .date{font-size:11px;color:var(--txt2);margin-left:8px;}
.comment .text{font-size:14px;margin-top:4px;}

/* History */
.history-entry{padding:6px 0;border-bottom:1px solid var(--border);font-size:13px;}
.history-entry .time{color:var(--txt2);font-size:11px;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;}
.modal h2{color:var(--gold);margin-bottom:16px;}
.modal .field{margin-bottom:14px;}
.modal label{display:block;font-size:13px;color:var(--txt2);margin-bottom:4px;}
.modal .row{display:flex;gap:12px;}
.modal .row>*{flex:1;}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:300;animation:slideIn .3s ease;}
.toast.error{background:var(--red);}
@keyframes slideIn{from{transform:translateX(100px);opacity:0;}to{transform:translateX(0);opacity:1;}}

/* Responsive */
@media(max-width:768px){
  .container{padding:12px;}
  .kpi-row{flex-direction:column;}
  .modal .row{flex-direction:column;}
  .app-bar{flex-direction:column;gap:8px;}
}
.hidden{display:none!important;}
.loading{text-align:center;padding:40px;color:var(--txt2);}
</style>
</head>

<div id="authScreen" class="auth-screen">
  <div class="auth-box">
    <h2>CDimex</h2>
    <p>Marcas & Compras — Gestión de Desarrollo</p>
    <div id="authLogin">
      <div class="field">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="tu@cdimex.com.ar">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="loginPass" placeholder="Tu contraseña">
      </div>
      <button class="btn-gold" style="width:100%;padding:12px;font-size:15px;margin-top:8px;" onclick="doLogin()">Ingresar</button>
      <div class="switch">¿No tenés cuenta? <a href="#" onclick="showRegister()">Registrate</a></div>
    </div>
    <div id="authRegister" class="hidden">
      <div class="field">
        <label>Nombre completo</label>
        <input type="text" id="regName" placeholder="Tu nombre">
      </div>
      <div class="field">
        <label>Email corporativo</label>
        <input type="email" id="regEmail" placeholder="tu@cdimex.com.ar">
      </div>
      <div class="field">
        <label>Contraseña (mínimo 6 caracteres)</label>
        <input type="password" id="regPass" placeholder="Elegí una contraseña">
      </div>
      <button class="btn-gold" style="width:100%;padding:12px;font-size:15px;margin-top:8px;" onclick="doRegister()">Crear cuenta</button>
      <div class="switch">¿Ya tenés cuenta? <a href="#" onclick="showLogin()">Ingresá</a></div>
    </div>
    <div id="authError" class="error"></div>
  </div>
</div>

<!-- ============= MAIN APP ============= -->
<div id="appMain" class="hidden">
  <div class="app-bar">
    <h1>CDimex — Marcas & Compras</h1>
    <div class="user-info">
      <span id="userName"></span>
      <span id="userRole" class="role-badge"></span>
      <button class="btn-outline btn-sm" onclick="doLogout()">Salir</button>
    </div>
  </div>
  <div class="container">
    <div class="tabs" id="mainTabs">
      <div class="tab active" data-tab="dashboard" onclick="switchTab('dashboard')">Dashboard</div>
      <div class="tab" data-tab="solicitudes" onclick="switchTab('solicitudes')">Solicitudes</div>
      <div class="tab" data-tab="aprobaciones" onclick="switchTab('aprobaciones')">Aprobaciones</div>
      <div class="tab" data-tab="comex" onclick="switchTab('comex')">Comex</div>
    </div>
    <div id="tabContent"></div>
  </div>
</div>

function showError(msg) {
  const el = document.getElementById('authError');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 5000);
}
function showLogin() {
  document.getElementById('authLogin').classList.remove('hidden');
  document.getElementById('authRegister').classList.add('hidden');
}
function showRegister() {
  document.getElementById('authLogin').classList.add('hidden');
  document.getElementById('authRegister').classList.remove('hidden');
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const pass = document.getElementById('loginPass').value;
  if (!email || !pass) return showError('Completá email y contraseña');
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) return showError(error.message);
  await initApp(data.user);
}

async function doRegister() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim().toLowerCase();
  const pass = document.getElementById('regPass').value;
  if (!name || !email || !pass) return showError('Completá todos los campos');
  if (pass.length < 6) return showError('La contraseña debe tener al menos 6 caracteres');
  const { data, error } = await sb.auth.signUp({
    email, password: pass,
    options: { data: { full_name: name, email: email } }
  });
  if (error) return showError(error.message);
  if (data.user && !data.user.confirmed_at) {
    toast('Cuenta creada. Revisá tu email para confirmar.');
  } else {
    await initApp(data.user);

async function doLogout() {
  await sb.auth.signOut();
  currentUser = null; currentProfile = null;
  document.getElementById('appMain').classList.add('hidden');
  document.getElementById('authScreen').classList.remove('hidden');
}

async function initApp(user) {
  currentUser = user;
  // Fetch profile
  const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
  if (!profile) {
    showError('No se encontró tu perfil. Contactá al administrador.');
    return;
  }
  currentProfile = profile;
  document.getElementById('authScreen').classList.add('hidden');
  document.getElementById('appMain').classList.remove('hidden');
  document.getElementById('userName').textContent = profile.full_name;
  document.getElementById('userRole').textContent = profile.role + (profile.sub_roles?.length ? ' / ' + profile.sub_roles.join(', ') : '');

  // Show/hide tabs based on role
  const comexTab = document.querySelector('[data-tab="comex"]');
  if (comexTab) {
    if (profile.role === 'compras' && profile.sub_roles?.includes('comex') || profile.can_approve_solicitud) {
      comexTab.classList.remove('hidden');
    } else {
      comexTab.classList.add('hidden');
    }
  }

  await loadSolicitudes();
  switchTab('dashboard');
}

// DATA
// =============================================
async function loadSolicitudes() {
  const { data, error } = await sb.from('solicitudes')
    .select('*, profiles!solicitudes_created_by_fkey(full_name, email, role)')
    .order('created_at', { ascending: false });
  if (!error) solicitudes = data || [];

  // Load retroplan pasos for all active solicitudes (for semáforo)
  const activeIds = solicitudes.filter(s => !['Completado','Rechazada'].includes(s.status)).map(s => s.id);
  if (activeIds.length) {
    const { data: pasos } = await sb.from('retroplan_pasos')
      .select('solicitud_id, nombre, fecha_objetivo, completado, responsable')
      .in('solicitud_id', activeIds)
      .eq('completado', false)
      .order('orden');
    allPendingPasos = pasos || [];
  } else {
    allPendingPasos = [];
  }
}

async function loadSolicitudFull(id) {
  const [sol, items, pasos, insp, comex, comments, history] = await Promise.all([
    sb.from('solicitudes').select('*, profiles!solicitudes_created_by_fkey(full_name, email, role)').eq('id', id).single(),
    sb.from('solicitud_items').select('*').eq('solicitud_id', id).order('created_at'),
    sb.from('retroplan_pasos').select('*').eq('solicitud_id', id).order('orden'),
    sb.from('inspecciones').select('*').eq('solicitud_id', id).order('created_at'),
    sb.from('comex_seguimiento').select('*').eq('solicitud_id', id).single(),
    sb.from('comentarios').select('*, profiles(full_name)').eq('solicitud_id', id).order('created_at', { ascending: false }),
    sb.from('historial').select('*, profiles(full_name)').eq('solicitud_id', id).order('created_at', { ascending: false })
  ]);
  return {
    solicitud: sol.data, items: items.data || [], pasos: pasos.data || [],
    inspecciones: insp.data || [], comex: comex.data, comentarios: comments.data || [], historial: history.data || []
  };
}

}

  return currentProfile?.role === 'marcas';

}

  return currentProfile?.sub_roles?.includes('calidad');

// =============================================
// UI HELPERS
// =============================================
function toast(msg, isError = false) {
  const t = document.createElement('div');
  t.className = 'toast' + (isError ? ' error' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

function pill(status) {
  return `<span class="pill ${STATUS_PILL_CLASS[status] || 'pill-active'}">${status}</span>`;
}

function fmtDate(d) {
  if (!d) return '-';
  return new Date(d + 'T12:00:00').toLocaleDateString('es-AR', { day:'2-digit', month:'short', year:'numeric' });
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr + 'T12:00:00');
  const today = new Date(); today.setHours(12,0,0,0);
  return Math.round((d - today) / 86400000);
}

function switchTab(tab) {
  currentTab = tab;
  viewingSolicitud = null;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  const c = document.getElementById('tabContent');
  switch (tab) {
    case 'dashboard': renderDashboard(c); break;
    case 'solicitudes': renderSolicitudes(c); break;
    case 'aprobaciones': renderAprobaciones(c); break;
    case 'comex': renderComex(c); break;
  }
}

function calcularSemaforo(activas) {
  const verde = [], amarillo = [], rojo = [];

  activas.forEach(s => {
    // Get pending pasos for this solicitud, sorted by order
    const pasos = allPendingPasos.filter(p => p.solicitud_id === s.id);
    if (!pasos.length) { verde.push({ sol: s, paso: null, dias: null, detalle: 'Sin pasos pendientes' }); return; }

    // Find the NEXT pending paso (first one not completed)
    const next = pasos[0];
    const dias = daysUntil(next.fecha_objetivo);

    const responsableLabel = {
      'marcas': 'Marcas', 'compras': 'Compras', 'comex': 'Comex',
      'calidad': 'Calidad', 'conjunto': 'Conjunto'
    }[next.responsable] || next.responsable || '';

    const entry = {
      sol: s,
      paso: next.nombre,
      dias,
      responsable: responsableLabel,
      detalle: `${next.nombre} (${responsableLabel})`
    };

    if (dias === null || dias > 10) {
      verde.push(entry);
    } else if (dias > 0) {
      amarillo.push(entry);
    } else {
      rojo.push(entry);
    }
  });

  // Sort: más urgente primero
  amarillo.sort((a, b) => (a.dias ?? 999) - (b.dias ?? 999));
  rojo.sort((a, b) => (a.dias ?? 999) - (b.dias ?? 999));

  return { verde, amarillo, rojo };
}

function semaforoItem(x) {
  const diasText = x.dias === null ? '' : x.dias === 0 ? 'Vence hoy' : x.dias > 0 ? `${x.dias}d restantes` : `Vencido hace ${Math.abs(x.dias)}d`;
  return `<div class="semaforo-item" onclick="openSolicitud('${x.sol.id}')">
    <div class="sol-name">#${x.sol.numero} ${x.sol.nombre}</div>
    <div class="sol-paso">Pendiente: ${x.detalle} ${diasText ? '— ' + diasText : ''}</div>
  </div>`;
}

function calcularAnalisisRegular() {
  const stockInsumo = parseFloat(document.getElementById('nsStockInsumo').value) || 0;
  const stockPT = parseFloat(document.getElementById('nsStockPT').value) || 0;
  const fcstM1 = parseFloat(document.getElementById('nsFcstM1').value) || 0;
  const fcstM2 = parseFloat(document.getElementById('nsFcstM2').value) || 0;
  const fcstM3 = parseFloat(document.getElementById('nsFcstM3').value) || 0;
  const consumoXPT = parseFloat(document.getElementById('nsConsumoXPT').value) || 1;
  const leadTime = parseInt(document.getElementById('nsLeadTime').value) || 150;

  const fcstTotal3m = fcstM1 + fcstM2 + fcstM3;
  const fcstMensualProm = fcstTotal3m / 3;

  if (!fcstMensualProm) return toast('Completá el forecast de al menos un mes', true);

  // ---- Demanda diaria de PT ----
  const demandaDiariaPT = fcstMensualProm / 30;

  // ---- Cobertura total ----
  // El stock de insumo se va a convertir en PT (insumo / consumoXPT = PT producibles)
  const ptProduciblesConInsumo = stockInsumo / consumoXPT;
  const stockTotalEnPT = stockPT + ptProduciblesConInsumo;
  const coberturaTotal = Math.round(stockTotalEnPT / demandaDiariaPT);

  // Cobertura solo de PT actual (sin considerar insumo)
  const coberturaPT = Math.round(stockPT / demandaDiariaPT);
  // Cobertura solo del insumo (en días de demanda de PT)
  const coberturaInsumo = Math.round(ptProduciblesConInsumo / demandaDiariaPT);

  // ---- Fecha límite para emitir la OC ----
  // El insumo nuevo tarda "leadTime" días en llegar.
  // Queremos que llegue antes de que la cobertura total baje de 90 días.
  // Entonces la OC se debe emitir cuando falten (cobertura - 90) días... menos el lead time.
  // diasHastaStock90 = días hasta que la cobertura total llegue a 90 días
  const diasHastaStock90 = Math.max(0, coberturaTotal - 90);
  // La OC tiene que salir "leadTime" días antes de que necesitemos el insumo
  const diasParaEmitirOC = diasHastaStock90 - leadTime;

  const hoy = new Date();
  const fechaOC = new Date(hoy);
  fechaOC.setDate(fechaOC.getDate() + Math.max(0, diasParaEmitirOC));

  // Fecha estimada de llegada
  const fechaLlegada = new Date(fechaOC);
  fechaLlegada.setDate(fechaLlegada.getDate() + leadTime);

  // ---- Cantidad a comprar ----
  // Queremos tener 90 días de insumo DESPUÉS de que llegue la compra.
  // Al momento de llegada, el stock de insumo habrá bajado.
  // Consumo diario de insumo = demandaDiariaPT * consumoXPT
  const consumoDiarioInsumo = demandaDiariaPT * consumoXPT;
  // Días hasta llegada desde hoy
  const diasHastaLlegada = Math.max(0, Math.round((fechaLlegada - hoy) / (1000*60*60*24)));
  // Insumo restante al momento de llegada (puede ser negativo = quiebre)
  const insumoAlLlegar = stockInsumo - (consumoDiarioInsumo * diasHastaLlegada);
  // Necesitamos: 90 días de insumo post-llegada
  const insumoTarget = consumoDiarioInsumo * 90;
  const cantidadCompra = Math.max(0, Math.ceil(insumoTarget - Math.max(0, insumoAlLlegar)));

  // ---- Alerta de urgencia ----
  const esUrgente = diasParaEmitirOC < 0;
  const diasAtraso = Math.abs(Math.min(0, diasParaEmitirOC));
  const hayQuiebre = insumoAlLlegar < 0;
  const diasQuiebre = hayQuiebre ? Math.ceil(Math.abs(insumoAlLlegar) / consumoDiarioInsumo) : 0;

  // Guardar resultados
  document.getElementById('nsFechaNecesidadCalc').value = fechaOC.toISOString().split('T')[0];
  document.getElementById('nsCantidadCompra').value = cantidadCompra;

  // Mostrar resultados
  const res = document.getElementById('resultadoAnalisis');
  res.classList.remove('hidden');
  res.innerHTML = `
    ${esUrgente ? `<div style="background:var(--red);color:#fff;padding:10px 14px;border-radius:6px;margin-bottom:12px;font-size:13px;font-weight:600;">
      ⚠️ OC URGENTE — La orden de compra debería haberse emitido hace ${diasAtraso} días para mantener 90 días de cobertura.
      ${hayQuiebre ? `<br>⛔ QUIEBRE DE STOCK: habrá ${diasQuiebre} días sin insumo antes de que llegue la compra.` : ''}
    </div>` : ''}
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
      <div style="text-align:center;padding:10px;background:var(--bg3);border-radius:8px;">
        <div style="font-size:11px;color:var(--txt2);text-transform:uppercase;">Cobertura PT</div>
        <div style="font-size:22px;font-weight:800;color:${coberturaPT < 30 ? 'var(--red)' : coberturaPT < 60 ? 'var(--orange)' : 'var(--green)'};">${coberturaPT}d</div>
        <div style="font-size:11px;color:var(--txt2);">${stockPT.toLocaleString('es-AR')} un.</div>
      </div>
      <div style="text-align:center;padding:10px;background:var(--bg3);border-radius:8px;">
        <div style="font-size:11px;color:var(--txt2);text-transform:uppercase;">Cobertura Insumo</div>
        <div style="font-size:22px;font-weight:800;color:${coberturaInsumo < 45 ? 'var(--red)' : coberturaInsumo < 90 ? 'var(--orange)' : 'var(--green)'};">${coberturaInsumo}d</div>
        <div style="font-size:11px;color:var(--txt2);">${stockInsumo.toLocaleString('es-AR')} un. (= ${Math.round(ptProduciblesConInsumo).toLocaleString('es-AR')} PT)</div>
      </div>
      <div style="text-align:center;padding:10px;background:var(--bg3);border-radius:8px;">
        <div style="font-size:11px;color:var(--txt2);text-transform:uppercase;">Cobertura Total</div>
        <div style="font-size:22px;font-weight:800;color:${coberturaTotal < 90 ? 'var(--red)' : coberturaTotal < 150 ? 'var(--orange)' : 'var(--green)'};">${coberturaTotal}d</div>
        <div style="font-size:11px;color:var(--txt2);">PT + Insumo convertido</div>
      </div>
    </div>
    <div style="margin-top:10px;font-size:12px;color:var(--txt2);line-height:1.6;">
      Forecast promedio mensual: <strong style="color:var(--txt)">${Math.round(fcstMensualProm).toLocaleString('es-AR')}</strong> un/mes
      · Demanda diaria: <strong style="color:var(--txt)">${Math.round(demandaDiariaPT)}</strong> PT/día
      · Consumo diario insumo: <strong style="color:var(--txt)">${Math.round(consumoDiarioInsumo)}</strong> un/día
      · Lead time: <strong style="color:var(--txt)">${leadTime}</strong> días
    </div>
    <div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div style="text-align:center;">
        <div style="font-size:11px;color:var(--txt2);text-transform:uppercase;">Cantidad a comprar</div>
        <div style="font-size:28px;font-weight:800;color:var(--gold);">${cantidadCompra.toLocaleString('es-AR')}</div>
        <div style="font-size:12px;color:var(--txt2);">unidades de insumo</div>
      </div>
      <div style="text-align:center;">
        <div style="font-size:11px;color:var(--txt2);text-transform:uppercase;">Fecha recomendada de OC</div>
        <div style="font-size:28px;font-weight:800;color:${esUrgente ? 'var(--red)' : 'var(--gold)'};">${fechaOC.toLocaleDateString('es-AR')}</div>
        <div style="font-size:12px;color:var(--txt2);">Llegada estimada: ${fechaLlegada.toLocaleDateString('es-AR')}</div>
      </div>
    </div>`;

  toast('Análisis calculado correctamente');
}

async function submitSolicitud() {
  const tipo = document.getElementById('nsTipo').value;
  const marcaSel = document.getElementById('nsMarca').value;
  const marca = marcaSel === '__otra__' ? document.getElementById('nsMarcaOtra').value.trim() : marcaSel;
  const nombre = document.getElementById('nsNombre').value.trim();
  const desc = document.getElementById('nsDesc').value.trim();
  const costo = parseFloat(document.getElementById('nsCosto').value) || null;
  const cotiz = document.getElementById('nsCotiz').value;
  const cotizNombre = document.getElementById('nsCotizNombre')?.value?.trim() || null;

  // Determine dates based on tipo
  let sellIn = null, lanzamiento = null, fechaNecesidad = null;
  let datosRegulares = null;

  if (tipo === 'Nuevos desarrollos') {
    sellIn = document.getElementById('nsSellIn').value || null;
    lanzamiento = document.getElementById('nsLanzamiento').value || null;
    const fechaProd = document.getElementById('nsFechaProduccion').value || null;
    if (!lanzamiento) return toast('La fecha de lanzamiento es obligatoria', true);
  } else if (tipo === 'Cambio de proveedor' || tipo === 'Traspaso compra local al exterior') {
    fechaNecesidad = document.getElementById('nsFechaNecesidad').value || null;
    lanzamiento = fechaNecesidad; // Use necesidad as launch for retroplan
    if (!fechaNecesidad) return toast('La fecha de necesidad es obligatoria', true);
  } else if (tipo === 'Compras regulares') {
    const stockInsumo = document.getElementById('nsStockInsumo').value;
    const stockPT = document.getElementById('nsStockPT').value;
    const fcstM1 = document.getElementById('nsFcstM1').value;
    const fcstM2 = document.getElementById('nsFcstM2').value;
    const fcstM3 = document.getElementById('nsFcstM3').value;
    const consumoXPT = document.getElementById('nsConsumoXPT').value;
    const leadTime = document.getElementById('nsLeadTime').value;
    const cantidadCompra = document.getElementById('nsCantidadCompra').value;
    fechaNecesidad = document.getElementById('nsFechaNecesidadCalc').value || null;
    lanzamiento = fechaNecesidad;
    if (!fechaNecesidad) return toast('Ejecutá el cálculo de fecha y cantidad primero', true);
    datosRegulares = { stockInsumo, stockPT, fcstM1, fcstM2, fcstM3, consumoXPT, leadTime, cantidadCompra };
  }

  if (!marca) return toast('Seleccioná una marca', true);
  if (!nombre) return toast('Completá el nombre del desarrollo', true);

  try {
  // Collect items from item blocks
  const itemBlocks = document.querySelectorAll('.item-block');
  const items = [];
  itemBlocks.forEach(block => {
    const nameEl = block.querySelector('.item-name');
    const tipoEl = block.querySelector('.item-tipo-val');
    const catEl = block.querySelector('.item-cat');
    const n = nameEl?.value?.trim();
    if (!n) return;
    const item = { nombre: n, tipo_producto: tipoEl?.value || 'Otro' };

    // Collect sub-components for botellas
    const cat = catEl?.value;
    if (cat === 'botella_vidrio' || cat === 'botella_plastico') {
      const comps = [];
      if (block.querySelector('.comp-botella')?.checked) comps.push('Botella');
      if (block.querySelector('.comp-bomba')?.checked) comps.push('Bomba');
      if (block.querySelector('.comp-collar')?.checked) comps.push('Collar');
      if (block.querySelector('.comp-tapa')?.checked) comps.push('Tapa');
      item.notas = 'Componentes: ' + comps.join(', ');
      const comparte = block.querySelector('.item-comparte')?.value;
      if (comparte === 'si') {
        const detalle = block.querySelector('.item-comparte-detalle')?.value?.trim();
        if (detalle) item.notas += ' | Comparte con: ' + detalle;
      }
    }
    // Estuche tipo
    if (cat === 'estuche') {
      const estucheTipo = block.querySelector('.item-estuche-tipo')?.value;
      if (estucheTipo) item.notas = 'Tipo: ' + estucheTipo;
      item.tratamiento_especial = 'estuche';
    }
    items.push(item);
  });

  // Collect referencias
  const refEls = document.querySelectorAll('.ref-value');
  const referencias = [];
  refEls.forEach(el => {
    const val = el.value.trim();
    if (val) referencias.push({ tipo: el.dataset.refTipo, valor: val });
  });
  const links = referencias.filter(r => r.tipo !== 'descripcion').map(r => r.valor);
  const descRefs = referencias.filter(r => r.tipo === 'descripcion').map(r => r.valor);
  const fullDesc = [desc, ...descRefs.map(d => 'Ref: ' + d)].filter(Boolean).join('\n');

  // Create solicitud
  const { data: sol, error } = await sb.from('solicitudes').insert({
    tipo, marca, nombre, descripcion: fullDesc + (datosRegulares ? `\n--- Análisis Compra Regular ---\nStock Insumo: ${datosRegulares.stockInsumo} | Stock PT: ${datosRegulares.stockPT}\nForecast 3M: ${datosRegulares.fcstM1}/${datosRegulares.fcstM2}/${datosRegulares.fcstM3}\nConsumo x PT: ${datosRegulares.consumoXPT} | Lead time: ${datosRegulares.leadTime} días\nCantidad a comprar: ${datosRegulares.cantidadCompra}` : ''),
    fecha_sell_in: sellIn, fecha_lanzamiento: lanzamiento,
    costo_objetivo: costo, cotizacion_responsable: cotiz,
    cotizacion_responsable_nombre: cotizNombre,
    links_referencia: links,
    status: 'Pendiente aprobación Compras',
    created_by: currentUser.id
  }).select().single();

  if (error) return toast('Error: ' + error.message, true);

  // Create items
  if (items.length) {
    await sb.from('solicitud_items').insert(items.map(it => ({ ...it, solicitud_id: sol.id })));
  }

  // Generate retroplan
  const template = RETROPLAN_TEMPLATES[tipo] || RETROPLAN_TEMPLATES['Nuevos desarrollos'];
  const launchDate = new Date(lanzamiento + 'T12:00:00');
  const pasos = template.map((t, i) => {
    const fecha = new Date(launchDate);
    fecha.setDate(fecha.getDate() - t.dias);
    let resp = t.responsable;
    if (resp === '__COTIZ__') resp = cotiz;
    return {
      solicitud_id: sol.id, orden: i + 1, nombre: t.nombre,
      responsable: resp, dias_offset: t.dias,
      fecha_objetivo: fecha.toISOString().split('T')[0]
    };
  });
  await sb.from('retroplan_pasos').insert(pasos);

  // Log history
  await sb.from('historial').insert({
    solicitud_id: sol.id, actor_id: currentUser.id,
    evento: 'Solicitud creada', detalle: `Tipo: ${tipo}, Marca: ${marca}`
  });

  // Send email notification
  await sendEmail(
    ['nmaggi@cdimex.com.ar','nguarino@cdimex.com.ar','mjaimes@cdimex.com.ar'],
    `Nueva solicitud #${sol.numero}: ${nombre}`,
    `<p><strong>${currentProfile.full_name}</strong> creó una nueva solicitud:</p>

     <p>Ingresá a la app para revisarla y aprobarla.</p>`
  );

  await loadSolicitudes();
  switchTab('dashboard');
  toast('Solicitud creada exitosamente');
  } catch (err) {
    console.error('Error creando solicitud:', err);
    toast('Error al crear solicitud: ' + (err.message || err), true);
  }
}

// =============================================
// RETROPLAN VISUAL
// =============================================
function renderRetroplan(pasos) {
  const el = document.getElementById('retroplanTimeline');
  if (!pasos.length) { el.innerHTML = '<p style="color:var(--txt2)">Sin retroplan definido</p>'; return; }

  el.innerHTML = pasos.map(p => {
    const days = daysUntil(p.fecha_objetivo);
    let cls = '';
    if (p.completado) cls = 'completed';
    else if (days !== null && days < 0) cls = 'overdue';
    else if (days !== null && days <= 10) cls = 'active';

    return `<div class="retro-step ${cls}">
      <div class="dot"></div>
      <div class="step-name">${p.completado ? '✓ ' : ''}${p.nombre}</div>
      <div class="step-date">${fmtDate(p.fecha_objetivo)}${p.completado ? ' — Completado ' + fmtDate(p.fecha_completado) : (days !== null && days < 0 ? ` — <span style="color:var(--red)">Vencido hace ${Math.abs(days)}d</span>` : (days !== null ? ` — ${days}d restantes` : ''))}</div>
      <div class="step-responsible">${p.responsable || ''}</div>
      ${!p.completado && (isCompras() || canApprove()) ? `<button class="btn-outline btn-sm" onclick="completePaso('${p.id}')" style="margin-top:4px;">Marcar completado</button>` : ''}
    </div>`;
  }).join('');
}

  const showAestheticApproval = s.status === 'Pendiente aprobación estética (Marcas)' && (isMarcas() || canApprove());

  el.innerHTML = `<table class="items-table">
    <tr>
      <th>Ítem</th><th>Tipo</th><th>Detalle</th><th>Estético</th><th>Técnico</th>
      ${showAestheticApproval ? '<th>Acciones</th>' : ''}
      <th>Compra parcial</th>
    </tr>
    ${items.map(it => `<tr>
      <td>${it.nombre}</td>
      <td>${it.tipo_producto || '-'}</td>
      <td style="font-size:12px;color:var(--txt2);max-width:180px;">${it.notas || (it.tratamiento_especial ? `<span style="color:var(--orange)">${it.tratamiento_especial}</span>` : '-')}</td>
      <td>${pill_item(it.status_estetico)}</td>
      <td>${pill_item(it.status_tecnico)}</td>
      ${showAestheticApproval && it.status_estetico === 'pendiente' ? `<td>
        <button class="btn-green btn-sm" onclick="approveItemAesthetic('${it.id}','${s.id}')">Aprobar</button>
        <button class="btn-red btn-sm" onclick="rejectItemAesthetic('${it.id}','${s.id}')">Rechazar</button>
      </td>` : showAestheticApproval ? '<td>-</td>' : ''}
      <td>
        ${it.compra_parcial ? `<span style="color:var(--green)">Sí</span> — ${it.compra_parcial_detalle || ''}` : '-'}
        ${isCompras() ? `<button class="btn-outline btn-sm" onclick="toggleCompraParcial('${it.id}','${s.id}')" style="margin-left:4px;">Editar</button>` : ''}

function pill_item(status) {
  const cls = status === 'aprobado' ? 'pill-approved' : status === 'rechazado' ? 'pill-rejected' : 'pill-pending';
  return `<span class="pill ${cls}">${status}</span>`;
}

// =============================================
// WORKFLOW ACTIONS
// =============================================
async function updateStatus(id, newStatus, evento, detalle, emailTo, emailSubject, emailBody) {
  await sb.from('solicitudes').update({ status: newStatus }).eq('id', id);
  await sb.from('historial').insert({ solicitud_id: id, actor_id: currentUser.id, evento, detalle });
  if (emailTo && emailSubject) {
    await sendEmail(emailTo, emailSubject, emailBody || `<p>${evento}</p>`);
  }
  await loadSolicitudes();
  await openSolicitud(id);
  toast(evento);
}

async function approveCompras(id) {
  const s = solicitudes.find(x => x.id === id);
  await completePasoByName(id, 'Aprobación Compras');
  await updateStatus(id, 'Propuesta de proveedores', 'Solicitud aprobada por Compras',
    `Aprobada por ${currentProfile.full_name}`,
    [s.profiles?.email].filter(Boolean),
    `Solicitud #${s.numero} aprobada`,
    `<p>Tu solicitud <strong>${s.nombre}</strong> fue aprobada por Compras. Se inicia la propuesta de proveedores.</p>`);
}

async function requestInfo(id) {
  const motivo = prompt('¿Qué información necesitás?');
  if (!motivo) return;
  const s = solicitudes.find(x => x.id === id);
  await updateStatus(id, 'Info solicitada', 'Info solicitada por Compras', motivo,
    [s.profiles?.email].filter(Boolean),
    `Solicitud #${s.numero}: Se necesita más información`,
    `<p>Compras necesita más información sobre tu solicitud <strong>${s.nombre}</strong>:</p><p>${motivo}</p>`);
}

async function rejectSolicitud(id) {
  const motivo = prompt('Motivo del rechazo:');
  if (!motivo) return;
  const s = solicitudes.find(x => x.id === id);
  await updateStatus(id, 'Rechazada', 'Solicitud rechazada', motivo,
    [s.profiles?.email].filter(Boolean),
    `Solicitud #${s.numero} rechazada`,
    `<p>Tu solicitud <strong>${s.nombre}</strong> fue rechazada. Motivo: ${motivo}</p>`);
}

async function resendInfo(id) {
  const s = solicitudes.find(x => x.id === id);
  await updateStatus(id, 'Pendiente aprobación Compras', 'Info reenviada por Marcas', null,
    ['nmaggi@cdimex.com.ar','nguarino@cdimex.com.ar','mjaimes@cdimex.com.ar'],
    `Solicitud #${s.numero}: Info actualizada`,
    `<p>${currentProfile.full_name} actualizó la información de la solicitud <strong>${s.nombre}</strong>. Revisá y aprobá.</p>`);
}

async function propuestaProveedores(id) {
  const s = solicitudes.find(x => x.id === id);

// =============================================
// REGENERAR RETROPLAN
// =============================================
async function regenerarRetroplan(solId, tipo, fechaLanzamiento) {
  if (!confirm('¿Regenerar el retroplan con el template actualizado?\n\nEsto eliminará todos los pasos actuales y creará los nuevos. Los pasos ya completados se perderán.')) return;

  // Get cotización responsable for __COTIZ__ placeholder
  const { data: sol } = await sb.from('solicitudes').select('cotizacion_responsable').eq('id', solId).single();
  const cotiz = sol?.cotizacion_responsable || 'compras';

  // Delete existing pasos
  await sb.from('retroplan_pasos').delete().eq('solicitud_id', solId);

  // Generate new pasos from current template
  const template = RETROPLAN_TEMPLATES[tipo] || RETROPLAN_TEMPLATES['Nuevos desarrollos'];
  const launchDate = new Date(fechaLanzamiento + 'T12:00:00');
  const pasos = template.map((t, i) => {
    const fecha = new Date(launchDate);
    fecha.setDate(fecha.getDate() - t.dias);
    let resp = t.responsable;
    if (resp === '__COTIZ__') resp = cotiz;
    return {
      solicitud_id: solId, orden: i + 1, nombre: t.nombre,
      responsable: resp, dias_offset: t.dias,
      fecha_objetivo: fecha.toISOString().split('T')[0]
    };
  });

  await sb.from('retroplan_pasos').insert(pasos);

  // Log
  await sb.from('historial').insert({
    solicitud_id: solId, actor_id: currentUser.id,
    evento: 'Retroplan regenerado', detalle: `Template: ${tipo}, ${template.length} pasos`
  });

  toast('Retroplan regenerado exitosamente');
  await openSolicitud(solId);
}

// =============================================
// CHANGE LAUNCH DATE
// =============================================
async function changeLaunchDate(id, currentDate) {
  const newDate = prompt('Nueva fecha de lanzamiento (YYYY-MM-DD):', currentDate);
  if (!newDate || newDate === currentDate) return;

  // Update solicitud
  await sb.from('solicitudes').update({ fecha_lanzamiento: newDate }).eq('id', id);

  // Recalculate all retroplan dates
  const { data: pasos } = await sb.from('retroplan_pasos').select('*').eq('solicitud_id', id).order('orden');
  const launchDate = new Date(newDate + 'T12:00:00');
  for (const p of pasos) {
    const fecha = new Date(launchDate);
    fecha.setDate(fecha.getDate() - p.dias_offset);
    await sb.from('retroplan_pasos').update({ fecha_objetivo: fecha.toISOString().split('T')[0] }).eq('id', p.id);
  }

  // Log and notify
  await sb.from('historial').insert({
    solicitud_id: id, actor_id: currentUser.id,
    evento: 'Fecha de lanzamiento modificada',
    detalle: `De ${currentDate} a ${newDate}. Todo el retroplan fue recalculado.`
  });

  const s = solicitudes.find(x => x.id === id);
  // Notify all involved
  const { data: allProfiles } = await sb.from('profiles').select('email');
  const emails = allProfiles?.map(p => p.email) || [];
  await sendEmail(emails,
    `CAMBIO DE FECHA: Solicitud #${s.numero} — ${s.nombre}`,
    `<p><strong>${currentProfile.full_name}</strong> cambió la fecha de lanzamiento de <strong>${s.nombre}</strong>.</p>
     <p>Fecha anterior: ${fmtDate(currentDate)}</p>
     <p>Nueva fecha: ${fmtDate(newDate)}</p>
     <p><strong>Todo el retroplan fue recalculado.</strong> Revisá las nuevas fechas en la app.</p>`
  );

  toast('Fecha de lanzamiento actualizada y retroplan recalculado');
  await loadSolicitudes();
  await openSolicitud(id);
}

// =============================================
// EMAIL
// =============================================
async function sendEmail(to, subject, html) {
  try {
    const resp = await fetch('/api/send-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': 'cdimex-internal-2024' },
      body: JSON.stringify({ to: Array.isArray(to) ? to : [to], subject: `[CDimex] ${subject}`, html: wrapEmail(html) })
    });
    if (!resp.ok) console.warn('Email send failed:', await resp.text());
  } catch (e) {
    console.warn('Email send error:', e);
    // Fallback: open mailto
    const emails = Array.isArray(to) ? to.join(',') : to;
    window.open(`mailto:${emails}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(subject)}`);
  }
}

function wrapEmail(body) {

// =============================================
// SEMÁFORO → GOOGLE SHEETS SYNC
// =============================================
async function syncSemaforoToSheets(semaforo) {
  const rows = [];
  const today = new Date().toISOString().split('T')[0];

  [...semaforo.amarillo, ...semaforo.rojo].forEach(x => {
    rows.push([
      today,
      x.sol.numero || '',
      x.sol.nombre || '',
      x.sol.marca || '',
      x.sol.tipo || '',
      x.sol.status || '',
      x.paso || '',
      x.responsable || '',
      x.dias ?? '',
      x.dias !== null && x.dias <= 0 ? 'ROJO' : 'AMARILLO'
    ]);
  });

  if (!rows.length) return;

  try {
    await fetch('/api/semaforo-sync', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': 'cdimex-internal-2024' },
      body: JSON.stringify({ rows })
    });
  } catch (e) { console.warn('Semáforo sync error:', e); }
}
